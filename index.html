<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>따끈따끈 베이커리</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Tesseract.js — 손글씨 숫자 OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root {
    --paper: #fffaee;
    --paper-edge: #fff3da;
    --paper-deep: #ffe9bc;
    --line: #f3dfb3;
    --line-soft: rgba(220,180,90,.18);
    --ink: #4a3826;
    --ink-soft: #7a5e3e;
    --muted: #b8966a;
    --primary: #ff8755;
    --primary-deep: #e96f3c;
    --primary-soft: #ffe2cf;
    --accent: #f39e2c;
    --accent-soft: #ffeec0;
    --good: #2dbf94;
    --good-soft: #d0f5e7;
    --bad: #ef6464;
    --bad-soft: #ffe0e0;
    /* 챕터 색 — 따뜻한 파스텔로 통일 */
    --tab-1: #ff9966;  /* 코랄 오렌지 */
    --tab-2: #2ec4a5;  /* 민트 */
    --tab-3: #a78bfa;  /* 라벤더 */
    --tab-4: #f4b53c;  /* 따뜻한 노랑 */
    --tab-5: #ec6da4;  /* 핑크 */
    --tab-6: #84d05c;  /* 연두 */
    --tab-7: #5dafe8;  /* 하늘색 */
    --tab-1-soft: #ffe0d0;
    --tab-2-soft: #e3f7ee;  /* 옅은 민트 — 다른 카드와 톤 맞춤 */
    --tab-3-soft: #e3dbff;
    --tab-4-soft: #fde8b8;
    --tab-5-soft: #fbd6e4;
    --tab-6-soft: #d8f1c6;
    --tab-7-soft: #cfe8f9;
    --tab-1-deep: #e07747;
    --tab-2-deep: #1ea88a;
    --tab-3-deep: #8c70d8;
    --tab-4-deep: #d49a23;
    --tab-5-deep: #d44e8a;
    --tab-6-deep: #6abd44;
    --tab-7-deep: #3e95d0;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  /* 한글 위주이므로 주아체. 숫자는 Pretendard로 또렷하게 */
  html { font-size: 20px; }
  body {
    font-family: 'Jua', 'Pretendard Variable', sans-serif;
    font-weight: 400;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 0% 0%, #fff5d8 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, #ffe6c0 0%, transparent 55%),
      #fff1d4;
    /* 한글 줄바꿈 시 단어 중간에서 끊기지 않도록 — 전역 적용 */
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 모든 자식 요소도 동일 규칙을 따르도록 (개별 element가 word-break를 덮어쓰지 않도록 보강) */
  #app, #app *:not(.frac):not(.frac *):not(.num):not(.ans):not(table.tbl):not(table.tbl *) {
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 숫자/수식만 Pretendard Variable (주아체보다 또렷) */
  .num, .ans, .frac, table.tbl td, table.tbl th { font-family: 'Pretendard Variable', sans-serif; }
  .display { font-family: 'Black Han Sans', 'Jua', sans-serif; font-weight: 400; letter-spacing: -.01em; }
  .handwrite { font-family: 'Gowun Dodum', sans-serif; }
  .pen-script { font-family: 'Nanum Pen Script', cursive; }

  /* ===== 가로형 캔버스: 1280 × 720 기준, 화면에 맞춰 스케일 ===== */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #canvas {
    width: 1280px;
    height: 720px;
    flex: 0 0 auto;
    position: relative;
    transform-origin: center center;
    will-change: transform;
  }
  #app {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    padding: 22px 28px;
  }
  /* 스크롤바 노출 방지 */
  #app, #app * { scrollbar-width: none; }
  #app *::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* 배경 장식용 베이커리 아이콘 */
  .deco {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    opacity: .55;
    font-size: 64px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
  }

  /* 정답 시 꽃가루 — 아래에서 위로 살짝 대각선 방향으로 한 번 터짐 */
  .confetti-burst {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: confetti-fly 1.0s ease-out forwards;
  }
  @keyframes confetti-fly {
    0%   { transform: translate(0,0) scale(.4); opacity: 0; }
    8%   { opacity: 1; }
    55%  { transform: translate(var(--dx), var(--dy)) scale(1); opacity: 1; }
    100% { transform: translate(calc(var(--dx) * 1.1), calc(var(--dy) + 280px)) scale(1); opacity: 0; }
  }

  /* ===== 페이지 카드 (책상 위의 학습 노트) ===== */
  .book {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(180,130,60,.18), 0 2px 0 rgba(0,0,0,.04);
    border: 2px solid var(--paper-edge);
    position: relative;
    padding: 24px 32px 22px;
    display: flex;
    flex-direction: column;
    z-index: 1;
    overflow: hidden;
  }
  /* 페이지 상단 살짝 색띠 — 학습용 노트 무드 */
  .book::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--tab-1), var(--tab-2), var(--tab-3), var(--tab-4), var(--tab-5), var(--tab-6), var(--tab-7));
    opacity: .85;
  }

  /* ===== 상단 바 (스테이지 메뉴 / 단계 페이지) ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border: 2px solid var(--paper-deep);
    border-radius: 18px;
    padding: 10px 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,.04);
  }
  .topbar-btn {
    width: 46px; height: 46px;
    border-radius: 14px;
    border: 2px solid var(--paper-deep);
    background: var(--paper);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--ink);
    transition: transform .12s, background .12s;
    font-family: inherit;
  }
  .topbar-btn:hover { transform: translateY(-2px); background: var(--paper-deep); }
  .topbar-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-toc {
    background: white;
    border: 2px solid var(--page-color, var(--accent));
    color: var(--page-color, var(--accent));
    padding: 8px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 20px;
    font-family: inherit;
    transition: background .12s;
  }
  .topbar-toc:hover { background: var(--page-color, var(--accent)); color: white; }

  /* ===== 페이지 헤더 (단계 학습용) ===== */
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  .page-header::after {
    content:'';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--page-color, var(--primary)) 0%, var(--page-color, var(--primary)) 70%, transparent 100%);
    border-radius: 3px;
  }
  .page-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -.01em;
    color: var(--ink);
    line-height: 1.2;
  }
  .page-sub {
    font-size: 20px;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 600;
  }
  .page-meta {
    font-size: 20px;
    letter-spacing: .04em;
    font-weight: 800;
    background: var(--paper-edge);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .page-content {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    font-size: 20px;
    line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
  }
  /* 단계 학습 페이지의 루트 div가 전체 높이를 채우고 내부를 골고루 분배 */
  #content > div {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    gap: 10px;
  }

  /* 단계 진행 바 + 페이지 번호 */
  .progress-info {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .progress-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .progress-row > div {
    flex: 1;
    height: 8px;
    border-radius: 4px;
    background: var(--paper-deep);
    transition: background .25s;
  }
  .progress-row > div.on { background: var(--page-color, var(--primary)); }
  .page-pill {
    flex-shrink: 0;
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    background: var(--paper-edge);
    border: 2px solid var(--paper-deep);
    border-radius: 999px;
    padding: 4px 14px;
    white-space: nowrap;
  }

  /* ===== 베이커리 장면 칩 (이야기 컨셉) — 문제 상황 상단 ===== */
  .scene-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #fff8e1 0%, #ffe2a3 100%);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 8px 18px;
    margin-bottom: 8px;
    box-shadow: 0 3px 0 rgba(243,158,44,.22);
  }
  .scene-chip .scene-emoji { font-size: 36px; line-height: 1; flex-shrink: 0; }
  .scene-chip .scene-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1.25;
  }
  .scene-chip .scene-title b { color: var(--ink); }

  /* ===== 멘토 (사장님) 말풍선 — 한글 키움 ===== */
  .mentor {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 6px;
  }
  .mentor-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fff3d0 0%, #ffe0a8 100%);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    flex-shrink: 0;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    animation: floaty 4s ease-in-out infinite;
    padding: 4px; /* Added to frame SVG beautifully */
  }
  .mentor-icon svg {
    width: 100%;
    height: 100%;
  }
  .mentor-text {
    flex: 1;
    font-size: 28px;
    line-height: 1.55;
    background: #fff;
    border: 3px solid var(--accent);
    border-radius: 18px;
    padding: 16px 22px;
    position: relative;
    box-shadow: 0 4px 0 rgba(243,158,44,.2);
  }
  .mentor-text::before {
    content: '';
    position: absolute;
    left: -14px;
    top: 22px;
    border: 10px solid transparent;
    border-right-color: var(--accent);
  }
  .mentor-text b { color: var(--accent); }

  /* ===== 버튼 ===== */
  .btn {
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 800;
    padding: 12px 26px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,.16);
    transition: transform .12s, box-shadow .12s, filter .12s;
    color: white;
    background: var(--primary);
    letter-spacing: -.01em;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.16); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); }
  .btn-secondary { background: white; color: var(--ink); box-shadow: 0 4px 0 var(--paper-deep); border: 2px solid var(--paper-deep); }
  .btn-success { background: var(--good); }
  .btn-warn { background: var(--accent); }
  .btn-danger { background: var(--bad); }
  /* 호환용 */
  .btn-pink   { background: var(--tab-5); }
  .btn-yellow { background: var(--accent); }
  .btn-blue   { background: var(--tab-7); }
  .btn-green  { background: var(--good); }
  .btn-gray   { background: white; color: var(--ink); box-shadow: 0 4px 0 var(--paper-deep); border: 2px solid var(--paper-deep); }

  /* ===== 입력칸 ===== */
  .ans {
    width: 64px; height: 56px;
    text-align: center;
    border: 2px solid var(--primary);
    border-radius: 12px;
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-size: 26px;
    font-weight: 800;
    background: white;
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(255,135,85,.18);
  }
  .ans:focus { outline: none; box-shadow: 0 0 0 4px rgba(255,135,85,.22), 0 3px 0 rgba(255,135,85,.18); }
  .ans.ok  { border-color: var(--good); background: var(--good-soft); box-shadow: 0 3px 0 rgba(45,191,148,.22); }
  .ans.bad { border-color: var(--bad);  background: var(--bad-soft);  box-shadow: 0 3px 0 rgba(239,100,100,.22); }

  /* ===== 박스 ===== */
  .box {
    background: #fff;
    border: 2px solid var(--paper-deep);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 3px 0 rgba(0,0,0,.04);
  }
  .box-primary { background: var(--primary-soft); border-color: var(--primary); }
  .box-accent  { background: var(--accent-soft);  border-color: var(--accent); }
  .box-good    { background: var(--good-soft);    border-color: var(--good); }
  .box-paper   { background: var(--paper-edge);   border-color: var(--line); }

  /* ===== 분수 표기 (분모 분의 분자 — 슬래시 X) ===== */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 6px;
    line-height: 1.05;
    font-size: 0.78em;
    font-weight: 800;
  }
  .frac > span:first-child {
    padding: 0 8px 4px;
    border-bottom: 2.5px solid currentColor;
    min-width: 22px;
  }
  .frac > span:last-child {
    padding: 4px 8px 0;
    min-width: 22px;
  }

  /* 약분 시각화 — 분자/분모에 대각선 + 작은 새 숫자 */
  .frac-reduce .orig {
    position: relative;
  }
  .frac-reduce .orig::before {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    top: 50%;
    height: 3px;
    background: #ec6da4;
    transform: translateY(-50%) rotate(-22deg);
    pointer-events: none;
    border-radius: 2px;
  }
  .frac-reduce .orig::after {
    content: attr(data-new);
    position: absolute;
    font-size: 0.65em;
    color: #ec6da4;
    font-weight: 800;
    font-family: 'Pretendard Variable', sans-serif;
    line-height: 1;
  }
  .frac-reduce .orig:first-child::after {
    /* 분자: 우측 위 */
    top: -0.55em;
    right: -0.7em;
  }
  .frac-reduce .orig:last-child::after {
    /* 분모: 우측 아래 */
    bottom: -0.55em;
    right: -0.7em;
  }

  /* 인터랙티브 분수 빌더 — 사용자가 분자/분모 입력 → 약분 버튼 누름 */
  .frac-build {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 4px;
    line-height: 1;
  }
  .frac-input {
    width: 44px;
    height: 30px;
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    border: 2px solid var(--accent);
    border-radius: 8px;
    background: white;
    font-family: 'Pretendard Variable', sans-serif;
    color: var(--ink);
    padding: 0;
  }
  .frac-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,135,85,.22); }
  .frac-bar {
    width: 44px;
    height: 3px;
    background: currentColor;
    margin: 2px 0;
    border-radius: 2px;
  }
  .reduce-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 6px 16px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 3px 0 rgba(180,130,30,.4);
    transition: transform .1s;
  }
  .reduce-btn:hover { transform: translateY(-1px); }
  .reduce-btn:active { transform: translateY(0); }
  .reduce-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== 외항·내항 라벨 붙이기 (Stage 3 ② 개념 학습) ===== */
  .vocab-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 92px;
    height: 38px;
    border: 2px dashed var(--accent);
    border-radius: 10px;
    background: white;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    padding: 0 12px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Jua', sans-serif;
  }
  .vocab-slot.filled  { border-style: solid; background: var(--accent-soft); border-color: var(--accent); }
  .vocab-slot.correct { border-style: solid; border-color: var(--good); background: var(--good-soft); color: #1e8e6c; }
  .vocab-slot.wrong   { border-style: solid; border-color: var(--bad);  background: var(--bad-soft);  color: var(--bad); animation: fb-shake 0.3s; }
  .vocab-chip {
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    font-weight: 700;
    padding: 8px 22px;
    border: 3px solid var(--accent);
    border-radius: 14px;
    background: white;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    transition: transform .12s, box-shadow .12s, opacity .15s;
  }
  .vocab-chip:hover:not(:disabled)  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(243,158,44,.3); }
  .vocab-chip:active:not(:disabled) { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(243,158,44,.3); }
  .vocab-chip:disabled { opacity: .35; cursor: not-allowed; background: var(--paper-edge); }

  /* 변환 스택 (예: 0.5 위에, 5/10 아래에) */
  .stack-conv {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    line-height: 1.1;
    gap: 4px;
    margin: 0 4px;
  }
  .stack-conv .arrow {
    color: var(--tab-3);
    font-size: 0.7em;
    line-height: 1;
  }

  /* ===== 비 줄이기 게임 ===== */
  .game-mode-btn {
    background: linear-gradient(135deg, #fff5d9, #ffe9b0);
    border: 3px solid var(--accent);
    border-radius: 18px;
    padding: 18px 28px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Jua', sans-serif;
    color: var(--ink);
    box-shadow: 0 4px 0 rgba(180,130,30,.3);
  }
  .game-mode-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 rgba(180,130,30,.3); }
  .game-mode-btn:active { transform: translateY(0); box-shadow: 0 2px 0 rgba(180,130,30,.3); }

  .game-input-wrap {
    position: relative;
    display: inline-block;
  }
  .game-ans {
    width: 100px;
    height: 70px;
    font-size: 40px;
    font-weight: 800;
    text-align: center;
  }
  .fb-circle {
    position: absolute;
    inset: -10px;
    border: 5px solid #16a34a;
    border-radius: 50%;
    pointer-events: none;
    animation: fb-grow 0.4s ease-out;
  }
  .fb-x {
    position: absolute;
    inset: 0;
    pointer-events: none;
    animation: fb-shake 0.3s;
  }
  .fb-x::before, .fb-x::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 90%;
    height: 6px;
    background: #dc2626;
    border-radius: 3px;
  }
  .fb-x::before { transform: translate(-50%, -50%) rotate(45deg); }
  .fb-x::after  { transform: translate(-50%, -50%) rotate(-45deg); }
  @keyframes fb-grow {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes fb-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .clock-icon { display: inline-block; transition: transform 0.2s; transform-origin: center; }
  .clock-icon.warning { animation: clock-tick 0.6s infinite; color: #dc2626; }
  .clock-icon.exploded { animation: clock-explode 0.6s ease-out; }
  @keyframes clock-tick {
    0%, 100% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-8deg) scale(1.1); }
    75% { transform: rotate(8deg)  scale(1.1); }
  }
  @keyframes clock-explode {
    0% { transform: scale(1) rotate(0); }
    40% { transform: scale(1.6) rotate(360deg); }
    100% { transform: scale(1.2) rotate(360deg); }
  }

  .scratch-pad-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .scratch-pad {
    background: white;
    border: 2px dashed #d4b487;
    border-radius: 12px;
    cursor: crosshair;
    touch-action: none;
  }
  /* 손글씨 답 패드 — 사용자가 직접 손/마우스로 숫자를 씀, Tesseract.js로 인식 */
  .answer-pad {
    width: 84px;
    height: 60px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: white;
    cursor: crosshair;
    touch-action: none;
    display: block;
  }
  .answer-pad.correct { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(45,191,148,.18); }
  .answer-pad.wrong   { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(239,100,100,.18); }
  .answer-pads-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px 12px 18px;
    background: rgba(255,250,238,0.95);
    border-top: 2px dashed #d4b487;
    flex-wrap: wrap;
  }
  .clear-answer-pads {
    background: white;
    border: 2px solid #d4b487;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Jua', sans-serif;
    color: var(--ink);
  }

  /* OCR 보드 하단의 답 입력 칸 — 메인 정답 입력칸과 양방향 미러 */
  .ocr-answer-bar {
    position: absolute;
    bottom: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    background: rgba(255,250,238,0.95);
    padding: 8px 12px;
    border: 2px dashed #d4b487;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .ocr-answer-bar .ocr-label {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    font-family: 'Jua', sans-serif;
  }
  .ocr-ans {
    width: 64px;
    height: 44px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: white;
    color: var(--ink);
    font-family: 'Pretendard Variable', sans-serif;
    padding: 0;
  }
  .ocr-ans:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,135,85,.22); }
  .ocr-ans.correct { color: #16a34a; border-color: #16a34a; }
  .ocr-ans.wrong { color: #dc2626; border-color: #dc2626; }

  .stage-card { transition: all .25s; cursor: pointer; }
  .stage-card.locked { opacity: .5; cursor: not-allowed; }

  /* ===== 비율 카드 (매칭 게임) ===== */
  .ratio-card {
    background: #fff;
    border: 3px solid var(--accent);
    border-radius: 16px;
    padding: 18px 22px;
    font-size: 26px;
    font-weight: 800;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    cursor: pointer;
    user-select: none;
    transition: transform .15s, box-shadow .15s, background .15s, border-color .15s;
    color: var(--ink);
    text-align: center;
    position: relative;
  }
  .ratio-card:hover:not(.matched):not(.sel) {
    transform: translateY(-3px);
    box-shadow: 0 7px 0 rgba(243,158,44,.3);
  }
  /* 선택 상태 — 누구나 한눈에 알도록 매우 도드라지게 */
  .ratio-card.sel {
    transform: scale(1.12);
    border-width: 4px;
    border-color: var(--primary);
    background: linear-gradient(135deg, #fff5d8 0%, #ffd9a8 100%);
    box-shadow:
      0 0 0 6px rgba(255,135,85,.28),
      0 10px 18px rgba(255,135,85,.35);
    z-index: 5;
    animation: selPulse 1.4s ease-in-out infinite;
  }
  .ratio-card.sel::after {
    content: '✓';
    position: absolute;
    top: -14px;
    right: -14px;
    width: 38px;
    height: 38px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    border: 3px solid white;
    box-shadow: 0 4px 8px rgba(0,0,0,.2);
    font-family: 'Pretendard Variable', sans-serif;
  }
  @keyframes selPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(255,135,85,.28), 0 10px 18px rgba(255,135,85,.35); }
    50%      { box-shadow: 0 0 0 10px rgba(255,135,85,.18), 0 12px 22px rgba(255,135,85,.45); }
  }
  .ratio-card.matched {
    background: var(--good-soft);
    border-color: var(--good);
    box-shadow: 0 4px 0 rgba(45,191,148,.3);
  }
  .ratio-card.gone { opacity: 0; pointer-events: none; }

  /* ===== 강조 색상 ===== */
  .term-front { color: var(--tab-5); font-weight: 800; }
  .term-back  { color: var(--tab-7); font-weight: 800; }
  .term-out   { color: var(--tab-3); font-weight: 800; }
  .term-in    { color: var(--accent); font-weight: 800; }

  /* ===== 표 ===== */
  table.tbl { border-collapse: separate; border-spacing: 0; margin: 0 auto; border-radius: 14px; overflow: hidden; box-shadow: 0 3px 0 rgba(0,0,0,.05); }
  /* Stage 1 표는 5행이라 더 컴팩트하게 */
  table.tbl.s1-tbl th, table.tbl.s1-tbl td { padding: 8px 14px; font-size: 22px; }
  table.tbl.s1-tbl .ans { width: 64px; height: 42px; font-size: 22px; padding: 2px 4px; }
  /* 우유 칸(2열)은 빨강, 버터 칸(3열)은 초록 — 레시피 카드와 색 매칭 */
  table.tbl.s1-tbl th:nth-child(2),
  table.tbl.s1-tbl td:nth-child(2),
  table.tbl.s1-tbl td:nth-child(2) .ans { color: #dc2626 !important; }
  table.tbl.s1-tbl th:nth-child(3),
  table.tbl.s1-tbl td:nth-child(3),
  table.tbl.s1-tbl td:nth-child(3) .ans { color: #16a34a !important; }
  table.tbl.s1-tbl td:nth-child(2) .ans { border-color: #fca5a5 !important; }
  table.tbl.s1-tbl td:nth-child(3) .ans { border-color: #86efac !important; }
  table.tbl th, table.tbl td {
    border: 1px solid var(--line);
    padding: 12px 18px;
    text-align: center;
    font-size: 22px;
    background: #fff;
    font-weight: 600;
  }
  table.tbl th {
    background: var(--primary-soft);
    color: var(--primary-deep);
    font-weight: 800;
    font-size: 20px;
  }

  /* ===== 지갑(비례배분 시각화) ===== */
  .wallet {
    width: 42px; height: 28px;
    background: #15803d;
    border-radius: 4px;
    border: 2px solid #14532d;
    display: inline-block;
    margin: 2px;
    position: relative;
  }
  .wallet::after {
    content: '';
    position: absolute;
    top: 7px; left: 4px;
    width: 32px; height: 2px;
    background: #14532d;
  }

  /* ===== 토스트 (정답/오답 — 화면 중앙에 크게) ===== */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 4px solid var(--good);
    border-radius: 24px;
    padding: 26px 48px;
    font-size: 32px;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 16px 40px rgba(0,0,0,.25);
    z-index: 1000;
    animation: popInBig .4s cubic-bezier(.2,.9,.3,1.4);
    color: var(--ink);
    text-align: center;
    min-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .toast.bad { border-color: var(--bad); }
  .toast .toast-icon {
    font-size: 60px;
    line-height: 1;
    animation: starPop .5s ease-out;
  }
  .toast .toast-msg {
    font-size: 28px;
  }
  .toast.bad .toast-msg { color: var(--bad); }
  .toast:not(.bad) .toast-msg { color: var(--good); }
  .toast-next {
    margin-top: 6px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--primary-deep);
    transition: transform .12s;
  }
  .toast-next:hover { transform: translateY(-2px); }
  .toast-next:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-deep); }
  @keyframes popInBig {
    0%   { transform: translate(-50%, -50%) scale(.4); opacity: 0; }
    65%  { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* ===== 인장(스탬프) 애니메이션 ===== */
  .stamp {
    width: 150px;
    height: 150px;
    border: 6px solid var(--bad);
    border-radius: 50%;
    color: var(--bad);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    transform: rotate(-14deg);
    background: rgba(255,255,255,.55);
    box-shadow: 0 0 0 3px rgba(185,28,28,.25), 0 6px 14px rgba(0,0,0,.15);
    font-family: 'Nanum Pen Script', cursive;
    animation: stampDown .55s cubic-bezier(.2,1.4,.4,1);
  }
  .stamp .stamp-main { font-size: 38px; line-height: 1; letter-spacing: .04em; }
  .stamp .stamp-sub { font-size: 20px; margin-top: 6px; opacity: .85; }
  @keyframes stampDown {
    0%   { transform: rotate(-30deg) scale(2.5); opacity: 0; }
    60%  { transform: rotate(-12deg) scale(1.05); opacity: 1; }
    100% { transform: rotate(-14deg) scale(1); }
  }

  /* 미니 인장 (표지에서 작은 원형 표시) */
  .mini-stamp {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    border: 3px dashed var(--line);
    background: var(--paper-edge);
    color: var(--muted);
    margin: 0 auto;
    transition: transform .2s;
  }
  .mini-stamp.earned {
    border: 3px solid var(--tc, var(--accent));
    background: white;
    color: var(--tc, var(--accent));
    box-shadow: 0 0 0 3px rgba(0,0,0,.06), 0 4px 8px rgba(0,0,0,.12);
    transform: rotate(-7deg);
  }
  .mini-stamp.earned:hover { transform: rotate(0) scale(1.06); }

  /* 애니메이션 */
  .pop-in { animation: popIn .35s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes popIn { 0%{transform:scale(.7);opacity:0;} 70%{transform:scale(1.04);} 100%{transform:scale(1);opacity:1;} }
  .shake { animation: shake .35s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  .star-pop { animation: starPop .6s ease-out; display:inline-block; }
  @keyframes starPop { 0%{transform:scale(0) rotate(0);} 60%{transform:scale(1.4) rotate(220deg);} 100%{transform:scale(1) rotate(360deg);} }
  .float { animation: floaty 3s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* 호환용: 기존 step-dot, .card */
  .step-dot { transition: all .2s; }
  .card { background: transparent; }
  .content-card { flex: 1 1 auto; min-height: 0; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* 단계 콘텐츠는 페이지에 골고루 분배 (위쪽 치우침 방지) */
  #content .text-center { width: 100%; }

  /* ===== 모달 (가이드, 풀이 설명) ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(74,56,38,.55);
    z-index: 1090;
    animation: fadeIn .25s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 4px solid var(--accent);
    border-radius: 24px;
    padding: 22px 28px;
    width: min(92vw, 600px);
    max-height: 86vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    z-index: 1100;
    animation: popInBig .4s cubic-bezier(.2,.9,.3,1.4);
    font-family: 'Jua', sans-serif;
  }
  .modal-title {
    font-size: 28px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
  }
  .modal-content { font-size: 20px; line-height: 1.6; color: var(--ink); }
  .modal-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
  }

  /* 도전 가이드 — 단계(나무 성장) */
  .level-list { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .level-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: var(--paper-edge);
    border: 2px solid transparent;
    border-radius: 14px;
    transition: transform .12s;
  }
  .level-item.current {
    background: linear-gradient(135deg, #fff8e1 0%, #ffe2a3 100%);
    border-color: var(--accent);
    transform: scale(1.02);
    box-shadow: 0 4px 0 rgba(243,158,44,.25);
  }
  .level-emoji { font-size: 40px; flex-shrink: 0; line-height: 1; }
  .level-info { flex: 1; }
  .level-name { font-size: 20px; color: var(--ink); }
  .level-desc { font-size: 20px; color: var(--ink-soft); margin-top: 2px; }
  .level-stars { font-size: 20px; color: var(--ink-soft); white-space: nowrap; }
  .level-item.current .level-stars { color: var(--accent); }
  .level-now-badge {
    background: var(--accent);
    color: white;
    font-size: 20px;
    padding: 3px 10px;
    border-radius: 999px;
    margin-left: 6px;
  }

  /* 가이드 버튼(홈) */
  .guide-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #f5b56a 100%);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Jua', sans-serif;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(243,158,44,.4);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform .12s;
  }
  .guide-btn:hover { transform: translateY(-2px); }

  /* ===== 단계 페이지 액션바 — 항상 우측 하단에 고정, 잘리지 않도록 위에 띄움 ===== */
  /* book(.relative) 기준으로 absolute */
  .step-actions {
    position: absolute;
    right: 28px;
    bottom: 18px;
    z-index: 80;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 250, 238, 0.92);
    padding: 6px 8px;
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,.12);
  }
  /* 페이지 콘텐츠는 액션바 자리 확보 */
  .page-content { padding-bottom: 60px; }
  /* 버튼 세부 — 정답확인은 disabled 시에도 의미 전달 */
  .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

  /* ===========================================================
     첫 페이지 (이름 입력)
  =========================================================== */
  .welcome {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .welcome-mascot {
    width: 160px;
    height: 160px;
    animation: floaty 3.5s ease-in-out infinite;
  }
  .welcome-mascot svg { width: 100%; height: 100%; }
  .welcome-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--primary-deep);
    letter-spacing: -.02em;
  }
  .welcome-sub {
    font-size: 22px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .welcome-form {
    background: white;
    border: 3px solid var(--paper-deep);
    border-radius: 24px;
    padding: 24px 36px;
    box-shadow: 0 6px 0 rgba(0,0,0,.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 8px;
  }
  .welcome-label {
    font-size: 20px;
    color: var(--ink);
    font-weight: 700;
  }
  .welcome-input,
  .welcome-select {
    font-family: inherit;
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    width: 360px;
    padding: 12px 18px;
    border: 2px solid var(--paper-deep);
    border-radius: 14px;
    background: var(--paper);
    color: var(--ink);
  }
  .welcome-select { cursor: pointer; text-align-last: center; }
  .welcome-input:focus,
  .welcome-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,135,85,.18); }
  .welcome-loading { font-size: 20px; color: var(--ink-soft); }
  .welcome-start {
    font-size: 22px;
    padding: 14px 36px;
  }

  /* ===========================================================
     홈 (스테이지 선택) — 7개 챕터 카드 가로 배치
  =========================================================== */
  .home-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .home-greeting {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .home-mascot {
    width: 78px;
    height: 78px;
    animation: floaty 4s ease-in-out infinite;
    flex: 0 0 auto;
  }
  .home-mascot svg { width: 100%; height: 100%; }
  .home-title {
    font-family: 'Jua', sans-serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -.01em;
    line-height: 1.1;
  }
  .home-sub {
    font-size: 24px;
    color: var(--ink-soft);
    font-weight: 400;
    margin-top: 4px;
  }
  .home-sub b { color: var(--primary-deep); font-weight: 400; }
  .home-rename {
    font-size: 20px;
    color: var(--muted);
    text-decoration: underline;
    background: none; border: none;
    font-family: inherit;
    cursor: pointer;
    margin-left: 6px;
  }
  .home-stats {
    display: flex;
    gap: 10px;
  }
  .stat-pill {
    background: white;
    border: 2px solid var(--paper-deep);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(0,0,0,.04);

function loadStudentList(){
  // Apps Script 환경: google.script.run 사용
  if(typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(list => {
        STUDENT_LIST = (Array.isArray(list) && list.length) ? list : null;
        studentLoadDone = true;
        if(state.screen === 'welcome') render();
      })
      .withFailureHandler(() => {
        studentLoadDone = true;
        if(state.screen === 'welcome') render();
      })
      .getStudentList();
  } else {
    // Standalone: window.STUDENT_LIST가 미리 설정돼 있으면 사용
    STUDENT_LIST = (Array.isArray(window.STUDENT_LIST) && window.STUDENT_LIST.length) ? window.STUDENT_LIST : null;

  const canvas = document.getElementById('canvas');
  if(!canvas) return;
  const sx = window.innerWidth / BASE_W;
  const sy = window.innerHeight / BASE_H;
  const s = Math.min(sx, sy);
  canvas.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitScale);
window.addEventListener('orientationchange', ()=> setTimeout(fitScale, 50));
document.addEventListener('DOMContentLoaded', fitScale);

];
function getLevel(stars){
  let lvl = LEVELS[0];
  for(const l of LEVELS) if(stars >= l.stars) lvl = l;
  return lvl;
}
function nextLevel(stars){
  for(const l of LEVELS) if(stars < l.stars) return l;
  return null;
}

/* 모달 헬퍼 — 가이드/풀이 설명 등에 재사용 */
function showModal(titleHtml, contentHtml, actions, opts={}){
  const overlay = el(`<div class="modal-overlay"></div>`);
  const styles = [];
  if(opts.wide) styles.push(`width:min(96vw,${opts.wide === true ? 980 : opts.wide}px)`);
  // offsetTop — 모달을 화면 중앙에서 아래로 추가 이동 (예: '1cm'/'40px')
  if(opts.offsetTop) styles.push(`top:calc(50% + ${opts.offsetTop})`);
  const styleAttr = styles.length ? ` style="${styles.join(';')}"` : '';
  const modal = el(`
    <div class="modal"${styleAttr}>
      <div class="modal-title">${titleHtml}</div>
      <div class="modal-content">${contentHtml}</div>
      <div class="modal-actions"></div>
    </div>
  `);
  const actionsDiv = modal.querySelector('.modal-actions');
  const close = ()=>{ overlay.remove(); modal.remove(); };
  (actions || [{label:'닫기', cls:'btn-secondary'}]).forEach(a=>{
    const btn = el(`<button class="btn ${a.cls || 'btn-primary'}">${a.label}</button>`);
    btn.addEventListener('click', ()=>{ close(); if(a.onClick) a.onClick(); });
    actionsDiv.appendChild(btn);
  });
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
}

function showGuide(){
  const total = Object.values(state.progress).reduce((a,b)=>a+b,0);
  const cur = getLevel(total);
  const next = nextLevel(total);
  const itemsHtml = LEVELS.map(l=>{
    const isCurrent = l === cur;
    return `
      <div class="level-item ${isCurrent?'current':''}">
        <div class="level-emoji">${l.emoji}</div>
        <div class="level-info">
          <div class="level-name">${l.name}${isCurrent?'<span class="level-now-badge">현재</span>':''}</div>
          <div class="level-desc">${l.desc}</div>
        </div>
        <div class="level-stars">⭐ ${l.stars}+</div>
      </div>
    `;
  }).join('');
  const nextHint = next
    ? `다음 단계 <b>${next.emoji} ${next.name}</b>까지 별 <b style="color:var(--accent)">${next.stars - total}개</b> 남았어요!`
    : `🎉 모든 단계를 완성했어요! 비례식 마스터 나무!`;
  showModal(
    `🌳 도전 가이드`,
    `<div style="text-align:center;font-size:20px;color:var(--ink-soft);margin-bottom:8px">별을 모을수록 식물이 자라요</div>
     <div class="level-list">${itemsHtml}</div>
     <div style="text-align:center;font-size:20px;background:var(--paper-edge);padding:10px 14px;border-radius:12px;margin-top:8px">${nextHint}</div>`,
    [{ label:'알겠어요!', cls:'btn-primary' }]
  );
}

function nextRecommendedGroup(){
  for(const id of [1,2,3,4]){
    if((state.progress[id]||0) < 3) return id;
  }
  return 3;
}

function go(screen, opts={}){
  state.screen = screen;
  if(opts.group !== undefined) state.group = opts.group;
  if(opts.stage !== undefined) state.stage = opts.stage;
  if(opts.step !== undefined) state.step = opts.step;
  else if(opts.stage !== undefined || opts.group !== undefined) state.step = 0;
  state.data = {};
  render();
}
function nextStep(){
  state.step++;
  state.data = {};
  // 현재 소단원 끝에 다다르면 같은 단원의 다음 소단원으로 자동 진행
  const stageSteps = (stageDefs[state.stage] || []).length;
  if(state.step >= stageSteps){
    const g = GROUPS[groupOf(state.stage)];
    const idx = g.sections.indexOf(state.stage);
    if(idx >= 0 && idx < g.sections.length - 1){
      state.stage = g.sections[idx + 1];
      state.step = 0;
    }
  }
  render();
}
function prevStep(){
  state.data = {};
  if(state.step > 0){
    state.step--;
  } else {
    // 단원 안에서 이전 소단원의 마지막 단계로
    const g = GROUPS[groupOf(state.stage)];
    const idx = g.sections.indexOf(state.stage);
    if(idx > 0){
      state.stage = g.sections[idx - 1];
      state.step = (stageDefs[state.stage] || []).length - 1;
    } else {
      // 단원의 첫 단계 → 목차로
      go('menu', { group: g.id });
      return;
    }
  }
  render();
}
function isFirstStepOfGroup(){
  const g = GROUPS[groupOf(state.stage)];
  return g.sections[0] === state.stage && state.step === 0;
}

function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}

/* 분수 표기 — 분모 분의 분자 (분모 아래, 분자 위, 슬래시 X) */
function F(num, den){
  return `<span class="frac"><span>${num}</span><span>${den}</span></span>`;
}

/* 약분 표시 분수 — 원래 분자/분모에 대각선 + 새 숫자가 나란히 표시됨
   예) RF(5, 10, 1, 2) → 5와 10에 대각선, 1과 2가 옆에 작게 */
function RF(origNum, origDen, newNum, newDen){
  return `<span class="frac frac-reduce">
    <span class="orig" data-new="${newNum}">${origNum}</span>
    <span class="orig" data-new="${newDen}">${origDen}</span>
  </span>`;
}

/* Tesseract.js OCR worker — 손글씨로 쓴 숫자를 인식 */
let _tessWorker = null;
let _tessLoading = null;
async function getOCRWorker(){
  if(_tessWorker) return _tessWorker;
  if(typeof Tesseract === 'undefined') return null;
  if(_tessLoading) return _tessLoading;
  _tessLoading = (async ()=>{
    const w = await Tesseract.createWorker('eng');
    try {
      await w.setParameters({
        // 한국식 '1'(세로 막대)을 Tesseract 가 'l'/'I'/'|' 로 돌려줄 때도 받아 후처리에서 '1'로 변환
        tessedit_char_whitelist: '0123456789lI|',
        // 7 = Treat the image as a single text line (한 자리·여러 자리수 모두 안정적)
        tessedit_pageseg_mode: '7',
        classify_bln_numeric_mode: '1'
      });
    } catch(e){ /* 일부 버전에서 누락된 파라미터 무시 */ }
    _tessWorker = w;
    return w;
  })();
  return _tessLoading;
}


/* 손글씨 캔버스를 OCR이 잘 읽도록 전처리
   1) 잉크 픽셀 바운딩 박스 검출 → 빈 여백 제거
   2) 정사각형(또는 종횡비 유지) 영역으로 잘라내기 + 충분한 여백 추가
   3) 320×320 크기로 업스케일 + 이진화(검정 vs 흰)
   4) 획을 살짝 굵게 dilate — 가는 손글씨도 안정적으로 인식
   결과 캔버스를 반환 (잉크 없으면 null) */
function preprocessForOCR(canvas){
  if(!canvas || !canvas.width || !canvas.height) return null;
  const ctx = canvas.getContext('2d');
  let img;
  try { img = ctx.getImageData(0, 0, canvas.width, canvas.height); }
  catch(e){ return null; }
  const W = canvas.width, H = canvas.height;
  const data = img.data;
  // 잉크 마스크 + 바운딩 박스
  const ink = new Uint8Array(W * H);
  let minX=W, minY=H, maxX=-1, maxY=-1, count=0;
  for(let y = 0; y < H; y++){
    for(let x = 0; x < W; x++){
      const i = (y * W + x) * 4;
      // RGB 평균이 어두우면 잉크 (배경은 흰)
      const v = (data[i] + data[i+1] + data[i+2]) / 3;
      if(v < 160){
        ink[y * W + x] = 1; count++;
        if(x < minX) minX = x; if(x > maxX) maxX = x;
        if(y < minY) minY = y; if(y > maxY) maxY = y;
      }
    }
  }
  if(count < 12 || maxX < 0) return null;  // 거의 빈 칸

  // 1px dilate — 가는 획을 굵게
  const dilated = new Uint8Array(W * H);
  for(let y = minY; y <= maxY; y++){
    for(let x = minX; x <= maxX; x++){
      if(ink[y * W + x]){
        for(let dy = -1; dy <= 1; dy++){
          for(let dx = -1; dx <= 1; dx++){
            const nx = x + dx, ny = y + dy;
            if(nx >= 0 && nx < W && ny >= 0 && ny < H) dilated[ny * W + nx] = 1;
          }
        }
      }
    }
  }
  // dilate로 바운딩 박스가 살짝 커짐 — 다시 측정
  let dMinX=W, dMinY=H, dMaxX=-1, dMaxY=-1;
  for(let y = Math.max(0, minY-1); y <= Math.min(H-1, maxY+1); y++){
    for(let x = Math.max(0, minX-1); x <= Math.min(W-1, maxX+1); x++){
      if(dilated[y * W + x]){
        if(x < dMinX) dMinX = x; if(x > dMaxX) dMaxX = x;
        if(y < dMinY) dMinY = y; if(y > dMaxY) dMaxY = y;
      }
    }
  }
  const inkW = dMaxX - dMinX + 1;
  const inkH = dMaxY - dMinY + 1;

  // 정사각형 캔버스 (320×320) — 잉크를 가운데 정렬, 양쪽 여백 25%
  const OUT = 320;
  const PAD_RATIO = 0.25;
  const side = Math.max(inkW, inkH);
  const sideWithPad = side * (1 + 2 * PAD_RATIO);
  const scale = OUT / sideWithPad;
  const outW = Math.round(inkW * scale);
  const outH = Math.round(inkH * scale);
  const offsetX = Math.round((OUT - outW) / 2);
  const offsetY = Math.round((OUT - outH) / 2);

  const out = document.createElement('canvas');
  out.width = OUT;
  out.height = OUT;
  const octx = out.getContext('2d');
  octx.fillStyle = 'white';
  octx.fillRect(0, 0, OUT, OUT);

  // dilated 잉크 영역을 새 캔버스에 그리기 — 임시 캔버스에 잉크 마스크를 검은색으로 그려서 drawImage
  const tmp = document.createElement('canvas');
  tmp.width = inkW; tmp.height = inkH;
  const tctx = tmp.getContext('2d');
  const tImg = tctx.createImageData(inkW, inkH);
  for(let y = 0; y < inkH; y++){
    for(let x = 0; x < inkW; x++){
      const srcIdx = (dMinY + y) * W + (dMinX + x);
      const dstIdx = (y * inkW + x) * 4;
      if(dilated[srcIdx]){
        tImg.data[dstIdx] = 0; tImg.data[dstIdx+1] = 0; tImg.data[dstIdx+2] = 0; tImg.data[dstIdx+3] = 255;
      } else {
        tImg.data[dstIdx] = 255; tImg.data[dstIdx+1] = 255; tImg.data[dstIdx+2] = 255; tImg.data[dstIdx+3] = 255;
      }
    }
  }
  tctx.putImageData(tImg, 0, 0);
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(tmp, 0, 0, inkW, inkH, offsetX, offsetY, outW, outH);
  return out;
}

/* 잉크 픽셀의 바운딩 박스·종횡비 등 기본 특성 계산 — 한국식 손글씨 휴리스틱용 */
function computeInkFeatures(canvas){
  if(!canvas || !canvas.width || !canvas.height) return null;
  const ctx = canvas.getContext('2d');
  let img;
  try { img = ctx.getImageData(0, 0, canvas.width, canvas.height); }
  catch(e){ return null; }
  const W = canvas.width, H = canvas.height;
  const data = img.data;
  let minX = W, minY = H, maxX = -1, maxY = -1, count = 0;
  for(let y = 0; y < H; y++){
    for(let x = 0; x < W; x++){
      const i = (y * W + x) * 4;
      const v = (data[i] + data[i+1] + data[i+2]) / 3;
      if(v < 160){
        count++;
        if(x < minX) minX = x;
        if(x > maxX) maxX = x;
        if(y < minY) minY = y;
        if(y > maxY) maxY = y;
      }
    }
  }
  if(count < 8 || maxX < 0) return null;  // 빈 칸으로 간주
  const inkW = maxX - minX + 1;
  const inkH = maxY - minY + 1;
  return {
    W, H, minX, minY, maxX, maxY, inkW, inkH, count,
    aspectRatio: inkH / Math.max(1, inkW),
    widthRatio: inkW / W,
    inkRatio: count / Math.max(1, inkW * inkH)
  };
}

/* 닫힌 흰색 영역(loop) 개수와 각 영역의 중심을 반환 — 6/8/9/0 구분용
   잉크를 살짝 두껍게 dilate해서 작은 틈을 메운 뒤, 가장자리부터 flood fill로 외부 영역을 표시한다.
   외부로 표시되지 않은 흰색 픽셀들의 연결 영역이 곧 loop이다. */
function countInkLoops(canvas){
  if(!canvas || !canvas.width || !canvas.height) return { count: 0, centroids: [] };
  const ctx = canvas.getContext('2d');
  let img;
  try { img = ctx.getImageData(0, 0, canvas.width, canvas.height); }
  catch(e){ return { count: 0, centroids: [] }; }
  const W = canvas.width, H = canvas.height;
  const data = img.data;
  const isInk = new Uint8Array(W * H);
  for(let y = 0; y < H; y++){
    for(let x = 0; x < W; x++){
      const i = (y * W + x) * 4;
      const v = (data[i] + data[i+1] + data[i+2]) / 3;
      if(v < 160) isInk[y * W + x] = 1;
    }
  }
  // dilate 반경 — 가느다란 손글씨의 작은 틈을 메우기 위해 살짝 두껍게
  const DR = 2;
  const inkMask = new Uint8Array(W * H);
  for(let y = 0; y < H; y++){
    for(let x = 0; x < W; x++){
      if(isInk[y * W + x]){
        for(let dy = -DR; dy <= DR; dy++){
          for(let dx = -DR; dx <= DR; dx++){
            const nx = x + dx, ny = y + dy;
            if(nx >= 0 && nx < W && ny >= 0 && ny < H){
              inkMask[ny * W + nx] = 1;
            }
          }
        }
      }
    }
  }
  // 가장자리의 흰색 픽셀에서 flood fill — 외부 영역 표시
  const visited = new Uint8Array(W * H);
  const queue = [];
  function pushIfWhite(p){
    if(!inkMask[p] && !visited[p]){ visited[p] = 1; queue.push(p); }
  }
  for(let x = 0; x < W; x++){ pushIfWhite(x); pushIfWhite((H-1)*W + x); }
  for(let y = 0; y < H; y++){ pushIfWhite(y * W); pushIfWhite(y * W + (W-1)); }
  while(queue.length){
    const p = queue.pop();
    const y = Math.floor(p / W), x = p - y * W;
    if(x > 0)   pushIfWhite(p - 1);
    if(x < W-1) pushIfWhite(p + 1);
    if(y > 0)   pushIfWhite(p - W);
    if(y < H-1) pushIfWhite(p + W);
  }
  // 외부에 표시되지 않은 흰색 픽셀 = 닫힌 영역(loop)
  const centroids = [];
  for(let y = 0; y < H; y++){
    for(let x = 0; x < W; x++){
      const p = y * W + x;
      if(!inkMask[p] && !visited[p]){
        let sumX = 0, sumY = 0, n = 0;
        const q = [p];
        visited[p] = 1;
        while(q.length){
          const pp = q.pop();
          const py = Math.floor(pp / W), px = pp - py * W;
          sumX += px; sumY += py; n++;
          if(px > 0){   const np = pp - 1; if(!inkMask[np] && !visited[np]){ visited[np] = 1; q.push(np); } }
          if(px < W-1){ const np = pp + 1; if(!inkMask[np] && !visited[np]){ visited[np] = 1; q.push(np); } }
          if(py > 0){   const np = pp - W; if(!inkMask[np] && !visited[np]){ visited[np] = 1; q.push(np); } }
          if(py < H-1){ const np = pp + W; if(!inkMask[np] && !visited[np]){ visited[np] = 1; q.push(np); } }
        }
        // 노이즈 제외 — 캔버스 면적의 0.3% 이상인 영역만 loop로 인정
        if(n >= Math.max(20, W * H * 0.003)){
          centroids.push({ x: sumX / n, y: sumY / n, size: n });
        }
      }
    }
  }
  return { count: centroids.length, centroids };
}

async function recognizeDigitsFromCanvas(canvas){
  if(!canvas) return '';
  try {
    const features = computeInkFeatures(canvas);
    if(!features) return '';  // 빈 칸

    // 1) 한국식 "1" — 단순 세로획. 임계값을 완화해서 더 잘 잡아냄.
    //    종횡비 ≥ 1.7 (높이가 폭의 1.7배 이상) 이고 폭이 캔버스의 38% 미만이면 1로 분류.
    //    (l, |, 단순 세로획 모두 포함)
    if(features.aspectRatio >= 1.7 && features.widthRatio < 0.38){
      return '1';
    }

    // 2) Loop 검출 — 6/8/9/0 구분용
    const loops = countInkLoops(canvas);

    // 2-1) 닫힌 영역 2개 이상 → "8"
    if(loops.count >= 2){
      return '8';
    }

    // 3) Tesseract OCR 실행 (참고용)
    const w = await getOCRWorker();
    let ocrResult = '';
    if(w){
      const processed = preprocessForOCR(canvas);
      if(processed){
        const { data:{ text } } = await w.recognize(processed);
        ocrResult = (text||'').replace(/\D/g, '').trim();
      }
    }

    // 4) 닫힌 영역 1개 → OCR 결과 우선, 비었으면 위치/크기 기반 휴리스틱
    if(loops.count === 1){
      const c = loops.centroids[0];
      const cy = c.y, cx = c.x;
      const relY = (cy - features.minY) / Math.max(1, features.inkH);
      const relX = (cx - features.minX) / Math.max(1, features.inkW);
      const loopAreaRatio = c.size / Math.max(1, features.inkW * features.inkH);

      // OCR이 명확한 숫자로 읽었으면 그대로 신뢰 — Tesseract는 보통 4와 9를 구분함
      //   '9' 도 신뢰 목록에 추가: 한국식 9를 작게·왼쪽에 그렸을 때 휴리스틱이 4로 오판하는 문제 방지
      if(['2','3','4','5','7','9'].includes(ocrResult)) return ocrResult;

      // OCR이 비었거나 0/6/8/1 같은 모호한 결과 → 위치/크기로 폴백
      // 4: loop이 명확히 좌측(relX < 0.40) + 위쪽(relY < 0.5) + 작음(loopAreaRatio < 0.20)
      //    임계값을 strict 하게 잡아서 9 → 4 오판을 줄임
      if(relY < 0.5 && relX < 0.40 && loopAreaRatio < 0.20) return '4';

      // 0/6/9 위치 판별
      //   위쪽(relY < 0.45): 9
      //   아래쪽(relY > 0.55): 6
      //   가운데: 0
      if(relY < 0.45) return '9';
      if(relY > 0.55) return '6';
      return '0';
    }

    // 5) Loop 없음 — OCR 결과가 비었거나 의심스러우면 종횡비 기반 폴백
    if(!ocrResult){
      if(features.aspectRatio >= 1.5 && features.widthRatio < 0.45){
        return '1';  // 1로 추정
      }
    }
    // OCR이 1로 인식했지만 모양이 충분히 얇지 않으면 다른 숫자일 가능성 — 그래도 OCR 신뢰
    return ocrResult;
  } catch(e){
    console.warn('OCR 인식 실패:', e);
    return '';
  }
}

/* 손글씨 답 패드 — 마우스/터치로 그리기 + 흰 배경 + clear() 함수 반환
   opts.onChange — 그리기가 끝날 때마다 호출(디바운스 적용). OCR 자동 인식 등에 활용 */
function setupAnswerPad(canvas, opts = {}){
  if(!canvas) return null;
  const ctx = canvas.getContext('2d');
  function fit(){
    const rect = canvas.getBoundingClientRect();
    // 캔버스를 흰 배경으로 채우는 것은 첫 사이즈 결정 시 한 번만 — 이후에는 사용자가 그린 획을 지우지 않음
    const needResize = (rect.width > 5 && rect.height > 5 &&
      (canvas.width !== Math.round(rect.width) || canvas.height !== Math.round(rect.height)));
    if(needResize){
      canvas.width  = Math.round(rect.width);
      canvas.height = Math.round(rect.height);
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  setTimeout(fit, 60);
  setTimeout(fit, 300);
  let drawing = false;
  let changeTimer = null;
  function fireChange(){
    if(!opts.onChange) return;
    clearTimeout(changeTimer);
    // 디바운스 — 빠른 연속 그리기 시 마지막 한 번만 실행 (OCR 비용 절약)
    changeTimer = setTimeout(()=> opts.onChange(), 350);
  }
  function getP(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
             y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
  }
  canvas.addEventListener('mousedown', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); });
  canvas.addEventListener('mousemove', e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
  canvas.addEventListener('mouseup',    ()=>{ if(drawing){ drawing=false; fireChange(); } });
  canvas.addEventListener('mouseleave', ()=>{ if(drawing){ drawing=false; fireChange(); } });
  canvas.addEventListener('touchstart', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchend',   ()=>{ if(drawing){ drawing=false; fireChange(); } });
  return {
    clear: ()=>{
      // 대기 중인 OCR 호출 취소 — 이전 그림의 결과가 다음 문제에 잘못 들어가는 것을 막음
      clearTimeout(changeTimer);
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    },
    isEmpty: ()=>{
      // 단순 휴리스틱 — 검은 픽셀이 거의 없으면 빈 칸으로 간주
      try {
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let inked = 0;
        for(let i = 0; i < img.data.length; i += 4){
          // RGB가 모두 작으면 검은 픽셀
          if(img.data[i] < 200 && img.data[i+1] < 200 && img.data[i+2] < 200) inked++;
        }
        return inked < 20;
      } catch(e){ return false; }
    }
  };
}

/* 정답 시 꽃가루 — 화면 아래에서 위로(약간 대각선) 부채꼴 모양으로 한 번 터지고 사라짐 */
function confetti(){
  const burst = document.createElement('div');
  burst.className = 'confetti-burst';
  document.body.appendChild(burst);
  const colors = ['#ff8755', '#f39e2c', '#2dbf94', '#ec6da4', '#5dafe8', '#a78bfa', '#84d05c'];
  const N = 80;
  for(let i = 0; i < N; i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = '50%';
    p.style.top = '100%';  // 화면 가장 아래에서 출발
    // 좁은 부채꼴 (수직 기준 ±35°) — 위쪽 방향이 주, 양쪽 약간 대각선
    const spread = (Math.random() - 0.5) * (Math.PI * 7 / 18);  // ±35°
    const speed = 420 + Math.random() * 280;
    const dx = Math.sin(spread) * speed;
    const dy = -Math.cos(spread) * speed;  // 음수 = 위쪽
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.animationDelay = (Math.random() * 0.08) + 's';
    burst.appendChild(p);
  }
  setTimeout(() => burst.remove(), 1200);
}

/* 정답 처리 — 꽃가루 한 번 터뜨리고, 단계 페이지 우측 하단에 "다음 →" 버튼을 보여줌 */
function correctAnswer(onNext){
  confetti();
  // #content 안의 step-actions 영역의 기존 버튼을 숨기고 "다음 →" 버튼을 추가/표시
  document.querySelectorAll('#content .step-actions').forEach(area => {
    Array.from(area.querySelectorAll('button')).forEach(b => {
      if(b.classList.contains('btn-next-after')) return;
      b.style.display = 'none';
    });
    let next = area.querySelector('.btn-next-after');
    if(!next){
      next = document.createElement('button');
      next.className = 'btn btn-pink btn-next-after';
      next.textContent = '다음 →';
      area.appendChild(next);
    } else {
      next.style.display = '';
    }
    next.onclick = onNext || nextStep;
  });
}

function toast(msg, ok=true, opts={}){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  // 정답일 때는 토스트 팝업 없이 꽃가루 + "다음 →" 버튼만
  if(ok){
    if(opts.onNext === null){
      // 부분 정답(예: 짝짓기 도중) — 꽃가루만, 진행 없음
      confetti();
    } else {
      correctAnswer(opts.onNext);
    }
    return;
  }
  // 오답: 기존 토스트 팝업 (자동으로 1.5초 후 사라짐)
  const t = el(`
    <div class="toast bad">
      <span class="toast-icon">🤔</span>
      <div class="toast-msg">${msg}</div>
    </div>
  `);
  document.body.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); }, 1500);
}

function awardStars(stageId, stars){
  const prev = state.progress[stageId] || 0;
  if(stars > prev){ state.progress[stageId] = stars; save(); }
}

/* ============== 첫 페이지 — 환영 / 이름 선택(또는 입력) ============== */
function renderWelcomePage(){
  const hasList = Array.isArray(STUDENT_LIST) && STUDENT_LIST.length > 0;
  const loading = !studentLoadDone && (typeof google !== 'undefined' && google.script);

  // 명단 항목을 {name, display} 형태로 정규화
  // - 서버가 [{number, name}] 으로 주면 "번호. 이름" 으로 표시
  // - 단순 문자열 배열이면 그대로 표시
  const normalize = (s) => {
    if (typeof s === 'string') return { name: s, display: s };
    if (s && typeof s === 'object' && s.name) {
      const num = (s.number != null && String(s.number).trim()) ? String(s.number).trim() : '';
      return { name: String(s.name).trim(), display: num ? `${num}. ${s.name}` : String(s.name) };
    }
    return { name: '', display: '' };
  };

  // 입력 영역: 명단이 있으면 드롭다운, 없으면 텍스트 입력
  let inputHtml;
  if(hasList){
    // 매 접속마다 새로 선택해야 하므로 자동 selected 표시는 하지 않음
    const opts = STUDENT_LIST.map(s => {
      const {name, display} = normalize(s);
      if (!name) return '';
      const v = name.replace(/"/g,'&quot;');
      return `<option value="${v}">${display}</option>`;
    }).join('');
    inputHtml = `
      <select class="welcome-select" id="name-select">
        <option value="">— 번호·이름을 선택하세요 —</option>
        ${opts}
        <option value="__OTHER__">✏ 명단에 없어요 (직접 입력)</option>
      </select>
      <input class="welcome-input" id="name-input" placeholder="이름을 입력하세요" maxlength="12" style="display:none;width:300px" />
    `;
  } else {
    inputHtml = `<input class="welcome-input" id="name-input" placeholder="이름을 입력하세요" maxlength="12" />`;
  }

  const root = el(`
    <div class="welcome">
      <div class="welcome-mascot">${BAKER_SVG}</div>
      <div class="welcome-title">따끈따끈 베이커리</div>
      <div class="welcome-sub">6학년 2학기 · 비례식과 비례배분 — <b style="color:var(--accent)">꼬마 제빵사 도전기</b></div>
      <div class="welcome-form">
        <div class="welcome-label">${hasList ? '명단에서 자기 번호·이름을 선택하세요' : '꼬마 제빵사의 이름을 알려주세요!'}</div>
        ${inputHtml}
        ${loading ? `<div class="welcome-loading">📋 명단 불러오는 중…</div>` : ''}
        <button class="btn btn-primary welcome-start" id="start">베이커리 시작하기 →</button>
      </div>
    </div>
  `);

  const input = root.querySelector('#name-input');
  const select = root.querySelector('#name-select');
  const start = root.querySelector('#start');

  if(hasList){
    select.addEventListener('change', ()=>{
      if(select.value === '__OTHER__'){
        // 직접 입력 모드로 전환
        select.style.display = 'none';
        input.style.display = '';
        input.focus();
      }
    });
    setTimeout(()=> select.focus(), 50);
  } else {
    // 텍스트 입력 모드 — 항상 비워서 시작
    setTimeout(()=> input.focus(), 50);
  }

  function getName(){
    if(hasList && select && select.style.display !== 'none' && select.value && select.value !== '__OTHER__'){
      return select.value.trim();
    }
    return (input.value||'').trim();
  }
  function begin(){
    const name = getName() || '꼬마 제빵사';
    if(hasList && (!select.value || select.value === '__OTHER__') && !(input.value||'').trim()){
      // 드롭다운에서 선택도 안 했고 직접 입력도 안 함
      select.focus();
      return;
    }
    saveName(name);
    go('home');
  }
  start.addEventListener('click', begin);
  if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter') begin(); });
  return root;
}

        <div class="menu-goal"><b>🎯 오늘의 학습 목표</b> &nbsp; ${stage.desc}</div>
      </div>

      <div class="menu-list">${items}</div>

      <div class="menu-help">📊 <b>학습 단계</b> — 순서대로 진행하거나, 원하는 단계를 직접 선택할 수 있어요!</div>
    </div>
  `);

  root.querySelector('#home').addEventListener('click', ()=> go('home'));
  root.querySelectorAll('.menu-item').forEach(it=>{
    it.addEventListener('click', ()=>{
      const sId = +it.dataset.stage;
      const stepIdx = +it.dataset.step;
      go('stage', { group: state.group, stage: sId, step: stepIdx });
    });
  });

  return root;
}

/* ============== 학습 단계 페이지 ============== */
function renderStagePage(){
  const s = STAGES.find(x=>x.id===state.stage);
  const steps = stageDefs[state.stage];
  const totalSteps = steps.length;
  const stepFn = steps[Math.min(state.step, totalSteps-1)];
  const stepInfo = (STEP_NAMES[s.id] && STEP_NAMES[s.id][state.step])
                    || { name:`단계 ${state.step+1}`, icon:'📘' };
  // 단원의 색
  const gid = groupOf(state.stage);
  const tabIdx = groupColor(gid);

  // 그룹(=메인 탭) 전체 페이지 수 + 현재 위치 (하위 페이지 포함)
  // SUB_PAGE_CONFIGS: 특정 단원·단계에 sub-page가 있으면 count·key 명시
  const SUB_PAGE_CONFIGS = {
    3: { 2: { count: 3, key: 'sub' } },                           // 비례식 (Stage 3) 핵심 정리
    4: { 1: { count: 3, key: 'sub2' }, 2: { count: 3, key: 'sub' } }, // 비례식의 성질 개념·핵심
  };
  const groupSections = GROUPS[gid].sections;
  let groupTotal = 0;
  let groupPos = 0;
  for(const sId of groupSections){
    const steps = stageDefs[sId] || [];
    for(let i = 0; i < steps.length; i++){
      const cfg = (SUB_PAGE_CONFIGS[sId] && SUB_PAGE_CONFIGS[sId][i]) || { count: 1 };
      if(sId === state.stage && i === state.step){
        const subIdx = cfg.key ? ((state.data[cfg.key] ?? 0)|0) : 0;
        groupPos = groupTotal + subIdx + 1;
      }
      groupTotal += cfg.count;
    }
  }

  const isFirst = isFirstStepOfGroup();

  const root = el(`
    <div class="screen" style="--page-color: var(--tab-${tabIdx})">
      <div class="topbar">
        <div style="display:flex;gap:8px">
          <button class="topbar-btn" id="home" title="홈으로">🏠</button>
          <button class="topbar-btn" id="prev" title="이전 단계로" ${isFirst?'disabled style="opacity:.4;cursor:not-allowed"':''}>←</button>
        </div>
        <div class="topbar-title">
          <span style="color:var(--tab-${s.id})">${s.emoji}</span>
          <span>${s.title}</span>
          <span style="color:var(--muted);font-size:20px">·</span>
          <span style="color:var(--ink-soft);font-size:20px">${stepInfo.icon} ${stepInfo.name}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="page-pill">${groupPos} / ${groupTotal}</div>
          <button class="topbar-toc" id="toc">목차</button>
        </div>
      </div>

      <div class="page-content pop-in" id="content"></div>
    </div>
  `);

  root.querySelector('#home').addEventListener('click', ()=> go('home'));
  root.querySelector('#toc').addEventListener('click', ()=> go('menu', { group: gid }));
  const prevBtn = root.querySelector('#prev');
  if(!isFirst) prevBtn.addEventListener('click', ()=> prevStep());
  root.querySelector('#content').appendChild(stepFn());
  return root;
}

function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a; }

function makeProblems(problems, onDone, label='정답 확인'){
  // 한 문제씩 보여주고 정답 확인. 정답 시 토스트의 "다음으로" 버튼으로 진행.
  state.data.qi = state.data.qi ?? 0;
  state.data.qs = state.data.qs ?? 0;
  const total = problems.length;

  // 모든 문제 완료
  if(state.data.qi >= total){
    const score = state.data.qs;
    const finishR = el(`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px">
        <div style="font-size:90px;line-height:1">🌟</div>
        <div style="font-size:32px">${score} / ${total} 문제 정답!</div>
        <div style="font-size:20px;color:var(--ink-soft);text-align:center">잘했어요! 다음으로 넘어가요</div>
        <button id="next-btn" class="btn btn-primary" style="margin-top:8px">다음으로 →</button>
      </div>
    `);
    finishR.querySelector('#next-btn').addEventListener('click', ()=>{
      state.data = {};
      (onDone || nextStep)();
    });
    return finishR;
  }

  const p = problems[state.data.qi];
  let qHtml = p.q;
  const anses = [];
  let i = 0;
  qHtml = qHtml.replace(/__ANS__/g, ()=> {
    const id = `a${i++}`;
    anses.push(id);
    // 입력칸 글씨를 주변 식 글씨(54px)와 비슷하게 키움
    return `<input class="ans" inputmode="decimal" data-id="${id}" style="width:96px;height:74px;font-size:44px" />`;
  });

  // 손글씨 답 패드 — 메인 입력 개수만큼 만들고 사이에 ':' 구분자
  const ocrPads = anses.map((id, idx) =>
    `<canvas class="answer-pad" data-idx="${idx}"></canvas>`
  ).join('<span style="font-size:22px;font-weight:800;color:var(--ink);font-family:\'Jua\',sans-serif">:</span>');

  const r = el(`
    <div style="display:flex;flex-direction:column;height:100%;gap:14px">
      <!-- 본문: 좌(문제) + 우(OCR 보드) — 문제/점수는 상단 차시명 옆으로 옮김 -->
      <div style="display:flex;gap:14px;flex:1;min-height:0;align-items:stretch">
        <!-- 왼쪽: 문제 -->
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;min-width:0">
          ${p.label ? `<div style="text-align:center;font-size:${p.labelFontSize||26}px;color:var(--ink);background:#fff7e0;border:3px solid var(--accent);border-radius:16px;padding:12px 22px;margin:0 auto;max-width:min(95%,1000px);font-weight:500;line-height:1.4">${p.label}</div>` : ''}
          <div style="background:linear-gradient(135deg,#f5edff 0%,#ede0ff 100%);border:3px solid var(--tab-3);border-radius:20px;padding:34px 24px;text-align:center">
            <div style="font-size:50px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;font-weight:800">${qHtml}</div>
          </div>
        </div>
        <!-- 오른쪽: OCR 계산 노트 + 답 입력 -->
        <div style="flex:0 0 290px;position:relative;background:white;border:2px dashed #d4b487;border-radius:14px;overflow:hidden;display:flex;flex-direction:column">
          <canvas class="scratch-pad" style="display:block;flex:1;cursor:crosshair;touch-action:none;background:white"></canvas>
          <div style="position:absolute;top:8px;left:12px;font-size:16px;color:var(--ink-soft);font-weight:700;pointer-events:none;background:rgba(255,250,238,0.85);padding:3px 10px;border-radius:8px">📝 계산 노트</div>
          <button class="clear-scratch" style="position:absolute;top:8px;right:10px;font-size:13px;padding:5px 10px;background:white;border:2px solid #d4b487;border-radius:8px;cursor:pointer;font-family:'Jua',sans-serif;color:var(--ink);font-weight:700">🧹 지우기</button>
          <!-- 손글씨 답 패드 (정답 확인 시 OCR로 인식) -->
          <div style="display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,250,238,0.95);border-top:2px dashed #d4b487;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:800;color:var(--ink);font-family:'Jua',sans-serif">답:</span>
            ${ocrPads}
            <button class="clear-answer-pads" title="답 지우기">🧹</button>
          </div>
        </div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-blue">${label}</button>
      </div>
    </div>
  `);

  const ansInputs = anses.map(id => r.querySelector(`[data-id="${id}"]`));
  // 손글씨 답 패드 — 메인 입력 개수만큼 setup
  // 그리기가 끝날 때마다 자동으로 OCR 인식 → 해당 입력칸에 채움
  const answerPads = Array.from(r.querySelectorAll('.answer-pad'));
  const ocrTokens = answerPads.map(() => ({ n: 0 }));  // race 방지용 토큰
  const padHandlers = answerPads.map((c, idx) => setupAnswerPad(c, {
    onChange: async () => {
      const tk = ocrTokens[idx];
      const myN = ++tk.n;
      const rec = await recognizeDigitsFromCanvas(c);
      if(myN !== tk.n) return;  // 더 새로운 그리기가 시작됨 — 무시
      // OCR이 빈 결과를 돌려줘도 사용자의 입력칸을 비우지 않음 — 정답 확인 시 다시 인식함
      if(ansInputs[idx] && rec){
        ansInputs[idx].value = rec;
        ansInputs[idx].classList.remove('ok','bad');
      }
    }
  }));
  const clearAns = r.querySelector('.clear-answer-pads');
  if(clearAns) clearAns.addEventListener('click', ()=>{
    padHandlers.forEach(h => h && h.clear());
    // 대기 중인 OCR 무효화
    ocrTokens.forEach(tk => tk.n++);
    answerPads.forEach(p => p.classList.remove('correct','wrong'));
    // 입력칸도 같이 비움
    ansInputs.forEach(inp => { if(inp){ inp.value = ''; inp.classList.remove('ok','bad'); } });
  });

  // 계산 노트 캔버스 — 그리기 + 지우기
  const canvas = r.querySelector('.scratch-pad');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    function fitCanvas(){
      const rect = canvas.getBoundingClientRect();
      if(rect.width > 10 && rect.height > 10){
        canvas.width = Math.round(rect.width);
        canvas.height = Math.round(rect.height);
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
    }
    setTimeout(fitCanvas, 60);
    setTimeout(fitCanvas, 300);
    let drawing = false;
    function getP(e){
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
               y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
    }
    canvas.addEventListener('mousedown', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); });
    canvas.addEventListener('mousemove', e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
    canvas.addEventListener('mouseup',    ()=>{ drawing=false; });
    canvas.addEventListener('mouseleave', ()=>{ drawing=false; });
    canvas.addEventListener('touchstart', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove',  e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend',   ()=>{ drawing=false; });
    const clearBtn = r.querySelector('.clear-scratch');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); });
  }

  r.querySelector('#check').addEventListener('click', async ()=>{
    const checkBtn = r.querySelector('#check');
    if(checkBtn.disabled) return;
    // 정답 확인 시 손글씨 답 패드를 강제로 한 번 더 OCR 인식 → 입력칸을 최신 값으로 채움
    checkBtn.disabled = true;
    const origLabel = checkBtn.textContent;
    checkBtn.textContent = '인식 중...';
    await Promise.all(answerPads.map(async (pad, j)=>{
      try {
        const rec = await recognizeDigitsFromCanvas(pad);
        if(rec && ansInputs[j]) ansInputs[j].value = rec;
      } catch(e){ /* OCR 실패해도 입력값으로 검증 */ }
    }));
    checkBtn.textContent = origLabel;
    checkBtn.disabled = false;
    let allOk = true;
    ansInputs.forEach((inp, j)=>{
      inp.classList.remove('ok','bad');
      const v = (inp.value||'').trim();
      const ok = String(v) === String(p.answers[j]);
      inp.classList.add(ok?'ok':'bad');
      if(!ok) allOk = false;
    });
    // 손글씨 답 패드 색도 동기화
    answerPads.forEach((pad, j)=>{
      pad.classList.remove('correct','wrong');
      const v = (ansInputs[j]?.value||'').trim();
      const ok = String(v) === String(p.answers[j]);
      pad.classList.add(ok ? 'correct' : 'wrong');
    });
    if(allOk){
      state.data.qs = (state.data.qs||0) + 1;
      checkBtn.disabled = true;
      const advance = ()=>{
        state.data.qi = (state.data.qi||0) + 1;
        state.data.qReady = false;
        render();
      };
      toast('정답이에요!', true, { onNext: advance });
    } else {
      toast('다시 풀어볼까요?', false);
      r.classList.add('shake');
      setTimeout(()=>r.classList.remove('shake'), 400);
    }
  });

  // 차시명 옆에 "문제 N/total · ⭐ score" 진행도 표시
  setTimeout(()=> updateTopbarProgress(state.data.qi + 1, total, state.data.qs), 0);

  return r;
}

/* ===== 비 줄이기 폭탄 게임 — 재사용 가능한 팩토리 =====
   opts: { problemPool, title, intro, task, finishArgs:[stageId, stars], hasReward }
   - problemPool: [{ d, ans:[a,b] }, ...]
   - title: '비 줄이기 게임' 등 모드 선택 상단 제목
   - intro: 게임 설명 (HTML 허용)
   - task: 플레이 화면의 문제 설명 (예: '가장 간단한 자연수의 비로 만들어 보세요')
   - finishArgs: finishStage 인수
   - hasReward: 20문제 통과 시 보상 표시 여부 */
function makeBombGameStep(opts){
  return ()=>{
    const r = el(`<div class="game-root" style="height:100%;display:flex;flex-direction:column"></div>`);
    const G = {
      mode:null, problems:[], idx:0, score:0,
      timeLeft:120, timerId:null, expired:false, startTime:0,
    };
    function clearTimer(){ if(G.timerId){ clearInterval(G.timerId); G.timerId = null; } }

    function showSelect(){
      clearTimer();
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:22px;height:100%;padding:10px">
          <div style="font-size:42px;font-weight:800;color:var(--primary-deep)">⏱️ ${opts.title}</div>
          <div style="font-size:24px;color:var(--ink);text-align:center;line-height:1.5">${opts.intro}</div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:6px">
            ${[10,15,20].map((n,i)=>`
              <button class="game-mode-btn" data-target="${n}">
                <div style="font-size:32px;font-weight:800;color:var(--primary-deep)">도전 ${['①','②','③'][i]}</div>
                <div style="font-size:22px;color:var(--ink-soft);margin-top:6px">2분 안에 <b>${n}개</b></div>
              </button>
            `).join('')}
          </div>
          <div style="font-size:20px;color:var(--ink-soft);margin-top:6px">
            💣 폭탄이 터져도 계속 풀 수 있어요!${opts.hasReward ? ' &nbsp; 🎁 20개 도전 통과 시 보상!' : ''}
          </div>
        </div>
      `;
      r.querySelectorAll('.game-mode-btn').forEach(b=>{
        b.addEventListener('click', ()=> startGame(+b.dataset.target));
      });
    }

    function startGame(target){
      const labels = { 10:'도전 ① (10개)', 15:'도전 ② (15개)', 20:'도전 ③ (20개)' };
      G.mode = { target, label: labels[target] };
      G.problems = shuffleArr(opts.problemPool).slice(0, target);
      G.idx = 0; G.score = 0;
      G.timeLeft = 120; G.expired = false;

    function runTimer(){

      const TOTAL = G.timeLeft;
      const startMs = Date.now();
      updateTimerUI();
      G.timerId = setInterval(()=>{
        const elapsed = Math.floor((Date.now() - startMs) / 1000);

          </div>
          <div style="display:flex;gap:14px;flex:1;min-height:0">
            <div style="flex:0 0 520px;display:flex;flex-direction:column;background:#f5edff;border:3px solid var(--tab-3);border-radius:18px;padding:24px;justify-content:space-between;gap:18px">

              <div style="display:flex;justify-content:center;gap:10px">
                <button class="btn btn-secondary" id="quit-game" style="font-size:20px">중단</button>
                <button class="btn btn-blue" id="check-game" style="font-size:26px;padding:12px 32px">정답 확인</button>

              <div class="answer-pads-row">
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">답:</span>
                <canvas class="answer-pad" data-target="ga"></canvas>
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">:</span>
                <canvas class="answer-pad" data-target="gb"></canvas>
                <button class="clear-answer-pads" title="답 지우기">🧹</button>
              </div>
            </div>
          </div>

      `;
      setupScratch();
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      G.ocrTokenA = { n: 0 };
      G.ocrTokenB = { n: 0 };
      G.padA_h = setupAnswerPad(padA, {
        onChange: async () => {
          const tk = G.ocrTokenA; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padA);
          if(myN !== tk.n) return;
          const a = r.querySelector('[data-id="ga"]');
          if(a && rec){ a.value = rec; a.classList.remove('ok','bad'); a.style.color=''; a.style.borderColor=''; a.style.background=''; }
        }
      });
      G.padB_h = setupAnswerPad(padB, {
        onChange: async () => {
          const tk = G.ocrTokenB; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padB);
          if(myN !== tk.n) return;
          const b = r.querySelector('[data-id="gb"]');
          if(b && rec){ b.value = rec; b.classList.remove('ok','bad'); b.style.color=''; b.style.borderColor=''; b.style.background=''; }

    async function checkAnswer(){
      const p = G.problems[G.idx];
      if(!p) return;
      const a = r.querySelector('[data-id="ga"]');
      const b = r.querySelector('[data-id="gb"]');
      if(!a || !b) return;
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      const checkBtn = r.querySelector('#check-game');
      const origLabel = checkBtn ? checkBtn.textContent : '';
      if(checkBtn){ checkBtn.disabled = true; checkBtn.textContent = '인식 중…'; }
      try {
        const [recA, recB] = await Promise.all([
          recognizeDigitsFromCanvas(padA),
          recognizeDigitsFromCanvas(padB)
        ]);
        if(recA) a.value = recA;
        if(recB) b.value = recB;
      } catch(e){ /* OCR 실패해도 계속 */ }
      if(checkBtn){ checkBtn.disabled = false; checkBtn.textContent = origLabel; }
      const av = parseInt((a.value||'').trim(), 10);
      const bv = parseInt((b.value||'').trim(), 10);
      const ok = (av === p.ans[0]) && (bv === p.ans[1]);
      a.disabled = true; b.disabled = true;
      showFeedback(a.closest('.game-input-wrap'), ok);
      showFeedback(b.closest('.game-input-wrap'), ok);
      [padA, padB].forEach(p2=>{
        if(p2){ p2.classList.remove('correct','wrong'); p2.classList.add(ok ? 'correct' : 'wrong'); }
      });
      if(ok){

        if(s) s.textContent = G.score;
      }
      setTimeout(()=>{ G.idx++; showProblem(); }, 1100);
    }

    function showFeedback(wrap, ok){
      const inp = wrap.querySelector('input');
      if(ok){
        inp.style.color = '#16a34a';
        inp.style.borderColor = '#16a34a';
        const c = document.createElement('span');
        c.className = 'fb-circle';
        wrap.appendChild(c);
      } else {
        inp.style.color = '#dc2626';
        inp.style.borderColor = '#dc2626';
