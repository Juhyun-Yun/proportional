<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>따끈따끈 베이커리</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Tesseract.js — 손글씨 숫자 OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root {
    --paper: #fffaee;
    --paper-edge: #fff3da;
    --paper-deep: #ffe9bc;
    --line: #f3dfb3;
    --line-soft: rgba(220,180,90,.18);
    --ink: #4a3826;
    --ink-soft: #7a5e3e;
    --muted: #b8966a;
    --primary: #ff8755;
    --primary-deep: #e96f3c;
    --primary-soft: #ffe2cf;
    --accent: #f39e2c;
    --accent-soft: #ffeec0;
    --good: #2dbf94;
    --good-soft: #d0f5e7;
    --bad: #ef6464;
    --bad-soft: #ffe0e0;
    /* 챕터 색 — 따뜻한 파스텔로 통일 */
    --tab-1: #ff9966;  /* 코랄 오렌지 */
    --tab-2: #2ec4a5;  /* 민트 */
    --tab-3: #a78bfa;  /* 라벤더 */
    --tab-4: #f4b53c;  /* 따뜻한 노랑 */
    --tab-5: #ec6da4;  /* 핑크 */
    --tab-6: #84d05c;  /* 연두 */
    --tab-7: #5dafe8;  /* 하늘색 */
    --tab-1-soft: #ffe0d0;
    --tab-2-soft: #e3f7ee;  /* 옅은 민트 — 다른 카드와 톤 맞춤 */
    --tab-3-soft: #e3dbff;
    --tab-4-soft: #fde8b8;
    --tab-5-soft: #fbd6e4;
    --tab-6-soft: #d8f1c6;
    --tab-7-soft: #cfe8f9;
    --tab-1-deep: #e07747;
    --tab-2-deep: #1ea88a;
    --tab-3-deep: #8c70d8;
    --tab-4-deep: #d49a23;
    --tab-5-deep: #d44e8a;
    --tab-6-deep: #6abd44;
    --tab-7-deep: #3e95d0;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  /* 한글 위주이므로 주아체. 숫자는 Pretendard로 또렷하게 */
  html { font-size: 20px; }
  body {
    font-family: 'Jua', 'Pretendard Variable', sans-serif;
    font-weight: 400;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 0% 0%, #fff5d8 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, #ffe6c0 0%, transparent 55%),
      #fff1d4;
    /* 한글 줄바꿈 시 단어 중간에서 끊기지 않도록 — 전역 적용 */
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 모든 자식 요소도 동일 규칙을 따르도록 (개별 element가 word-break를 덮어쓰지 않도록 보강) */
  #app, #app *:not(.frac):not(.frac *):not(.num):not(.ans):not(table.tbl):not(table.tbl *) {
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  /* 숫자/수식만 Pretendard Variable (주아체보다 또렷) */
  .num, .ans, .frac, table.tbl td, table.tbl th { font-family: 'Pretendard Variable', sans-serif; }
  .display { font-family: 'Black Han Sans', 'Jua', sans-serif; font-weight: 400; letter-spacing: -.01em; }
  .handwrite { font-family: 'Gowun Dodum', sans-serif; }
  .pen-script { font-family: 'Nanum Pen Script', cursive; }

  /* ===== 가로형 캔버스: 1280 × 720 기준, 화면에 맞춰 스케일 ===== */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #canvas {
    width: 1280px;
    height: 720px;
    flex: 0 0 auto;
    position: relative;
    transform-origin: center center;
    will-change: transform;
  }
  #app {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    padding: 22px 28px;
  }
  /* 스크롤바 노출 방지 */
  #app, #app * { scrollbar-width: none; }
  #app *::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* 배경 장식용 베이커리 아이콘 */
  .deco {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    opacity: .55;
    font-size: 64px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
  }

  /* 정답 시 꽃가루 — 아래에서 위로 살짝 대각선 방향으로 한 번 터짐 */
  .confetti-burst {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: confetti-fly 1.0s ease-out forwards;
  }
  @keyframes confetti-fly {
    0%   { transform: translate(0,0) scale(.4); opacity: 0; }
    8%   { opacity: 1; }
    55%  { transform: translate(var(--dx), var(--dy)) scale(1); opacity: 1; }
    100% { transform: translate(calc(var(--dx) * 1.1), calc(var(--dy) + 280px)) scale(1); opacity: 0; }
  }

  /* ===== 페이지 카드 (책상 위의 학습 노트) ===== */
  .book {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(180,130,60,.18), 0 2px 0 rgba(0,0,0,.04);
    border: 2px solid var(--paper-edge);
    position: relative;
    padding: 24px 32px 22px;
    display: flex;
    flex-direction: column;
    z-index: 1;
    overflow: hidden;
  }
  /* 페이지 상단 살짝 색띠 — 학습용 노트 무드 */
  .book::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--tab-1), var(--tab-2), var(--tab-3), var(--tab-4), var(--tab-5), var(--tab-6), var(--tab-7));
    opacity: .85;
  }

  /* ===== 상단 바 (스테이지 메뉴 / 단계 페이지) ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border: 2px solid var(--paper-deep);
    border-radius: 18px;
    padding: 10px 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 0 rgba(0,0,0,.04);
  }
  .topbar-btn {
    width: 46px; height: 46px;
    border-radius: 14px;
    border: 2px solid var(--paper-deep);
    background: var(--paper);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--ink);
    transition: transform .12s, background .12s;
    font-family: inherit;
  }
  .topbar-btn:hover { transform: translateY(-2px); background: var(--paper-deep); }
  .topbar-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-toc {
    background: white;
    border: 2px solid var(--page-color, var(--accent));
    color: var(--page-color, var(--accent));
    padding: 8px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 20px;
    font-family: inherit;
    transition: background .12s;
  }
  .topbar-toc:hover { background: var(--page-color, var(--accent)); color: white; }

  /* ===== 페이지 헤더 (단계 학습용) ===== */
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  .page-header::after {
    content:'';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--page-color, var(--primary)) 0%, var(--page-color, var(--primary)) 70%, transparent 100%);
    border-radius: 3px;
  }
  .page-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -.01em;
    color: var(--ink);
    line-height: 1.2;
  }
  .page-sub {
    font-size: 20px;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 600;
  }
  .page-meta {
    font-size: 20px;
    letter-spacing: .04em;
    font-weight: 800;
    background: var(--paper-edge);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .page-content {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    font-size: 20px;
    line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
  }
  /* 단계 학습 페이지의 루트 div가 전체 높이를 채우고 내부를 골고루 분배 */
  #content > div {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    gap: 10px;
  }

  /* 단계 진행 바 + 페이지 번호 */
  .progress-info {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .progress-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .progress-row > div {
    flex: 1;
    height: 8px;
    border-radius: 4px;
    background: var(--paper-deep);
    transition: background .25s;
  }
  .progress-row > div.on { background: var(--page-color, var(--primary)); }
  .page-pill {
    flex-shrink: 0;
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    background: var(--paper-edge);
    border: 2px solid var(--paper-deep);
    border-radius: 999px;
    padding: 4px 14px;
    white-space: nowrap;
  }

  /* ===== 베이커리 장면 칩 (이야기 컨셉) — 문제 상황 상단 ===== */
  .scene-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #fff8e1 0%, #ffe2a3 100%);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 8px 18px;
    margin-bottom: 8px;
    box-shadow: 0 3px 0 rgba(243,158,44,.22);
  }
  .scene-chip .scene-emoji { font-size: 36px; line-height: 1; flex-shrink: 0; }
  .scene-chip .scene-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1.25;
  }
  .scene-chip .scene-title b { color: var(--ink); }

  /* ===== 멘토 (사장님) 말풍선 — 한글 키움 ===== */
  .mentor {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 6px;
  }
  .mentor-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fff3d0 0%, #ffe0a8 100%);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    flex-shrink: 0;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    animation: floaty 4s ease-in-out infinite;
    padding: 4px; /* Added to frame SVG beautifully */
  }
  .mentor-icon svg {
    width: 100%;
    height: 100%;
  }
  .mentor-text {
    flex: 1;
    font-size: 28px;
    line-height: 1.55;
    background: #fff;
    border: 3px solid var(--accent);
    border-radius: 18px;
    padding: 16px 22px;
    position: relative;
    box-shadow: 0 4px 0 rgba(243,158,44,.2);
  }
  .mentor-text::before {
    content: '';
    position: absolute;
    left: -14px;
    top: 22px;
    border: 10px solid transparent;
    border-right-color: var(--accent);
  }
  .mentor-text b { color: var(--accent); }

  /* ===== 버튼 ===== */
  .btn {
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 800;
    padding: 12px 26px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,.16);
    transition: transform .12s, box-shadow .12s, filter .12s;
    color: white;
    background: var(--primary);
    letter-spacing: -.01em;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.16); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); }
  .btn-secondary { background: white; color: var(--ink); box-shadow: 0 4px 0 var(--paper-deep); border: 2px solid var(--paper-deep); }
  .btn-success { background: var(--good); }
  .btn-warn { background: var(--accent); }
  .btn-danger { background: var(--bad); }
  /* 호환용 */
  .btn-pink   { background: var(--tab-5); }
  .btn-yellow { background: var(--accent); }
  .btn-blue   { background: var(--tab-7); }
  .btn-green  { background: var(--good); }
  .btn-gray   { background: white; color: var(--ink); box-shadow: 0 4px 0 var(--paper-deep); border: 2px solid var(--paper-deep); }

  /* ===== 입력칸 ===== */
  .ans {
    width: 64px; height: 56px;
    text-align: center;
    border: 2px solid var(--primary);
    border-radius: 12px;
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-size: 26px;
    font-weight: 800;
    background: white;
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(255,135,85,.18);
  }
  .ans:focus { outline: none; box-shadow: 0 0 0 4px rgba(255,135,85,.22), 0 3px 0 rgba(255,135,85,.18); }
  .ans.ok  { border-color: var(--good); background: var(--good-soft); box-shadow: 0 3px 0 rgba(45,191,148,.22); }
  .ans.bad { border-color: var(--bad);  background: var(--bad-soft);  box-shadow: 0 3px 0 rgba(239,100,100,.22); }

  /* ===== 박스 ===== */
  .box {
    background: #fff;
    border: 2px solid var(--paper-deep);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 3px 0 rgba(0,0,0,.04);
  }
  .box-primary { background: var(--primary-soft); border-color: var(--primary); }
  .box-accent  { background: var(--accent-soft);  border-color: var(--accent); }
  .box-good    { background: var(--good-soft);    border-color: var(--good); }
  .box-paper   { background: var(--paper-edge);   border-color: var(--line); }

  /* ===== 분수 표기 (분모 분의 분자 — 슬래시 X) ===== */
  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 6px;
    line-height: 1.05;
    font-size: 0.78em;
    font-weight: 800;
  }
  .frac > span:first-child {
    padding: 0 8px 4px;
    border-bottom: 2.5px solid currentColor;
    min-width: 22px;
  }
  .frac > span:last-child {
    padding: 4px 8px 0;
    min-width: 22px;
  }

  /* 약분 시각화 — 분자/분모에 대각선 + 작은 새 숫자 */
  .frac-reduce .orig {
    position: relative;
  }
  .frac-reduce .orig::before {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    top: 50%;
    height: 3px;
    background: #ec6da4;
    transform: translateY(-50%) rotate(-22deg);
    pointer-events: none;
    border-radius: 2px;
  }
  .frac-reduce .orig::after {
    content: attr(data-new);
    position: absolute;
    font-size: 0.65em;
    color: #ec6da4;
    font-weight: 800;
    font-family: 'Pretendard Variable', sans-serif;
    line-height: 1;
  }
  .frac-reduce .orig:first-child::after {
    /* 분자: 우측 위 */
    top: -0.55em;
    right: -0.7em;
  }
  .frac-reduce .orig:last-child::after {
    /* 분모: 우측 아래 */
    bottom: -0.55em;
    right: -0.7em;
  }

  /* 인터랙티브 분수 빌더 — 사용자가 분자/분모 입력 → 약분 버튼 누름 */
  .frac-build {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    margin: 0 4px;
    line-height: 1;
  }
  .frac-input {
    width: 44px;
    height: 30px;
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    border: 2px solid var(--accent);
    border-radius: 8px;
    background: white;
    font-family: 'Pretendard Variable', sans-serif;
    color: var(--ink);
    padding: 0;
  }
  .frac-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,135,85,.22); }
  .frac-bar {
    width: 44px;
    height: 3px;
    background: currentColor;
    margin: 2px 0;
    border-radius: 2px;
  }
  .reduce-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 6px 16px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 3px 0 rgba(180,130,30,.4);
    transition: transform .1s;
  }
  .reduce-btn:hover { transform: translateY(-1px); }
  .reduce-btn:active { transform: translateY(0); }
  .reduce-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ===== 외항·내항 라벨 붙이기 (Stage 3 ② 개념 학습) ===== */
  .vocab-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 92px;
    height: 38px;
    border: 2px dashed var(--accent);
    border-radius: 10px;
    background: white;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    padding: 0 12px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Jua', sans-serif;
  }
  .vocab-slot.filled  { border-style: solid; background: var(--accent-soft); border-color: var(--accent); }
  .vocab-slot.correct { border-style: solid; border-color: var(--good); background: var(--good-soft); color: #1e8e6c; }
  .vocab-slot.wrong   { border-style: solid; border-color: var(--bad);  background: var(--bad-soft);  color: var(--bad); animation: fb-shake 0.3s; }
  .vocab-chip {
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    font-weight: 700;
    padding: 8px 22px;
    border: 3px solid var(--accent);
    border-radius: 14px;
    background: white;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    transition: transform .12s, box-shadow .12s, opacity .15s;
  }
  .vocab-chip:hover:not(:disabled)  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(243,158,44,.3); }
  .vocab-chip:active:not(:disabled) { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(243,158,44,.3); }
  .vocab-chip:disabled { opacity: .35; cursor: not-allowed; background: var(--paper-edge); }

  /* 변환 스택 (예: 0.5 위에, 5/10 아래에) */
  .stack-conv {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    line-height: 1.1;
    gap: 4px;
    margin: 0 4px;
  }
  .stack-conv .arrow {
    color: var(--tab-3);
    font-size: 0.7em;
    line-height: 1;
  }

  /* ===== 비 줄이기 게임 ===== */
  .game-mode-btn {
    background: linear-gradient(135deg, #fff5d9, #ffe9b0);
    border: 3px solid var(--accent);
    border-radius: 18px;
    padding: 18px 28px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Jua', sans-serif;
    color: var(--ink);
    box-shadow: 0 4px 0 rgba(180,130,30,.3);
  }
  .game-mode-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 rgba(180,130,30,.3); }
  .game-mode-btn:active { transform: translateY(0); box-shadow: 0 2px 0 rgba(180,130,30,.3); }

  .game-input-wrap {
    position: relative;
    display: inline-block;
  }
  .game-ans {
    width: 100px;
    height: 70px;
    font-size: 40px;
    font-weight: 800;
    text-align: center;
  }
  .fb-circle {
    position: absolute;
    inset: -10px;
    border: 5px solid #16a34a;
    border-radius: 50%;
    pointer-events: none;
    animation: fb-grow 0.4s ease-out;
  }
  .fb-x {
    position: absolute;
    inset: 0;
    pointer-events: none;
    animation: fb-shake 0.3s;
  }
  .fb-x::before, .fb-x::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 90%;
    height: 6px;
    background: #dc2626;
    border-radius: 3px;
  }
  .fb-x::before { transform: translate(-50%, -50%) rotate(45deg); }
  .fb-x::after  { transform: translate(-50%, -50%) rotate(-45deg); }
  @keyframes fb-grow {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes fb-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .clock-icon { display: inline-block; transition: transform 0.2s; transform-origin: center; }
  .clock-icon.warning { animation: clock-tick 0.6s infinite; color: #dc2626; }
  .clock-icon.exploded { animation: clock-explode 0.6s ease-out; }
  @keyframes clock-tick {
    0%, 100% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-8deg) scale(1.1); }
    75% { transform: rotate(8deg)  scale(1.1); }
  }
  @keyframes clock-explode {
    0% { transform: scale(1) rotate(0); }
    40% { transform: scale(1.6) rotate(360deg); }
    100% { transform: scale(1.2) rotate(360deg); }
  }

  .scratch-pad-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .scratch-pad {
    background: white;
    border: 2px dashed #d4b487;
    border-radius: 12px;
    cursor: crosshair;
    touch-action: none;
  }
  /* 손글씨 답 패드 — 사용자가 직접 손/마우스로 숫자를 씀, Tesseract.js로 인식 */
  .answer-pad {
    width: 84px;
    height: 60px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: white;
    cursor: crosshair;
    touch-action: none;
    display: block;
  }
  .answer-pad.correct { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(45,191,148,.18); }
  .answer-pad.wrong   { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(239,100,100,.18); }
  .answer-pads-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,250,238,0.95);
    border-top: 2px dashed #d4b487;
    flex-wrap: wrap;
  }
  .clear-answer-pads {
    background: white;
    border: 2px solid #d4b487;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Jua', sans-serif;
    color: var(--ink);
  }

  /* OCR 보드 하단의 답 입력 칸 — 메인 정답 입력칸과 양방향 미러 */
  .ocr-answer-bar {
    position: absolute;
    bottom: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    background: rgba(255,250,238,0.95);
    padding: 8px 12px;
    border: 2px dashed #d4b487;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .ocr-answer-bar .ocr-label {
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    font-family: 'Jua', sans-serif;
  }
  .ocr-ans {
    width: 64px;
    height: 44px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: white;
    color: var(--ink);
    font-family: 'Pretendard Variable', sans-serif;
    padding: 0;
  }
  .ocr-ans:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,135,85,.22); }
  .ocr-ans.correct { color: #16a34a; border-color: #16a34a; }
  .ocr-ans.wrong { color: #dc2626; border-color: #dc2626; }

  .stage-card { transition: all .25s; cursor: pointer; }
  .stage-card.locked { opacity: .5; cursor: not-allowed; }

  /* ===== 비율 카드 (매칭 게임) ===== */
  .ratio-card {
    background: #fff;
    border: 3px solid var(--accent);
    border-radius: 16px;
    padding: 18px 22px;
    font-size: 26px;
    font-weight: 800;
    box-shadow: 0 4px 0 rgba(243,158,44,.3);
    cursor: pointer;
    user-select: none;
    transition: transform .15s, box-shadow .15s, background .15s, border-color .15s;
    color: var(--ink);
    text-align: center;
    position: relative;
  }
  .ratio-card:hover:not(.matched):not(.sel) {
    transform: translateY(-3px);
    box-shadow: 0 7px 0 rgba(243,158,44,.3);
  }
  /* 선택 상태 — 누구나 한눈에 알도록 매우 도드라지게 */
  .ratio-card.sel {
    transform: scale(1.12);
    border-width: 4px;
    border-color: var(--primary);
    background: linear-gradient(135deg, #fff5d8 0%, #ffd9a8 100%);
    box-shadow:
      0 0 0 6px rgba(255,135,85,.28),
      0 10px 18px rgba(255,135,85,.35);
    z-index: 5;
    animation: selPulse 1.4s ease-in-out infinite;
  }
  .ratio-card.sel::after {
    content: '✓';
    position: absolute;
    top: -14px;
    right: -14px;
    width: 38px;
    height: 38px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    border: 3px solid white;
    box-shadow: 0 4px 8px rgba(0,0,0,.2);
    font-family: 'Pretendard Variable', sans-serif;
  }
  @keyframes selPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(255,135,85,.28), 0 10px 18px rgba(255,135,85,.35); }
    50%      { box-shadow: 0 0 0 10px rgba(255,135,85,.18), 0 12px 22px rgba(255,135,85,.45); }
  }
  .ratio-card.matched {
    background: var(--good-soft);
    border-color: var(--good);
    box-shadow: 0 4px 0 rgba(45,191,148,.3);
  }
  .ratio-card.gone { opacity: 0; pointer-events: none; }

  /* ===== 강조 색상 ===== */
  .term-front { color: var(--tab-5); font-weight: 800; }
  .term-back  { color: var(--tab-7); font-weight: 800; }
  .term-out   { color: var(--tab-3); font-weight: 800; }
  .term-in    { color: var(--accent); font-weight: 800; }

  /* ===== 표 ===== */
  table.tbl { border-collapse: separate; border-spacing: 0; margin: 0 auto; border-radius: 14px; overflow: hidden; box-shadow: 0 3px 0 rgba(0,0,0,.05); }
  /* Stage 1 표는 5행이라 더 컴팩트하게 */
  table.tbl.s1-tbl th, table.tbl.s1-tbl td { padding: 8px 14px; font-size: 22px; }
  table.tbl.s1-tbl .ans { width: 64px; height: 42px; font-size: 22px; padding: 2px 4px; }
  /* 우유 칸(2열)은 빨강, 버터 칸(3열)은 초록 — 레시피 카드와 색 매칭 */
  table.tbl.s1-tbl th:nth-child(2),
  table.tbl.s1-tbl td:nth-child(2),
  table.tbl.s1-tbl td:nth-child(2) .ans { color: #dc2626 !important; }
  table.tbl.s1-tbl th:nth-child(3),
  table.tbl.s1-tbl td:nth-child(3),
  table.tbl.s1-tbl td:nth-child(3) .ans { color: #16a34a !important; }
  table.tbl.s1-tbl td:nth-child(2) .ans { border-color: #fca5a5 !important; }
  table.tbl.s1-tbl td:nth-child(3) .ans { border-color: #86efac !important; }
  table.tbl th, table.tbl td {
    border: 1px solid var(--line);
    padding: 12px 18px;
    text-align: center;
    font-size: 22px;
    background: #fff;
    font-weight: 600;
  }
  table.tbl th {
    background: var(--primary-soft);
    color: var(--primary-deep);
    font-weight: 800;
    font-size: 20px;
  }

  /* ===== 지갑(비례배분 시각화) ===== */
  .wallet {
    width: 42px; height: 28px;
    background: #15803d;
    border-radius: 4px;
    border: 2px solid #14532d;
    display: inline-block;
    margin: 2px;
    position: relative;
  }
  .wallet::after {
    content: '';
    position: absolute;
    top: 7px; left: 4px;
    width: 32px; height: 2px;
    background: #14532d;
  }

  /* ===== 토스트 (정답/오답 — 화면 중앙에 크게) ===== */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 4px solid var(--good);
    border-radius: 24px;
    padding: 26px 48px;
    font-size: 32px;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 16px 40px rgba(0,0,0,.25);
    z-index: 1000;
    animation: popInBig .4s cubic-bezier(.2,.9,.3,1.4);
    color: var(--ink);
    text-align: center;
    min-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .toast.bad { border-color: var(--bad); }
  .toast .toast-icon {
    font-size: 60px;
    line-height: 1;
    animation: starPop .5s ease-out;
  }
  .toast .toast-msg {
    font-size: 28px;
  }
  .toast.bad .toast-msg { color: var(--bad); }
  .toast:not(.bad) .toast-msg { color: var(--good); }
  .toast-next {
    margin-top: 6px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--primary-deep);
    transition: transform .12s;
  }
  .toast-next:hover { transform: translateY(-2px); }
  .toast-next:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--primary-deep); }
  @keyframes popInBig {
    0%   { transform: translate(-50%, -50%) scale(.4); opacity: 0; }
    65%  { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* ===== 인장(스탬프) 애니메이션 ===== */
  .stamp {
    width: 150px;
    height: 150px;
    border: 6px solid var(--bad);
    border-radius: 50%;
    color: var(--bad);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    transform: rotate(-14deg);
    background: rgba(255,255,255,.55);
    box-shadow: 0 0 0 3px rgba(185,28,28,.25), 0 6px 14px rgba(0,0,0,.15);
    font-family: 'Nanum Pen Script', cursive;
    animation: stampDown .55s cubic-bezier(.2,1.4,.4,1);
  }
  .stamp .stamp-main { font-size: 38px; line-height: 1; letter-spacing: .04em; }
  .stamp .stamp-sub { font-size: 20px; margin-top: 6px; opacity: .85; }
  @keyframes stampDown {
    0%   { transform: rotate(-30deg) scale(2.5); opacity: 0; }
    60%  { transform: rotate(-12deg) scale(1.05); opacity: 1; }
    100% { transform: rotate(-14deg) scale(1); }
  }

  /* 미니 인장 (표지에서 작은 원형 표시) */
  .mini-stamp {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    border: 3px dashed var(--line);
    background: var(--paper-edge);
    color: var(--muted);
    margin: 0 auto;
    transition: transform .2s;
  }
  .mini-stamp.earned {
    border: 3px solid var(--tc, var(--accent));
    background: white;
    color: var(--tc, var(--accent));
    box-shadow: 0 0 0 3px rgba(0,0,0,.06), 0 4px 8px rgba(0,0,0,.12);
    transform: rotate(-7deg);
  }
  .mini-stamp.earned:hover { transform: rotate(0) scale(1.06); }

  /* 애니메이션 */
  .pop-in { animation: popIn .35s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes popIn { 0%{transform:scale(.7);opacity:0;} 70%{transform:scale(1.04);} 100%{transform:scale(1);opacity:1;} }
  .shake { animation: shake .35s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
  .star-pop { animation: starPop .6s ease-out; display:inline-block; }
  @keyframes starPop { 0%{transform:scale(0) rotate(0);} 60%{transform:scale(1.4) rotate(220deg);} 100%{transform:scale(1) rotate(360deg);} }
  .float { animation: floaty 3s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* 호환용: 기존 step-dot, .card */
  .step-dot { transition: all .2s; }
  .card { background: transparent; }
  .content-card { flex: 1 1 auto; min-height: 0; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* 단계 콘텐츠는 페이지에 골고루 분배 (위쪽 치우침 방지) */
  #content .text-center { width: 100%; }

  /* ===== 모달 (가이드, 풀이 설명) ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(74,56,38,.55);
    z-index: 1090;
    animation: fadeIn .25s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border: 4px solid var(--accent);
    border-radius: 24px;
    padding: 22px 28px;
    width: min(92vw, 600px);
    max-height: 86vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
    z-index: 1100;
    animation: popInBig .4s cubic-bezier(.2,.9,.3,1.4);
    font-family: 'Jua', sans-serif;
  }
  .modal-title {
    font-size: 28px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
  }
  .modal-content { font-size: 20px; line-height: 1.6; color: var(--ink); }
  .modal-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
  }

  /* 도전 가이드 — 단계(나무 성장) */
  .level-list { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .level-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: var(--paper-edge);
    border: 2px solid transparent;
    border-radius: 14px;
    transition: transform .12s;
  }
  .level-item.current {
    background: linear-gradient(135deg, #fff8e1 0%, #ffe2a3 100%);
    border-color: var(--accent);
    transform: scale(1.02);
    box-shadow: 0 4px 0 rgba(243,158,44,.25);
  }
  .level-emoji { font-size: 40px; flex-shrink: 0; line-height: 1; }
  .level-info { flex: 1; }
  .level-name { font-size: 20px; color: var(--ink); }
  .level-desc { font-size: 20px; color: var(--ink-soft); margin-top: 2px; }
  .level-stars { font-size: 20px; color: var(--ink-soft); white-space: nowrap; }
  .level-item.current .level-stars { color: var(--accent); }
  .level-now-badge {
    background: var(--accent);
    color: white;
    font-size: 20px;
    padding: 3px 10px;
    border-radius: 999px;
    margin-left: 6px;
  }

  /* 가이드 버튼(홈) */
  .guide-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #f5b56a 100%);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Jua', sans-serif;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(243,158,44,.4);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform .12s;
  }
  .guide-btn:hover { transform: translateY(-2px); }

  /* ===== 단계 페이지 액션바 — 항상 우측 하단에 고정, 잘리지 않도록 위에 띄움 ===== */
  /* book(.relative) 기준으로 absolute */
  .step-actions {
    position: absolute;
    right: 28px;
    bottom: 18px;
    z-index: 80;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 250, 238, 0.92);
    padding: 6px 8px;
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,.12);
  }
  /* 페이지 콘텐츠는 액션바 자리 확보 */
  .page-content { padding-bottom: 60px; }
  /* 버튼 세부 — 정답확인은 disabled 시에도 의미 전달 */
  .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

  /* ===========================================================
     첫 페이지 (이름 입력)
  =========================================================== */
  .welcome {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .welcome-mascot {
    width: 160px;
    height: 160px;
    animation: floaty 3.5s ease-in-out infinite;
  }
  .welcome-mascot svg { width: 100%; height: 100%; }
  .welcome-title {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--primary-deep);
    letter-spacing: -.02em;
  }
  .welcome-sub {
    font-size: 22px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .welcome-form {
    background: white;
    border: 3px solid var(--paper-deep);
    border-radius: 24px;
    padding: 24px 36px;
    box-shadow: 0 6px 0 rgba(0,0,0,.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 8px;
  }
  .welcome-label {
    font-size: 20px;
    color: var(--ink);
    font-weight: 700;
  }
  .welcome-input,
  .welcome-select {
    font-family: inherit;
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    width: 360px;
    padding: 12px 18px;
    border: 2px solid var(--paper-deep);
    border-radius: 14px;
    background: var(--paper);
    color: var(--ink);
  }
  .welcome-select { cursor: pointer; text-align-last: center; }
  .welcome-input:focus,
  .welcome-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,135,85,.18); }
  .welcome-loading { font-size: 20px; color: var(--ink-soft); }
  .welcome-start {
    font-size: 22px;
    padding: 14px 36px;
  }

  /* ===========================================================
     홈 (스테이지 선택) — 7개 챕터 카드 가로 배치
  =========================================================== */
  .home-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .home-greeting {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .home-mascot {
    width: 78px;
    height: 78px;
    animation: floaty 4s ease-in-out infinite;
    flex: 0 0 auto;
  }
  .home-mascot svg { width: 100%; height: 100%; }
  .home-title {
    font-family: 'Jua', sans-serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -.01em;
    line-height: 1.1;
  }
  .home-sub {
    font-size: 24px;
    color: var(--ink-soft);
    font-weight: 400;
    margin-top: 4px;
  }
  .home-sub b { color: var(--primary-deep); font-weight: 400; }
  .home-rename {
    font-size: 20px;
    color: var(--muted);
    text-decoration: underline;
    background: none; border: none;
    font-family: inherit;
    cursor: pointer;
    margin-left: 6px;
  }
  .home-stats {
    display: flex;
    gap: 10px;
  }
  .stat-pill {
    background: white;
    border: 2px solid var(--paper-deep);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    box-shadow: 0 3px 0 rgba(0,0,0,.04);

function loadStudentList(){
  // Apps Script 환경: google.script.run 사용
  if(typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(list => {
        STUDENT_LIST = (Array.isArray(list) && list.length) ? list : null;
        studentLoadDone = true;
        if(state.screen === 'welcome') render();
      })
      .withFailureHandler(() => {
        studentLoadDone = true;
        if(state.screen === 'welcome') render();
      })
      .getStudentList();
  } else {
    // Standalone: window.STUDENT_LIST가 미리 설정돼 있으면 사용
    STUDENT_LIST = (Array.isArray(window.STUDENT_LIST) && window.STUDENT_LIST.length) ? window.STUDENT_LIST : null;

function fitScale(){
  const canvas = document.getElementById('canvas');
  if(!canvas) return;
  const sx = window.innerWidth / BASE_W;
  const sy = window.innerHeight / BASE_H;
  const s = Math.min(sx, sy);
  canvas.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitScale);
window.addEventListener('orientationchange', ()=> setTimeout(fitScale, 50));
document.addEventListener('DOMContentLoaded', fitScale);

];
function getLevel(stars){
  let lvl = LEVELS[0];
  for(const l of LEVELS) if(stars >= l.stars) lvl = l;
  return lvl;
}
function nextLevel(stars){
  for(const l of LEVELS) if(stars < l.stars) return l;
  return null;
}

/* 모달 헬퍼 — 가이드/풀이 설명 등에 재사용 */
function showModal(titleHtml, contentHtml, actions){
  const overlay = el(`<div class="modal-overlay"></div>`);
  const modal = el(`
    <div class="modal">
      <div class="modal-title">${titleHtml}</div>
      <div class="modal-content">${contentHtml}</div>
      <div class="modal-actions"></div>
    </div>
  `);
  const actionsDiv = modal.querySelector('.modal-actions');
  const close = ()=>{ overlay.remove(); modal.remove(); };
  (actions || [{label:'닫기', cls:'btn-secondary'}]).forEach(a=>{
    const btn = el(`<button class="btn ${a.cls || 'btn-primary'}">${a.label}</button>`);
    btn.addEventListener('click', ()=>{ close(); if(a.onClick) a.onClick(); });
    actionsDiv.appendChild(btn);
  });
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
}

function showGuide(){
  const total = Object.values(state.progress).reduce((a,b)=>a+b,0);
  const cur = getLevel(total);
  const next = nextLevel(total);
  const itemsHtml = LEVELS.map(l=>{
    const isCurrent = l === cur;
    return `
      <div class="level-item ${isCurrent?'current':''}">
        <div class="level-emoji">${l.emoji}</div>
        <div class="level-info">
          <div class="level-name">${l.name}${isCurrent?'<span class="level-now-badge">현재</span>':''}</div>
          <div class="level-desc">${l.desc}</div>
        </div>
        <div class="level-stars">⭐ ${l.stars}+</div>
      </div>
    `;
  }).join('');
  const nextHint = next
    ? `다음 단계 <b>${next.emoji} ${next.name}</b>까지 별 <b style="color:var(--accent)">${next.stars - total}개</b> 남았어요!`
    : `🎉 모든 단계를 완성했어요! 비례식 마스터 나무!`;
  showModal(
    `🌳 도전 가이드`,
    `<div style="text-align:center;font-size:20px;color:var(--ink-soft);margin-bottom:8px">별을 모을수록 식물이 자라요</div>
     <div class="level-list">${itemsHtml}</div>
     <div style="text-align:center;font-size:20px;background:var(--paper-edge);padding:10px 14px;border-radius:12px;margin-top:8px">${nextHint}</div>`,
    [{ label:'알겠어요!', cls:'btn-primary' }]
  );
}

const state = {
  screen: 'welcome',  // 매 접속 시 항상 환영 화면부터 시작 (학생마다 이름 선택)
  group: 1,    // 현재 단원 (1~3)
  stage: 1,    // 현재 소단원 (1~7)
  step: 0,
  data: {},
  progress: load(),  // progress[groupId] = stars (0~3)
  userName: '',      // 매 접속 시 새로 선택하도록 초기화 (이전 이름 자동 진입 X)
};

function load(){ try{ return JSON.parse(localStorage.getItem('biyul_progress'))||{}; }catch{ return {};} }
function save(){ localStorage.setItem('biyul_progress', JSON.stringify(state.progress)); }
function loadName(){ try{ return localStorage.getItem('biyul_name') || ''; }catch{ return '';} }
function saveName(n){ try{ localStorage.setItem('biyul_name', n); }catch{} state.userName = n; }

function isUnlocked(){ return true; }
function nextRecommendedGroup(){
  for(const id of [1,2,3]){
    if((state.progress[id]||0) < 3) return id;
  }
  return 3;
}

function go(screen, opts={}){
  state.screen = screen;
  if(opts.group !== undefined) state.group = opts.group;
  if(opts.stage !== undefined) state.stage = opts.stage;
  if(opts.step !== undefined) state.step = opts.step;
  else if(opts.stage !== undefined || opts.group !== undefined) state.step = 0;
  state.data = {};
  render();
}
function nextStep(){
  state.step++;
  state.data = {};
  // 현재 소단원 끝에 다다르면 같은 단원의 다음 소단원으로 자동 진행
  const stageSteps = (stageDefs[state.stage] || []).length;
  if(state.step >= stageSteps){
    const g = GROUPS[groupOf(state.stage)];
    const idx = g.sections.indexOf(state.stage);
    if(idx >= 0 && idx < g.sections.length - 1){
      state.stage = g.sections[idx + 1];
      state.step = 0;
    }
  }
  render();
}
function prevStep(){
  state.data = {};
  if(state.step > 0){
    state.step--;
  } else {
    // 단원 안에서 이전 소단원의 마지막 단계로
    const g = GROUPS[groupOf(state.stage)];
    const idx = g.sections.indexOf(state.stage);
    if(idx > 0){
      state.stage = g.sections[idx - 1];
      state.step = (stageDefs[state.stage] || []).length - 1;
    } else {
      // 단원의 첫 단계 → 목차로
      go('menu', { group: g.id });
      return;
    }
  }
  render();
}
function isFirstStepOfGroup(){
  const g = GROUPS[groupOf(state.stage)];
  return g.sections[0] === state.stage && state.step === 0;
}

/* 분수 표기 — 분모 분의 분자 (분모 아래, 분자 위, 슬래시 X) */
function F(num, den){
  return `<span class="frac"><span>${num}</span><span>${den}</span></span>`;
}

/* 약분 표시 분수 — 원래 분자/분모에 대각선 + 새 숫자가 나란히 표시됨
   예) RF(5, 10, 1, 2) → 5와 10에 대각선, 1과 2가 옆에 작게 */
function RF(origNum, origDen, newNum, newDen){
  return `<span class="frac frac-reduce">
    <span class="orig" data-new="${newNum}">${origNum}</span>
    <span class="orig" data-new="${newDen}">${origDen}</span>
  </span>`;
}

/* Tesseract.js OCR worker — 손글씨로 쓴 숫자를 인식 */
let _tessWorker = null;
let _tessLoading = null;
async function getOCRWorker(){
  if(_tessWorker) return _tessWorker;
  if(typeof Tesseract === 'undefined') return null;
  if(_tessLoading) return _tessLoading;
  _tessLoading = (async ()=>{
    const w = await Tesseract.createWorker('eng');
    try {
      await w.setParameters({
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '8' // 단일 단어 모드 (한 칸에 한 숫자 또는 여러 자리수)
      });
    } catch(e){ /* 일부 버전에서 누락된 파라미터 무시 */ }
    _tessWorker = w;
    return w;
  })();
  return _tessLoading;
}
async function recognizeDigitsFromCanvas(canvas){
  if(!canvas) return '';
  try {
    const w = await getOCRWorker();
    if(!w) return '';
    const { data:{ text } } = await w.recognize(canvas);
    return (text||'').replace(/\D/g, '').trim();
  } catch(e){
    console.warn('OCR 인식 실패:', e);
    return '';
  }
}

/* 손글씨 답 패드 — 마우스/터치로 그리기 + 흰 배경 + clear() 함수 반환 */
function setupAnswerPad(canvas){
  if(!canvas) return null;
  const ctx = canvas.getContext('2d');
  function fit(){
    const rect = canvas.getBoundingClientRect();
    if(rect.width > 5 && rect.height > 5 && (canvas.width !== Math.round(rect.width) || canvas.height !== Math.round(rect.height))){
      canvas.width  = Math.round(rect.width);
      canvas.height = Math.round(rect.height);
    }
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  setTimeout(fit, 60);
  setTimeout(fit, 300);
  let drawing = false;
  function getP(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
             y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
  }
  canvas.addEventListener('mousedown', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); });
  canvas.addEventListener('mousemove', e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
  canvas.addEventListener('mouseup',    ()=>{ drawing=false; });
  canvas.addEventListener('mouseleave', ()=>{ drawing=false; });
  canvas.addEventListener('touchstart', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchend',   ()=>{ drawing=false; });
  return {
    clear: ()=>{
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    },
    isEmpty: ()=>{
      // 단순 휴리스틱 — 검은 픽셀이 거의 없으면 빈 칸으로 간주
      try {
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let inked = 0;
        for(let i = 0; i < img.data.length; i += 4){
          // RGB가 모두 작으면 검은 픽셀
          if(img.data[i] < 200 && img.data[i+1] < 200 && img.data[i+2] < 200) inked++;
        }
        return inked < 20;
      } catch(e){ return false; }
    }
  };
}

/* 정답 시 꽃가루 — 화면 아래에서 위로(약간 대각선) 부채꼴 모양으로 한 번 터지고 사라짐 */
function confetti(){
  const burst = document.createElement('div');
  burst.className = 'confetti-burst';
  document.body.appendChild(burst);
  const colors = ['#ff8755', '#f39e2c', '#2dbf94', '#ec6da4', '#5dafe8', '#a78bfa', '#84d05c'];
  const N = 80;
  for(let i = 0; i < N; i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = '50%';
    p.style.top = '100%';  // 화면 가장 아래에서 출발
    // 좁은 부채꼴 (수직 기준 ±35°) — 위쪽 방향이 주, 양쪽 약간 대각선
    const spread = (Math.random() - 0.5) * (Math.PI * 7 / 18);  // ±35°
    const speed = 420 + Math.random() * 280;
    const dx = Math.sin(spread) * speed;
    const dy = -Math.cos(spread) * speed;  // 음수 = 위쪽
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.animationDelay = (Math.random() * 0.08) + 's';
    burst.appendChild(p);
  }
  setTimeout(() => burst.remove(), 1200);
}

/* 정답 처리 — 꽃가루 한 번 터뜨리고, 단계 페이지 우측 하단에 "다음 →" 버튼을 보여줌 */
function correctAnswer(onNext){
  confetti();
  // #content 안의 step-actions 영역의 기존 버튼을 숨기고 "다음 →" 버튼을 추가/표시
  document.querySelectorAll('#content .step-actions').forEach(area => {
    Array.from(area.querySelectorAll('button')).forEach(b => {
      if(b.classList.contains('btn-next-after')) return;
      b.style.display = 'none';
    });
    let next = area.querySelector('.btn-next-after');
    if(!next){
      next = document.createElement('button');
      next.className = 'btn btn-pink btn-next-after';
      next.textContent = '다음 →';
      area.appendChild(next);
    } else {
      next.style.display = '';
    }
    next.onclick = onNext || nextStep;
  });
}

function toast(msg, ok=true, opts={}){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  // 정답일 때는 토스트 팝업 없이 꽃가루 + "다음 →" 버튼만
  if(ok){
    if(opts.onNext === null){
      // 부분 정답(예: 짝짓기 도중) — 꽃가루만, 진행 없음
      confetti();
    } else {
      correctAnswer(opts.onNext);
    }
    return;
  }
  // 오답: 기존 토스트 팝업 (자동으로 1.5초 후 사라짐)
  const t = el(`
    <div class="toast bad">
      <span class="toast-icon">🤔</span>
      <div class="toast-msg">${msg}</div>
    </div>
  `);
  document.body.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); }, 1500);
}

/* ============== 첫 페이지 — 환영 / 이름 선택(또는 입력) ============== */
function renderWelcomePage(){
  const hasList = Array.isArray(STUDENT_LIST) && STUDENT_LIST.length > 0;
  const loading = !studentLoadDone && (typeof google !== 'undefined' && google.script);

  // 명단 항목을 {name, display} 형태로 정규화
  // - 서버가 [{number, name}] 으로 주면 "번호. 이름" 으로 표시
  // - 단순 문자열 배열이면 그대로 표시
  const normalize = (s) => {
    if (typeof s === 'string') return { name: s, display: s };
    if (s && typeof s === 'object' && s.name) {
      const num = (s.number != null && String(s.number).trim()) ? String(s.number).trim() : '';
      return { name: String(s.name).trim(), display: num ? `${num}. ${s.name}` : String(s.name) };
    }
    return { name: '', display: '' };
  };

  // 입력 영역: 명단이 있으면 드롭다운, 없으면 텍스트 입력
  let inputHtml;
  if(hasList){
    // 매 접속마다 새로 선택해야 하므로 자동 selected 표시는 하지 않음
    const opts = STUDENT_LIST.map(s => {
      const {name, display} = normalize(s);
      if (!name) return '';
      const v = name.replace(/"/g,'&quot;');
      return `<option value="${v}">${display}</option>`;
    }).join('');
    inputHtml = `
      <select class="welcome-select" id="name-select">
        <option value="">— 번호·이름을 선택하세요 —</option>
        ${opts}
        <option value="__OTHER__">✏ 명단에 없어요 (직접 입력)</option>
      </select>
      <input class="welcome-input" id="name-input" placeholder="이름을 입력하세요" maxlength="12" style="display:none;width:300px" />
    `;
  } else {
    inputHtml = `<input class="welcome-input" id="name-input" placeholder="이름을 입력하세요" maxlength="12" />`;
  }

  const root = el(`
    <div class="welcome">
      <div class="welcome-mascot">${BAKER_SVG}</div>
      <div class="welcome-title">따끈따끈 베이커리</div>
      <div class="welcome-sub">6학년 2학기 · 비례식과 비례배분 — <b style="color:var(--accent)">꼬마 제빵사 도전기</b></div>
      <div class="welcome-form">
        <div class="welcome-label">${hasList ? '명단에서 자기 번호·이름을 선택하세요' : '꼬마 제빵사의 이름을 알려주세요!'}</div>
        ${inputHtml}
        ${loading ? `<div class="welcome-loading">📋 명단 불러오는 중…</div>` : ''}
        <button class="btn btn-primary welcome-start" id="start">베이커리 시작하기 →</button>
      </div>
    </div>
  `);

  const input = root.querySelector('#name-input');
  const select = root.querySelector('#name-select');
  const start = root.querySelector('#start');

  if(hasList){
    select.addEventListener('change', ()=>{
      if(select.value === '__OTHER__'){
        // 직접 입력 모드로 전환
        select.style.display = 'none';
        input.style.display = '';
        input.focus();
      }
    });
    setTimeout(()=> select.focus(), 50);
  } else {
    // 텍스트 입력 모드 — 항상 비워서 시작
    setTimeout(()=> input.focus(), 50);
  }

  function getName(){
    if(hasList && select && select.style.display !== 'none' && select.value && select.value !== '__OTHER__'){
      return select.value.trim();
    }
    return (input.value||'').trim();
  }
  function begin(){
    const name = getName() || '꼬마 제빵사';
    if(hasList && (!select.value || select.value === '__OTHER__') && !(input.value||'').trim()){
      // 드롭다운에서 선택도 안 했고 직접 입력도 안 함
      select.focus();
      return;
    }
    saveName(name);
    go('home');
  }
  start.addEventListener('click', begin);
  if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter') begin(); });
  return root;
}

  const menuGroups = [];
  stepNames.forEach((info, i)=>{
    const fullName = info.name || `단계 ${i+1}`;
    const shortName = fullName.split(' — ')[0];
    const last = menuGroups[menuGroups.length - 1];
    if(last && last.shortName === shortName){
      // 이전 항목에 병합 (첫 step만 진입점으로 사용)
      last.lastStep = i;
    } else {
      menuGroups.push({ shortName, icon: info.icon || '📘', firstStep: i, lastStep: i });
    }
  });

  // 단원이 클리어 안 됐을 때 첫 메뉴 항목이 추천
  const items = menuGroups.map((g0, idx)=>{
    let cls = '';
    let status = groupCleared ? '완료' : '시작 전';
    let recBadge = '';
    if(!groupCleared && idx === 0){
      cls = 'recommended';
      recBadge = `<div class="menu-item-rec">✨ 추천</div>`;
    } else if(groupCleared){
      cls = 'done';
    }
    return `
      <div class="menu-item ${cls}"
           style="--c:var(--tab-${tabIdx});--c-soft:var(--tab-${tabIdx}-soft)"
           data-stage="${stageId}" data-step="${g0.firstStep}">
        <div class="menu-item-num">${idx+1}</div>
        <div class="menu-item-icon">${g0.icon}</div>
        <div class="menu-item-name">${g0.shortName}</div>
        ${recBadge}
        <div class="menu-item-status">${status}</div>
        <div class="menu-item-arrow">→</div>
      </div>
    `;
  }).join('');

  const root = el(`
    <div class="screen" style="--page-color: var(--tab-${tabIdx})">
      <div class="topbar">
        <button class="topbar-btn" id="home" title="홈으로">🏠</button>
        <div class="topbar-title">
          <span style="color:var(--tab-${tabIdx})">${g.emoji}</span>
          <span>${g.title}</span>
        </div>
        <div style="width:46px"></div>
      </div>

      <div class="menu-banner" style="--c:var(--tab-${tabIdx});--c-soft:var(--tab-${tabIdx}-soft)">
        <div class="menu-chip-stage"><span style="color:var(--tab-${tabIdx})">${stage.emoji}</span> ${stage.title}</div>
        <div class="menu-goal"><b>🎯 오늘의 학습 목표</b> &nbsp; ${stage.desc}</div>
      </div>

      <div class="menu-list">${items}</div>

      <div class="menu-help">📊 <b>학습 단계</b> — 순서대로 진행하거나, 원하는 단계를 직접 선택할 수 있어요!</div>
    </div>
  `);

  root.querySelector('#home').addEventListener('click', ()=> go('home'));
  root.querySelectorAll('.menu-item').forEach(it=>{
    it.addEventListener('click', ()=>{
      const sId = +it.dataset.stage;
      const stepIdx = +it.dataset.step;
      go('stage', { group: state.group, stage: sId, step: stepIdx });
    });
  });

  return root;
}

/* ============== 학습 단계 페이지 ============== */
function renderStagePage(){
  const s = STAGES.find(x=>x.id===state.stage);
  const steps = stageDefs[state.stage];
  const totalSteps = steps.length;
  const stepFn = steps[Math.min(state.step, totalSteps-1)];
  const stepInfo = (STEP_NAMES[s.id] && STEP_NAMES[s.id][state.step])
                    || { name:`단계 ${state.step+1}`, icon:'📘' };
  // 단원의 색
  const gid = groupOf(state.stage);
  const tabIdx = groupColor(gid);

  // 그룹(=메인 탭) 전체 페이지 수 + 현재 위치
  const groupSections = GROUPS[gid].sections;
  let groupTotal = 0;
  let groupPos = 0;
  for(const sId of groupSections){
    const cnt = (stageDefs[sId] || []).length;
    if(sId === state.stage){
      groupPos = groupTotal + state.step + 1;
    }
    groupTotal += cnt;
  }

  const isFirst = isFirstStepOfGroup();

  const root = el(`
    <div class="screen" style="--page-color: var(--tab-${tabIdx})">
      <div class="topbar">
        <div style="display:flex;gap:8px">
          <button class="topbar-btn" id="home" title="홈으로">🏠</button>
          <button class="topbar-btn" id="prev" title="이전 단계로" ${isFirst?'disabled style="opacity:.4;cursor:not-allowed"':''}>←</button>
        </div>
        <div class="topbar-title">
          <span style="color:var(--tab-${s.id})">${s.emoji}</span>
          <span>${s.title}</span>
          <span style="color:var(--muted);font-size:20px">·</span>
          <span style="color:var(--ink-soft);font-size:20px">${stepInfo.icon} ${stepInfo.name}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="page-pill">${groupPos} / ${groupTotal}</div>
          <button class="topbar-toc" id="toc">목차</button>
        </div>
      </div>

      <div class="page-content pop-in" id="content"></div>
    </div>
  `);

  root.querySelector('#home').addEventListener('click', ()=> go('home'));
  root.querySelector('#toc').addEventListener('click', ()=> go('menu', { group: gid }));
  const prevBtn = root.querySelector('#prev');
  if(!isFirst) prevBtn.addEventListener('click', ()=> prevStep());
  root.querySelector('#content').appendChild(stepFn());
  return root;
}

function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a; }

function makeProblems(problems, onDone, label='정답 확인'){
  // 한 문제씩 보여주고 정답 확인. 정답 시 토스트의 "다음으로" 버튼으로 진행.
  state.data.qi = state.data.qi ?? 0;
  state.data.qs = state.data.qs ?? 0;
  const total = problems.length;

  // 모든 문제 완료
  if(state.data.qi >= total){
    const score = state.data.qs;
    const finishR = el(`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px">
        <div style="font-size:90px;line-height:1">🌟</div>
        <div style="font-size:32px">${score} / ${total} 문제 정답!</div>
        <div style="font-size:20px;color:var(--ink-soft);text-align:center">잘했어요! 다음으로 넘어가요</div>
        <button id="next-btn" class="btn btn-primary" style="margin-top:8px">다음으로 →</button>
      </div>
    `);
    finishR.querySelector('#next-btn').addEventListener('click', ()=>{
      state.data = {};
      (onDone || nextStep)();
    });
    return finishR;
  }

  const p = problems[state.data.qi];
  let qHtml = p.q;
  const anses = [];
  let i = 0;
  qHtml = qHtml.replace(/__ANS__/g, ()=> {
    const id = `a${i++}`;
    anses.push(id);
    // 입력칸 글씨를 주변 식 글씨(54px)와 비슷하게 키움
    return `<input class="ans" inputmode="decimal" data-id="${id}" style="width:96px;height:74px;font-size:44px" />`;
  });

  // 손글씨 답 패드 — 메인 입력 개수만큼 만들고 사이에 ':' 구분자
  const ocrPads = anses.map((id, idx) =>
    `<canvas class="answer-pad" data-idx="${idx}"></canvas>`
  ).join('<span style="font-size:22px;font-weight:800;color:var(--ink);font-family:\'Jua\',sans-serif">:</span>');

  const r = el(`
    <div style="display:flex;flex-direction:column;height:100%;gap:14px">
      <!-- 본문: 좌(문제) + 우(OCR 보드) — 문제/점수는 상단 차시명 옆으로 옮김 -->
      <div style="display:flex;gap:14px;flex:1;min-height:0;align-items:stretch">
        <!-- 왼쪽: 문제 -->
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;min-width:0">
          ${p.label ? `<div style="text-align:center;font-size:26px;color:var(--ink);background:#fff7e0;border:3px solid var(--accent);border-radius:16px;padding:12px 22px;margin:0 auto;max-width:fit-content;font-weight:500;line-height:1.4">${p.label}</div>` : ''}
          <div style="background:linear-gradient(135deg,#f5edff 0%,#ede0ff 100%);border:3px solid var(--tab-3);border-radius:20px;padding:34px 24px;text-align:center">
            <div style="font-size:50px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;font-weight:800">${qHtml}</div>
          </div>
        </div>
        <!-- 오른쪽: OCR 계산 노트 + 답 입력 -->
        <div style="flex:0 0 290px;position:relative;background:white;border:2px dashed #d4b487;border-radius:14px;overflow:hidden;display:flex;flex-direction:column">
          <canvas class="scratch-pad" style="display:block;flex:1;cursor:crosshair;touch-action:none;background:white"></canvas>
          <div style="position:absolute;top:8px;left:12px;font-size:16px;color:var(--ink-soft);font-weight:700;pointer-events:none;background:rgba(255,250,238,0.85);padding:3px 10px;border-radius:8px">📝 계산 노트</div>
          <button class="clear-scratch" style="position:absolute;top:8px;right:10px;font-size:13px;padding:5px 10px;background:white;border:2px solid #d4b487;border-radius:8px;cursor:pointer;font-family:'Jua',sans-serif;color:var(--ink);font-weight:700">🧹 지우기</button>
          <!-- 손글씨 답 패드 (정답 확인 시 OCR로 인식) -->
          <div style="display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,250,238,0.95);border-top:2px dashed #d4b487;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:800;color:var(--ink);font-family:'Jua',sans-serif">답:</span>
            ${ocrPads}
            <button class="clear-answer-pads" title="답 지우기">🧹</button>
          </div>
        </div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-blue">${label}</button>
      </div>
    </div>
  `);

  const ansInputs = anses.map(id => r.querySelector(`[data-id="${id}"]`));
  // 손글씨 답 패드 — 메인 입력 개수만큼 setup
  const answerPads = Array.from(r.querySelectorAll('.answer-pad'));
  const padHandlers = answerPads.map(c => setupAnswerPad(c));
  const clearAns = r.querySelector('.clear-answer-pads');
  if(clearAns) clearAns.addEventListener('click', ()=>{
    padHandlers.forEach(h => h && h.clear());
    answerPads.forEach(p => p.classList.remove('correct','wrong'));
  });

  // 계산 노트 캔버스 — 그리기 + 지우기
  const canvas = r.querySelector('.scratch-pad');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    function fitCanvas(){
      const rect = canvas.getBoundingClientRect();
      if(rect.width > 10 && rect.height > 10){
        canvas.width = Math.round(rect.width);
        canvas.height = Math.round(rect.height);
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
    }
    setTimeout(fitCanvas, 60);
    setTimeout(fitCanvas, 300);
    let drawing = false;
    function getP(e){
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
               y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
    }
    canvas.addEventListener('mousedown', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); });
    canvas.addEventListener('mousemove', e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
    canvas.addEventListener('mouseup',    ()=>{ drawing=false; });
    canvas.addEventListener('mouseleave', ()=>{ drawing=false; });
    canvas.addEventListener('touchstart', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove',  e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend',   ()=>{ drawing=false; });
    const clearBtn = r.querySelector('.clear-scratch');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); });
  }

  r.querySelector('#check').addEventListener('click', async ()=>{
    const checkBtn = r.querySelector('#check');
    const origLabel = checkBtn.textContent;
    checkBtn.disabled = true; checkBtn.textContent = '인식 중…';
    // 손글씨 답 패드에서 OCR 인식 → 메인 입력칸 값으로 채움
    try {
      const recs = await Promise.all(answerPads.map(c => recognizeDigitsFromCanvas(c)));
      recs.forEach((rec, j)=>{
        if(rec && ansInputs[j]) ansInputs[j].value = rec;
      });
    } catch(e){ /* OCR 실패해도 계속 */ }
    checkBtn.disabled = false; checkBtn.textContent = origLabel;

    let allOk = true;
    ansInputs.forEach((inp, j)=>{
      inp.classList.remove('ok','bad');
      const v = (inp.value||'').trim();
      const ok = String(v) === String(p.answers[j]);
      inp.classList.add(ok?'ok':'bad');
      if(!ok) allOk = false;
    });
    // 손글씨 답 패드 색도 동기화
    answerPads.forEach((pad, j)=>{
      pad.classList.remove('correct','wrong');
      const v = (ansInputs[j]?.value||'').trim();
      const ok = String(v) === String(p.answers[j]);
      pad.classList.add(ok ? 'correct' : 'wrong');
    });
    if(allOk){
      state.data.qs = (state.data.qs||0) + 1;
      checkBtn.disabled = true;
      const advance = ()=>{
        state.data.qi = (state.data.qi||0) + 1;
        state.data.qReady = false;
        render();
      };
      toast('정답이에요!', true, { onNext: advance });
    } else {
      toast('다시 풀어볼까요?', false);
      r.classList.add('shake');
      setTimeout(()=>r.classList.remove('shake'), 400);
    }
  });

  // 차시명 옆에 "문제 N/total · ⭐ score" 진행도 표시
  setTimeout(()=> updateTopbarProgress(state.data.qi + 1, total, state.data.qs), 0);

  return r;
}

        story:'쿠키 3판에 설탕 5컵이 들어가요. 설탕 10컵이면 쿠키 몇 판? (쿠키판 : 설탕 = 3 : 5)' },
      { a:4, b:7,  given:'R', givenVal:14, mult:2, ans:8,
        story:'도넛 4개에 초콜릿 7조각이 토핑돼요. 초콜릿 14조각이면 도넛 몇 개? (도넛 : 초콜릿 = 4 : 7)' },
      { a:2, b:9,  given:'R', givenVal:27, mult:3, ans:6,
        story:'케이크 2개에 딸기 9개가 올라가요. 딸기 27개라면 케이크는 몇 개? (케이크 : 딸기 = 2 : 9)' },
      { a:5, b:6,  given:'L', givenVal:15, mult:3, ans:18,
        story:'빵 5덩어리에 달걀 6개씩 들어가요. 빵 15덩어리라면 달걀은 몇 개? (빵 : 달걀 = 5 : 6)' },
    ];
    state.data.q = state.data.q ?? 0;
    state.data.score = state.data.score ?? 0;
    if(state.data.q >= problems.length){
      const finishR = el(`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%">

      finishR.querySelector('#check').addEventListener('click', ()=>{

      });

    }
    const p = problems[state.data.q];
    const givenL = p.given==='L' ? p.givenVal : '';
    const givenR = p.given==='R' ? p.givenVal : '';
    const r = el(`<div>
      <!-- 문제/점수는 상단 차시명 옆으로 옮김 — 여기는 노란 박스부터 시작 -->

      <div class="work-card">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center;margin:10px 0">
          <div class="text-center" style="background:#fff7ed;border:2px solid #fb923c;border-radius:14px;padding:14px">
            <div style="font-size:24px;color:var(--ink-soft);margin-bottom:6px">전항</div>
            <div style="font-size:34px">${p.a} × <input class="ans" data-id="m1" placeholder="?" style="width:72px;height:60px;font-size:34px" /> = <input class="ans" data-id="rL" placeholder="?" style="width:72px;height:60px;font-size:34px" ${givenL?`value="${givenL}" readonly`:''} /></div>
