        x.className = 'fb-x';
        wrap.appendChild(x);
      }
    }

    function setupScratch(){
      const c = r.querySelector('.scratch-pad');
      if(!c) return;
      const ctx = c.getContext('2d');
      function applyCtxStyle(){
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      function fitCanvas(){
        const rect = c.getBoundingClientRect();
        if(rect.width > 10 && rect.height > 10){
          c.width = Math.round(rect.width);
          c.height = Math.round(rect.height);
          applyCtxStyle();
        }
      }
      setTimeout(fitCanvas, 60);
      setTimeout(fitCanvas, 300);
      let drawing = false;
      function getP(e){
        const rect = c.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - rect.left) * (c.width / rect.width),
                 y: (t.clientY - rect.top)  * (c.height / rect.height) };
      }
      function start(e){ drawing = true; const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }
      function move(e){ if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }
      function stop(){ drawing = false; }
      c.addEventListener('mousedown', start);
      c.addEventListener('mousemove', move);
      c.addEventListener('mouseup', stop);
      c.addEventListener('mouseleave', stop);
      c.addEventListener('touchstart', start, { passive:false });
      c.addEventListener('touchmove',  move,  { passive:false });
      c.addEventListener('touchend',   stop);
      r.querySelector('.clear-scratch').addEventListener('click', ()=>{
        ctx.clearRect(0, 0, c.width, c.height);
      });
    }

    function showResults(){
      clearTimer();
      const elapsed = Math.round((Date.now() - G.startTime) / 1000);
      const passed = G.score >= G.mode.target;

          <div style="font-size:22px;color:var(--ink-soft)">소요 시간: ${elapsed}초${G.expired?' · 폭탄이 터졌어요 💥':''}</div>
          ${reward ? `
            <div style="background:linear-gradient(135deg,#fff5d9,#ffe9b0);border:4px solid var(--accent);border-radius:24px;padding:18px 30px;text-align:center;animation:fb-grow 0.6s">
              <div style="font-size:70px;line-height:1">🍞 📖</div>
              <div style="font-size:30px;font-weight:800;color:var(--primary-deep);margin-top:6px">🎁 보상 획득!</div>
              <div style="font-size:22px;color:var(--ink);margin-top:4px">사장님의 비밀 레시피북 + 갓 구운 빵을 받았어요!</div>
            </div>
          ` : (opts.hasReward && G.mode.target < 20 ? `<div style="font-size:20px;color:var(--ink-soft)">💡 도전 ③ (20개)를 통과하면 보상을 받을 수 있어요!</div>` : '')}
          <div style="display:flex;gap:12px;margin-top:6px">
            <button class="btn btn-secondary" id="again-btn" style="font-size:22px">한 번 더 도전</button>
            <button class="btn btn-pink" id="finish-btn" style="font-size:22px">단원 마치기 →</button>
          </div>
        </div>
      `;
      r.querySelector('#again-btn').addEventListener('click', showSelect);
      r.querySelector('#finish-btn').addEventListener('click', ()=> finishStage(...opts.finishArgs));
    }

    showSelect();
    return r;
  };
}

      const p = G.problems[G.idx];
      if(!p) return;
      const a = r.querySelector('[data-id="ga"]');
      if(!a) return;
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const checkBtn = r.querySelector('#check-game');
      const origLabel = checkBtn ? checkBtn.textContent : '';
      if(checkBtn){ checkBtn.disabled = true; checkBtn.textContent = '인식 중…'; }
      try {
        const rec = await recognizeDigitsFromCanvas(padA);
        if(rec) a.value = rec;
      } catch(e){ /* OCR 실패해도 계속 */ }
      if(checkBtn){ checkBtn.disabled = false; checkBtn.textContent = origLabel; }
      const v = (a.value||'').trim();
      const ok = v === String(p.ans);
      a.disabled = true;
      showFeedback(a.closest('.game-input-wrap'), ok);
      if(padA){ padA.classList.remove('correct','wrong'); padA.classList.add(ok ? 'correct' : 'wrong'); }
      if(ok){
        G.score++;
        const s = r.querySelector('.score-text');
        if(s) s.textContent = G.score;
      }
      setTimeout(()=>{ G.idx++; showProblem(); }, 1100);
    }

    function showFeedback(wrap, ok){
      const inp = wrap.querySelector('input');
      if(ok){
        inp.style.color = '#16a34a';
        inp.style.borderColor = '#16a34a';
        const c = document.createElement('span');
        c.className = 'fb-circle';
        wrap.appendChild(c);
      } else {
        inp.style.color = '#dc2626';
        inp.style.borderColor = '#dc2626';
        const x = document.createElement('span');
        x.className = 'fb-x';
        wrap.appendChild(x);
      }
    }

    function setupScratch(){
      const c = r.querySelector('.scratch-pad');
      if(!c) return;
      const ctx = c.getContext('2d');
      function applyCtxStyle(){
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      function fitCanvas(){
        const rect = c.getBoundingClientRect();
        if(rect.width > 10 && rect.height > 10){
          c.width = Math.round(rect.width);
          c.height = Math.round(rect.height);
          applyCtxStyle();
        }
      }
      setTimeout(fitCanvas, 60);
      setTimeout(fitCanvas, 300);
      let drawing = false;
      function getP(e){
        const rect = c.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - rect.left) * (c.width / rect.width),
                 y: (t.clientY - rect.top)  * (c.height / rect.height) };
      }
      function start(e){ drawing = true; const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }
      function move(e){ if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }
      function stop(){ drawing = false; }
      c.addEventListener('mousedown', start);
      c.addEventListener('mousemove', move);
      c.addEventListener('mouseup', stop);
      c.addEventListener('mouseleave', stop);
      c.addEventListener('touchstart', start, { passive:false });
      c.addEventListener('touchmove',  move,  { passive:false });
      c.addEventListener('touchend',   stop);
      r.querySelector('.clear-scratch').addEventListener('click', ()=>{
        ctx.clearRect(0, 0, c.width, c.height);
      });
    }

    function showResults(){
      clearTimer();
      const elapsed = Math.round((Date.now() - G.startTime) / 1000);
      const passed = G.score >= G.mode.target;
      const reward = opts.hasReward && G.mode.target === 20 && passed;
      logGameScore(`${opts.title} · ${G.mode.label}`, G.score, elapsed);
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;height:100%;padding:14px">
          <div style="font-size:80px">${passed ? '🎉' : '💪'}</div>
          <div style="font-size:36px;font-weight:800">${G.mode.label} 결과</div>
          <div style="font-size:32px">맞춘 개수: <b style="color:var(--good)">${G.score}</b> / ${G.mode.target}</div>
          <div style="font-size:22px;color:var(--ink-soft)">소요 시간: ${elapsed}초${G.expired?' · 폭탄이 터졌어요 💥':''}</div>
          <div style="display:flex;gap:12px;margin-top:6px">
            <button class="btn btn-secondary" id="again-btn" style="font-size:22px">한 번 더 도전</button>
            <button class="btn btn-pink" id="finish-btn" style="font-size:22px">단원 마치기 →</button>
          </div>
        </div>
      `;
      r.querySelector('#again-btn').addEventListener('click', showSelect);
      r.querySelector('#finish-btn').addEventListener('click', ()=> finishStage(...opts.finishArgs));
    }

    showSelect();
    return r;
  };
}

        mark.textContent = card.dataset.eq === '1' ? '✓ 같은 비율' : '✗ 다른 비율';
        // 기존 "👆 분수로 확인" 안내 텍스트 교체
        const hint = idle.querySelector('div');
        if(hint) hint.replaceWith(mark); else idle.appendChild(mark);
      }
    }
    function expandCard(card){
      card.querySelector('.rc-idle').style.display = 'none';
      card.querySelector('.rc-open').style.display = '';
    }
    r.querySelectorAll('.rc').forEach(card => {
      card.addEventListener('click', ()=>{
        // 같은 카드 다시 클릭 시 무시
        if(currentOpen === card) return;
        // 이전에 펼쳤던 카드는 축소
        if(currentOpen) collapseCard(currentOpen);
        // 새 카드 펼치기
        expandCard(card);
        // 카드 테두리·배경 색 (✓ 또는 ✗)
        if(card.dataset.eq === '1'){
          card.style.borderColor = '#16a34a';
          card.style.background = '#dcfce7';
        } else {
          card.style.borderColor = '#dc2626';
          card.style.background = '#ffe0e0';
        }
        verifiedSet.add(card);
        currentOpen = card;
        r.querySelector('#rc-done').textContent = verifiedSet.size;
        // 모두 확인하면 정답 확인 버튼 활성화
        if(verifiedSet.size >= cards.length){
          const btn = r.querySelector('#check');
          btn.disabled = false; btn.style.opacity = '1';
        }
      });
    });

    // === 정답 확인 — 전항·후항 라벨이 맞아야 통과 ===
    r.querySelector('#check').addEventListener('click', ()=>{
      const slots = Array.from(r.querySelectorAll('.t-slot'));
      const labelOk = slots.every(s => s.dataset.value === expected[s.dataset.target]);
      if(!labelOk){
        slots.forEach(s => {

          }
        });

           </div>`,
          [{ label:'다시 해 볼게요', cls:'btn-primary' }]
        );
        return;
      }
      r.querySelector('#check').disabled = true;
      toast('정답이에요', true);
    });

    refreshChips();
    return r;
  },

            <div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:18px solid var(--good)"></div>

            <div style="font-size:34px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap"><span id="frontA">?</span> × <input class="ans" data-id="m1" placeholder="?" style="width:72px;height:60px;font-size:34px;color:#ec6da4;border-color:#f9a8c5;font-weight:800" /> = <input class="ans" data-id="rL" placeholder="?" style="width:72px;height:60px;font-size:34px" ${givenL?`value="${givenL}" readonly`:''} /></div>
          </div>
          <div class="text-center" style="background:#eff6ff;border:2px solid var(--tab-7);border-radius:14px;padding:14px">
            <div style="font-size:24px;color:#ec6da4;font-weight:800;margin-bottom:6px">후항</div>
            <div style="font-size:34px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap"><span id="backB">?</span> × <input class="ans" data-id="m2" placeholder="?" style="width:72px;height:60px;font-size:34px;color:#ec6da4;border-color:#f9a8c5;font-weight:800" /> = <input class="ans" data-id="rR" placeholder="?" style="width:72px;height:60px;font-size:34px" ${givenR?`value="${givenR}" readonly`:''} /></div>
          </div>
        </div>
        <div class="text-center" style="font-size:24px;color:var(--ink-soft);margin-top:4px">결과</div>
        <div class="work-row" style="font-size:48px;color:var(--tab-3-deep)">
          <span id="oL" style="display:inline-block;min-width:60px;text-align:center;border-bottom:3px solid currentColor">?</span> : <span id="oR" style="display:inline-block;min-width:60px;text-align:center;border-bottom:3px solid currentColor">?</span> = <span id="dL" style="display:inline-block;min-width:60px;text-align:center;border-bottom:3px solid currentColor">${givenL || '?'}</span> : <span id="dR" style="display:inline-block;min-width:60px;text-align:center;border-bottom:3px solid currentColor">${givenR || '?'}</span>
        </div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-blue">정답 확인</button>
      </div>
    </div>`);
    const dL = r.querySelector('#dL'), dR = r.querySelector('#dR');
    const oL = r.querySelector('#oL'), oR = r.querySelector('#oR');
    const frontA = r.querySelector('#frontA'), backB = r.querySelector('#backB');
    const iAInp = r.querySelector('[data-id="iA"]'), iBInp = r.querySelector('[data-id="iB"]');
    const rLInp = r.querySelector('[data-id="rL"]'), rRInp = r.querySelector('[data-id="rR"]');
    const refreshDisplay = ()=>{
      const ia = (iAInp.value||'').trim(), ib = (iBInp.value||'').trim();
      oL.textContent = ia || '?';
      oR.textContent = ib || '?';
      frontA.textContent = ia || '?';
      backB.textContent = ib || '?';
      if(p.given !== 'L'){ const v = (rLInp.value||'').trim(); dL.textContent = v || '?'; }
      if(p.given !== 'R'){ const v = (rRInp.value||'').trim(); dR.textContent = v || '?'; }
    };
    iAInp.addEventListener('input', refreshDisplay);
    iBInp.addEventListener('input', refreshDisplay);
    rLInp.addEventListener('input', refreshDisplay);
    rRInp.addEventListener('input', refreshDisplay);
    r.querySelector('#check').addEventListener('click', ()=>{
      const iA = r.querySelector('[data-id="iA"]'), iB = r.querySelector('[data-id="iB"]');
      const m1 = r.querySelector('[data-id="m1"]'), m2 = r.querySelector('[data-id="m2"]');
      const rL = r.querySelector('[data-id="rL"]'), rR = r.querySelector('[data-id="rR"]');
      const iAv = (iA.value||'').trim(), iBv = (iB.value||'').trim();
      const m1v = (m1.value||'').trim(), m2v = (m2.value||'').trim();
      const rLv = (rL.value||'').trim(), rRv = (rR.value||'').trim();
      const expected = {
        iA: String(p.a),
        iB: String(p.b),
        m1: String(p.mult),
        m2: String(p.mult),
        rL: String(p.given==='L' ? p.givenVal : p.ans),
        rR: String(p.given==='R' ? p.givenVal : p.ans),
      };
      const checks = [[iA,iAv,expected.iA],[iB,iBv,expected.iB],[m1,m1v,expected.m1],[m2,m2v,expected.m2],[rL,rLv,expected.rL],[rR,rRv,expected.rR]];
      let allOk = true;
      checks.forEach(([inp,v,exp])=>{
        inp.classList.remove('ok','bad');
        if(v === exp) inp.classList.add('ok');
        else { inp.classList.add('bad'); allOk = false; }
      });
      if(allOk){
        state.data.score = (state.data.score||0) + 1;
        const summaryEl = r.querySelector('#summary');
        const summaryTxt = r.querySelector('#summary-text');
        if(summaryEl && summaryTxt){
          summaryTxt.textContent = `💡 ${p.summary}`;
          summaryEl.style.display = 'block';
        }
        const advance = ()=>{ state.data.q = (state.data.q||0) + 1; render(); };
        toast('', true, { onNext: advance });
      } else {
        if(iAv && iBv && (iAv !== expected.iA || iBv !== expected.iB)){
          toast('문제에서 비를 다시 찾아 써 봐요', false);
        } else if(m1v && m2v && m1v !== m2v){
          toast('전항과 후항에 같은 수를 곱해야 해요', false);
        } else {
          toast('다시 풀어볼까요?', false);
        }
      }
    });
    // 차시명 옆에 "문제 N/total · ⭐ score" 진행도 표시
    setTimeout(()=> updateTopbarProgress(state.data.q+1, problems.length, state.data.score), 0);
    return r;
  },
  // ⑥ 연습하기 — 비 줄이기 게임 (3 모드 / 타이머 폭탄 / 계산 노트 / 보상)
  ()=>{
    const r = el(`<div class="game-root" style="height:100%;display:flex;flex-direction:column"></div>`);
    const G = {
      mode: null,       // { target, label }
      problems: [],
      idx: 0,
      score: 0,
      timeLeft: 120,
      timerId: null,
      expired: false,
      startTime: 0,
    };

    function clearTimer(){ if(G.timerId){ clearInterval(G.timerId); G.timerId = null; } }

    /* ── 모드 선택 화면 ── */
    function showSelect(){
      clearTimer();
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:22px;height:100%;padding:10px">
          <div style="font-size:42px;font-weight:800;color:var(--primary-deep)">⏱️ 비 줄이기 게임</div>
          <div style="font-size:24px;color:var(--ink);text-align:center;line-height:1.5">
            제시되는 비를 보고 <b style="color:#ec6da4">가장 간단한 자연수의 비</b>로 줄여 봐요!<br>
            예) 8 : 2 → 4 : 1
          </div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:6px">
            ${[10,15,20].map((n,i)=>`
              <button class="game-mode-btn" data-target="${n}">
                <div style="font-size:32px;font-weight:800;color:var(--primary-deep)">도전 ${['①','②','③'][i]}</div>
                <div style="font-size:22px;color:var(--ink-soft);margin-top:6px">2분 안에 <b>${n}개</b></div>
              </button>
            `).join('')}
          </div>
          <div style="font-size:20px;color:var(--ink-soft);margin-top:6px">
            💣 폭탄이 터져도 계속 풀 수 있어요! &nbsp; 🎁 20개 도전 통과 시 보상!
          </div>
        </div>
      `;
      r.querySelectorAll('.game-mode-btn').forEach(b=>{
        b.addEventListener('click', ()=> startGame(+b.dataset.target));
      });
    }

    /* ── 게임 시작 ── */
    function startGame(target){
      const labels = { 10:'도전 ① (10개)', 15:'도전 ② (15개)', 20:'도전 ③ (20개)' };
      G.mode = { target, label: labels[target] };
      G.problems = shuffleArr(RATIO_PROBLEMS).slice(0, target);
      G.idx = 0; G.score = 0;
      G.timeLeft = 120; G.expired = false;
      G.startTime = Date.now();
      renderPlay();
      runTimer();
      showProblem();
    }

    function runTimer(){
      clearTimer();
      // 누적 감소 대신 벽시계 기반(Date.now)으로 매번 남은 시간을 계산 — 콜백 지연이 누적돼도 시간이 멈춰 보이지 않음
      const TOTAL = G.timeLeft;          // 시작 시 남은 시간(초) 캡처
      const startMs = Date.now();
      updateTimerUI();                   // 즉시 한 번 표시
      G.timerId = setInterval(()=>{
        const elapsed = Math.floor((Date.now() - startMs) / 1000);
        const newLeft = Math.max(0, TOTAL - elapsed);
        if(newLeft !== G.timeLeft){
          G.timeLeft = newLeft;
          updateTimerUI();
        }
        if(G.timeLeft <= 0){
          G.expired = true;
          clearTimer();
          explodeBomb();
        }
      }, 250);  // 250ms 틱 — 자연스럽게 반응, 초 단위 변화 시에만 UI 갱신
    }

    function updateTimerUI(){
      const t = r.querySelector('.timer-text');
      if(!t) return;
      if(G.timeLeft <= 0){ t.textContent = '시간 끝!'; t.style.color = '#dc2626'; return; }
      const m = Math.floor(G.timeLeft / 60);
      const s = G.timeLeft % 60;
      t.textContent = `${m}:${String(s).padStart(2,'0')}`;
      if(G.timeLeft <= 15) t.style.color = '#dc2626';
      const clock = r.querySelector('.clock-icon');
      if(clock && G.timeLeft <= 15 && G.timeLeft > 0) clock.classList.add('warning');
    }

    function explodeBomb(){
      const clock = r.querySelector('.clock-icon');
      if(clock){
        clock.classList.remove('warning');
        clock.classList.add('exploded');
        clock.textContent = '⏰';  // 알람 시계로 — 시간 끝!
      }
      const t = r.querySelector('.timer-text');
      if(t){ t.textContent = '시간 끝!'; t.style.color = '#dc2626'; }
    }

    /* ── 플레이 화면 (왼쪽 좁고 긴 문제박스 + 오른쪽 넓은 계산 노트) ── */
    function renderPlay(){
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;height:100%">
          <!-- 헤더: 모드 / 시계+타이머 / 점수 -->
          <div style="display:flex;justify-content:space-between;align-items:center;background:#fff7e0;border:2px solid var(--accent);border-radius:14px;padding:10px 22px;flex-shrink:0">
            <div style="font-size:24px;font-weight:800">${G.mode.label}</div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="clock-icon" style="font-size:38px">🕐</span>
              <span class="timer-text" style="font-size:32px;font-weight:800;font-family:'Pretendard Variable',sans-serif">2:00</span>
            </div>
            <div style="font-size:24px;font-weight:800">맞춤: <span class="score-text" style="color:var(--good)">0</span> / ${G.mode.target}</div>
          </div>
          <!-- 본문: 좌(문제, 좁고 길게) + 우(계산 노트, 넓게) -->
          <div style="display:flex;gap:14px;flex:1;min-height:0">
            <!-- 왼쪽: 문제 박스 (가로 좁고 세로 길게) -->
            <div style="flex:0 0 520px;display:flex;flex-direction:column;background:#f5edff;border:3px solid var(--tab-3);border-radius:18px;padding:24px;justify-content:space-between;gap:18px">
              <div style="text-align:center;font-size:20px;color:var(--ink-soft);white-space:nowrap">가장 간단한 자연수의 비로 만들어 보세요</div>
              <div class="problem-area" style="text-align:center;font-size:42px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:nowrap;white-space:nowrap;overflow:hidden"></div>
              <div style="display:flex;justify-content:center;gap:10px">
                <button class="btn btn-secondary" id="quit-game" style="font-size:20px">중단</button>
                <button class="btn btn-blue" id="check-game" style="font-size:26px;padding:12px 32px">정답 확인</button>
              </div>
            </div>
            <!-- 오른쪽: 계산 노트 (가로 넓게 / 라벨·지우기 박스 안 + 하단 손글씨 답 패드) -->
            <div class="scratch-pad-wrap" style="flex:1;position:relative;background:white;border:2px dashed #d4b487;border-radius:14px;overflow:hidden;display:flex;flex-direction:column">
              <canvas class="scratch-pad" style="display:block;flex:1;cursor:crosshair;touch-action:none;background:white"></canvas>
              <div style="position:absolute;top:8px;left:12px;font-size:18px;color:var(--ink-soft);font-weight:700;pointer-events:none;background:rgba(255,250,238,0.85);padding:3px 12px;border-radius:8px">📝 계산 노트</div>
              <button class="clear-scratch" style="position:absolute;top:8px;right:10px;font-size:14px;padding:6px 12px;background:white;border:2px solid #d4b487;border-radius:10px;cursor:pointer;font-family:'Jua',sans-serif;color:var(--ink);font-weight:700">🧹 지우기</button>
              <!-- 손글씨 답 패드 (정답 확인 시 OCR로 인식) -->
              <div class="answer-pads-row">
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">답:</span>
                <canvas class="answer-pad" data-target="ga"></canvas>
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">:</span>
                <canvas class="answer-pad" data-target="gb"></canvas>
                <button class="clear-answer-pads" title="답 지우기">🧹</button>
              </div>
            </div>
          </div>
        </div>
      `;
      setupScratch();
      // 손글씨 답 패드 setup — 그리기 종료 시 OCR로 메인 입력칸을 자동 채움
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      G.ocrTokenA = { n: 0 };
      G.ocrTokenB = { n: 0 };
      G.padA_h = setupAnswerPad(padA, {
        onChange: async () => {
          const tk = G.ocrTokenA; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padA);
          if(myN !== tk.n) return;
          const a = r.querySelector('[data-id="ga"]');
          if(a && rec){ a.value = rec; a.classList.remove('ok','bad'); a.style.color=''; a.style.borderColor=''; a.style.background=''; }
        }
      });
      G.padB_h = setupAnswerPad(padB, {
        onChange: async () => {
          const tk = G.ocrTokenB; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padB);
          if(myN !== tk.n) return;
          const b = r.querySelector('[data-id="gb"]');
          if(b && rec){ b.value = rec; b.classList.remove('ok','bad'); b.style.color=''; b.style.borderColor=''; b.style.background=''; }
        }
      });
      const clearAns = r.querySelector('.clear-answer-pads');
      if(clearAns) clearAns.addEventListener('click', ()=>{
        if(G.padA_h) G.padA_h.clear();
        if(G.padB_h) G.padB_h.clear();
        if(G.ocrTokenA) G.ocrTokenA.n++;
        if(G.ocrTokenB) G.ocrTokenB.n++;
        padA.classList.remove('correct','wrong');
        padB.classList.remove('correct','wrong');
      });
      r.querySelector('#check-game').addEventListener('click', checkAnswer);
      r.querySelector('#quit-game').addEventListener('click', ()=>{
        clearTimer();
        showResults();
      });
    }

    function showProblem(){
      if(G.idx >= G.mode.target){ showResults(); return; }
      const p = G.problems[G.idx];
      const area = r.querySelector('.problem-area');
      area.innerHTML = `
        <span class="problem-display">${p.d}</span>
        <span style="color:var(--muted)">=</span>
        <span class="game-input-wrap"><input class="ans game-ans" data-id="ga" inputmode="numeric" /></span>
        <span style="color:var(--muted)">:</span>
        <span class="game-input-wrap"><input class="ans game-ans" data-id="gb" inputmode="numeric" /></span>
      `;
      const a = area.querySelector('[data-id="ga"]');
      const b = area.querySelector('[data-id="gb"]');
      setTimeout(()=>{ if(a) a.focus(); }, 50);
      [a,b].forEach(inp=>{
        inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') checkAnswer(); });
      });

      // 손글씨 답 패드 초기화 (이전 문제의 그림·표시 제거)
      if(G.padA_h) G.padA_h.clear();
      if(G.padB_h) G.padB_h.clear();
      // 대기 중인 OCR 결과 무효화 — 이전 문제의 OCR이 새 문제 입력칸에 잘못 들어가는 것 방지
      if(G.ocrTokenA) G.ocrTokenA.n++;
      if(G.ocrTokenB) G.ocrTokenB.n++;
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      if(padA) padA.classList.remove('correct','wrong');
      if(padB) padB.classList.remove('correct','wrong');
    }

    async function checkAnswer(){
      const p = G.problems[G.idx];
      if(!p) return;
      const a = r.querySelector('[data-id="ga"]');
      const b = r.querySelector('[data-id="gb"]');
      if(!a || !b) return;

      // 손글씨 답 패드에서 OCR 인식 → 메인 입력칸에 값 채움
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      const checkBtn = r.querySelector('#check-game');
      const origLabel = checkBtn ? checkBtn.textContent : '';
      if(checkBtn){ checkBtn.disabled = true; checkBtn.textContent = '인식 중…'; }
      try {
        const [recA, recB] = await Promise.all([
          recognizeDigitsFromCanvas(padA),
          recognizeDigitsFromCanvas(padB)
        ]);
        if(recA) a.value = recA;
        if(recB) b.value = recB;
      } catch(e){ /* OCR 실패해도 다음 단계 진행 */ }
      if(checkBtn){ checkBtn.disabled = false; checkBtn.textContent = origLabel; }

      const av = parseInt((a.value||'').trim(), 10);
      const bv = parseInt((b.value||'').trim(), 10);
      const ok = (av === p.ans[0]) && (bv === p.ans[1]);
      a.disabled = true; b.disabled = true;
      showFeedback(a.closest('.game-input-wrap'), ok);
      showFeedback(b.closest('.game-input-wrap'), ok);
      // 손글씨 답 패드 색도 동기화
      [padA, padB].forEach(p2=>{
        if(p2){ p2.classList.remove('correct','wrong'); p2.classList.add(ok ? 'correct' : 'wrong'); }
      });
      if(ok){
        G.score++;
        const s = r.querySelector('.score-text');
        if(s) s.textContent = G.score;
      }
      setTimeout(()=>{
        G.idx++;
        showProblem();
      }, 1100);
    }

    function showFeedback(wrap, ok){
      const inp = wrap.querySelector('input');
      if(ok){
        inp.style.color = '#16a34a';
        inp.style.borderColor = '#16a34a';
        const c = document.createElement('span');
        c.className = 'fb-circle';
        wrap.appendChild(c);
      } else {
        inp.style.color = '#dc2626';
        inp.style.borderColor = '#dc2626';
        const x = document.createElement('span');
        x.className = 'fb-x';
        wrap.appendChild(x);
      }
    }

    /* ── 계산 노트 (스크래치 패드) — 컨테이너 크기에 맞춰 캔버스 비트맵 조정 ── */
    function setupScratch(){
      const c = r.querySelector('.scratch-pad');
      if(!c) return;
      const ctx = c.getContext('2d');
      function applyCtxStyle(){
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      function fitCanvas(){
        const rect = c.getBoundingClientRect();
        if(rect.width > 10 && rect.height > 10){
          c.width  = Math.round(rect.width);
          c.height = Math.round(rect.height);
          applyCtxStyle();
        }
      }
      // 레이아웃 settle 후 캔버스 크기 맞춤
      setTimeout(fitCanvas, 60);
      setTimeout(fitCanvas, 300);

      let drawing = false;
      function getP(e){
        const rect = c.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - rect.left) * (c.width / rect.width),
                 y: (t.clientY - rect.top)  * (c.height / rect.height) };
      }
      function start(e){ drawing = true; const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }
      function move(e){ if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }
      function stop(){ drawing = false; }
      c.addEventListener('mousedown', start);
      c.addEventListener('mousemove', move);
      c.addEventListener('mouseup', stop);
      c.addEventListener('mouseleave', stop);
      c.addEventListener('touchstart', start, { passive:false });
      c.addEventListener('touchmove',  move,  { passive:false });
      c.addEventListener('touchend',   stop);
      r.querySelector('.clear-scratch').addEventListener('click', ()=>{
        ctx.clearRect(0, 0, c.width, c.height);
      });
    }

    /* ── 결과 + 보상 화면 ── */
    function showResults(){
      clearTimer();
      const elapsed = Math.round((Date.now() - G.startTime) / 1000);
      const passed = G.score >= G.mode.target;
      const reward = G.mode.target === 20 && passed;

      // 스프레드시트에 누적 기록
      logGameScore(G.mode.label, G.score, elapsed);

      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;height:100%;padding:14px">
          <div style="font-size:80px">${passed ? '🎉' : '💪'}</div>
          <div style="font-size:36px;font-weight:800">${G.mode.label} 결과</div>
          <div style="font-size:32px">맞춘 개수: <b style="color:var(--good)">${G.score}</b> / ${G.mode.target}</div>
          <div style="font-size:22px;color:var(--ink-soft)">소요 시간: ${elapsed}초${G.expired?' · 폭탄이 터졌어요 💥':''}</div>
          ${reward ? `
            <div style="background:linear-gradient(135deg,#fff5d9,#ffe9b0);border:4px solid var(--accent);border-radius:24px;padding:18px 30px;text-align:center;animation:fb-grow 0.6s">
              <div style="font-size:70px;line-height:1">🍞 📖</div>
              <div style="font-size:30px;font-weight:800;color:var(--primary-deep);margin-top:6px">🎁 보상 획득!</div>
              <div style="font-size:22px;color:var(--ink);margin-top:4px">사장님의 비밀 레시피북 + 갓 구운 빵을 받았어요!</div>
            </div>
          ` : (G.mode.target < 20 ? `<div style="font-size:20px;color:var(--ink-soft)">💡 도전 ③ (20개)를 통과하면 보상을 받을 수 있어요!</div>` : '')}
          <div style="display:flex;gap:12px;margin-top:6px">
            <button class="btn btn-secondary" id="again-btn" style="font-size:22px">한 번 더 도전</button>
            <button class="btn btn-pink" id="finish-btn" style="font-size:22px">단원 마치기 →</button>
          </div>
        </div>
      `;
      r.querySelector('#again-btn').addEventListener('click', showSelect);
      r.querySelector('#finish-btn').addEventListener('click', ()=> finishStage(1, 3));
    }

    showSelect();
    return r;
  },
];

          사장님이 갓 구운 쿠키 <b>10개</b>를 <b style="color:#a3215f">어린이 손님</b>과 <b style="color:#3f7820">어른 손님</b> 두 그룹에 <b>2 : 3</b>의 비로 나눠주려고 해요. 어떻게 똑똑하게 비에 맞춰 나눠줄까요?
        </div>
      </div>

      <!-- 쿠키 + 학생이 직접 나누는 활동 -->
      <div class="bg-yellow-50 rounded-2xl text-center" style="border:2px solid #fbbf24;padding:12px 18px;margin:6px 0">
        <div style="font-size:26px;color:var(--ink);font-weight:700;margin-bottom:8px;line-height:1.4">
          버튼을 눌러 <b style="color:#a3215f">어린이 손님</b>에게 쿠키 <b>2개</b>, <b style="color:#3f7820">어른 손님</b>에게 쿠키 <b>3개</b>씩 쿠키를 모두 나누어 주세요.
        </div>
        <div id="distrib-display" style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;font-size:52px;margin:10px 0;min-height:80px"></div>
        <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:8px">
          <button id="btn-child" style="font-family:'Jua',sans-serif;font-size:20px;font-weight:800;padding:8px 18px;border:3px solid #ec6da4;border-radius:14px;background:#fbd6e4;color:#a3215f;cursor:pointer;box-shadow:0 4px 0 rgba(236,109,164,.35)">
            👶 어린이 손님
          </button>
          <button id="btn-adult" style="font-family:'Jua',sans-serif;font-size:20px;font-weight:800;padding:8px 18px;border:3px solid #84d05c;border-radius:14px;background:#d8f1c6;color:#3f7820;cursor:pointer;box-shadow:0 4px 0 rgba(132,208,92,.35)">
            🧑 어른 손님
          </button>
          <button id="btn-reset" style="font-family:'Jua',sans-serif;font-size:18px;font-weight:700;padding:8px 16px;border:2px solid var(--paper-deep);border-radius:14px;background:white;color:var(--ink);cursor:pointer">🧹 다시 하기</button>
        </div>
        <div id="status" style="font-size:18px;color:var(--ink-soft);margin-top:6px;font-weight:700;min-height:24px"></div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-blue">정답 확인</button>
      </div>
    </div>`);

    // 10개 쿠키를 한 개씩 학생이 직접 분배 — 연속 같은 손님이면 시각적으로 한 묶음
    const N = 10;
    const assigned = new Array(N).fill(null);  // null | 'child' | 'adult'
    let nextIdx = 0;

    function render(){
      const disp = r.querySelector('#distrib-display');
      disp.innerHTML = '';
      let i = 0;
      while(i < N){
        if(assigned[i] === null){
          let j = i;
          while(j < N && assigned[j] === null) j++;
          const wrap = document.createElement('span');
          wrap.style.cssText = 'display:inline-flex;gap:4px;opacity:.4';
          wrap.innerHTML = '🍪'.repeat(j - i);
          disp.appendChild(wrap);
          i = j;
        } else {
          const who = assigned[i];
          let j = i;
          while(j < N && assigned[j] === who) j++;
          const cfg = who === 'child'
            ? { bg:'#fbd6e4', border:'#ec6da4' }
            : { bg:'#d8f1c6', border:'#84d05c' };
          const box = document.createElement('span');
          box.style.cssText = `display:inline-flex;gap:6px;padding:10px 16px;border-radius:20px;background:${cfg.bg};border:4px solid ${cfg.border};box-shadow:0 3px 0 ${cfg.border}44`;
          box.innerHTML = '🍪'.repeat(j - i);
          disp.appendChild(box);
          i = j;
        }
      }
      const c = assigned.filter(a => a === 'child').length;
      const ad = assigned.filter(a => a === 'adult').length;
      const status = r.querySelector('#status');
      if(c + ad === 0){
        status.textContent = '';
      } else {
        status.innerHTML = `<b style="color:#a3215f">어린이 손님</b> ${c}개 · <b style="color:#3f7820">어른 손님</b> ${ad}개` +
          (c + ad < N ? ` · 남은 쿠키 ${N - c - ad}개` : '');
      }
    }

    function give(who){
      if(nextIdx >= N) return;
      assigned[nextIdx] = who;
      nextIdx++;
      render();
    }

    function reset(){
      assigned.fill(null);
      nextIdx = 0;
      render();
    }

    r.querySelector('#btn-child').addEventListener('click', ()=> give('child'));
    r.querySelector('#btn-adult').addEventListener('click', ()=> give('adult'));
    r.querySelector('#btn-reset').addEventListener('click', reset);
    render();

    // 정답 확인 — 2:3 비율(어린이 4 + 어른 6)일 때만 통과, 그 외는 팝업으로 힌트
    r.querySelector('#check').addEventListener('click', ()=>{
      const c = assigned.filter(a => a === 'child').length;
      const ad = assigned.filter(a => a === 'adult').length;
      if(c + ad < N){
        showModal(
          '잠깐만요',
          `<div style="text-align:center;font-size:22px">쿠키 ${N - c - ad}개가 아직 남아 있어요. 모두 나눠 드려 주세요.</div>`,
          [{ label:'알겠어요', cls:'btn-primary' }]
        );
        return;
      }
      if(c === 4 && ad === 6){
        r.querySelector('#check').disabled = true;
        toast('정답이에요', true);
        return;
      }
      showModal(
        '두 개와 세 개씩 나누어 줘요',
        `<div style="text-align:center;font-size:22px;line-height:1.6">
           <b style="color:#a3215f">어린이 손님</b>에게 <b>두 개</b>씩,
           <b style="color:#3f7820">어른 손님</b>에게 <b>세 개</b>씩 나누어 줘요.
         </div>`,
        [{ label:'다시 해 볼게요', cls:'btn-primary' }]
      );
    });
    return r;
  },
  // ② 개념 학습 — 흩어진 작은 묶음을 큰 묶음으로 직접 묶기
  ()=>{
    const r = el(`<div>
      ${speech('앞에서 나눠 드린 쿠키예요. <b style="color:#a3215f">어린이 2개</b>와 <b style="color:#3f7820">어른 3개</b>를 한 줄로 묶어 <b>큰 묶음(5개)</b> 두 개를 직접 만들어 봐요!')}
      <div class="bg-blue-50 rounded-2xl text-center" style="padding:12px 18px;margin:6px 0">
        <!-- 묶기 / 다시 하기 버튼 — 그림 위쪽 -->
        <div style="display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">
          <button id="make-bundle" style="font-family:'Jua',sans-serif;font-size:20px;font-weight:800;padding:10px 22px;border:3px solid var(--accent);border-radius:14px;background:#fff3d6;color:var(--accent);cursor:pointer;box-shadow:0 4px 0 rgba(243,158,44,.35)">
            ✨ 큰 묶음으로 묶기
          </button>
          <button id="reset-bundle" style="font-family:'Jua',sans-serif;font-size:18px;font-weight:700;padding:8px 16px;border:2px solid var(--paper-deep);border-radius:14px;background:white;color:var(--ink);cursor:pointer">🧹 다시 하기</button>
        </div>
        <!-- 묶음 영역 — 학생이 큰 묶음을 만들면 점선이 둘러쌈 -->
        <div id="bundle-area" style="display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:18px;margin:10px 0;min-height:100px"></div>
        <!-- 정리 내용 — 묶음 완성 후 표시 (글씨 1.5배) -->
        <div id="summary-area" style="display:none;font-size:33px;margin-top:14px;line-height:1.55;color:var(--ink);text-align:center;font-weight:700">
          한 묶음(전체 <input class="ans" data-id="t" style="font-size:30px;width:70px;height:54px" /> 개) 중
          <b style="color:#a3215f">어린이</b> <input class="ans" data-id="c" style="font-size:30px;width:70px;height:54px" /> 개,
          <b style="color:#3f7820">어른</b> <input class="ans" data-id="a" style="font-size:30px;width:70px;height:54px" /> 개
          <div style="font-size:27px;margin-top:8px;color:var(--ink-soft)">→ <b style="color:#a3215f">어린이</b> : <b style="color:#3f7820">어른</b> = <b>2 : 3</b> 의 비율이에요</div>
        </div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-pink">다음 →</button>
      </div>
    </div>`);

    const area = r.querySelector('#bundle-area');
    const makeBtn = r.querySelector('#make-bundle');
    const summary = r.querySelector('#summary-area');
    let bundled = false;

    // 작은 묶음 HTML — 분홍2/초록3
    const pinkSmall = `<div style="background:#fbd6e4;padding:8px 14px;border-radius:14px;border:4px solid #ec6da4;font-size:32px">🍪🍪</div>`;
    const greenSmall = `<div style="background:#d8f1c6;padding:8px 14px;border-radius:14px;border:4px solid #84d05c;font-size:32px">🍪🍪🍪</div>`;

    function renderLoose(){
      // 묶기 전: 작은 묶음 4개가 한 줄로 흩어져 있음 (큰 점선 없음)
      area.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">${pinkSmall}</div>
        <div style="display:flex;align-items:center;gap:10px">${greenSmall}</div>
        <div style="display:flex;align-items:center;gap:10px">${pinkSmall}</div>
        <div style="display:flex;align-items:center;gap:10px">${greenSmall}</div>
      `;
      bundled = false;
    }

    function renderBundled(){
      // 묶은 후: 옆 분홍+초록을 한 점선 박스로 감싸 두 개의 큰 묶음 표시
      area.innerHTML = `
        <div style="position:relative;background:white;border:3px dashed #f4b53c;border-radius:18px;padding:14px 18px 22px;display:flex;align-items:center;gap:10px;transition:all .25s ease-out">
          ${pinkSmall}
          ${greenSmall}
          <div style="position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);background:#fff3d6;border:2px solid #f4b53c;border-radius:10px;padding:1px 10px;font-size:14px;font-weight:800;color:#9a6d10;white-space:nowrap">1번째 묶음 (5개)</div>
        </div>
        <div style="position:relative;background:white;border:3px dashed #f4b53c;border-radius:18px;padding:14px 18px 22px;display:flex;align-items:center;gap:10px;transition:all .25s ease-out">
          ${pinkSmall}
          ${greenSmall}
          <div style="position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);background:#fff3d6;border:2px solid #f4b53c;border-radius:10px;padding:1px 10px;font-size:14px;font-weight:800;color:#9a6d10;white-space:nowrap">2번째 묶음 (5개)</div>
        </div>
      `;
      bundled = true;
    }

    renderLoose();

    makeBtn.addEventListener('click', ()=>{
      if(bundled) return;
      renderBundled();
      makeBtn.disabled = true;
      makeBtn.style.opacity = '.5';
      summary.style.display = 'block';
    });
    r.querySelector('#reset-bundle').addEventListener('click', ()=>{
      renderLoose();
      makeBtn.disabled = false;
      makeBtn.style.opacity = '1';
      summary.style.display = 'none';
      // 입력값도 비움
      ['t','c','a'].forEach(id => {
        const inp = r.querySelector(`[data-id="${id}"]`);
        if(inp){ inp.value = ''; inp.classList.remove('ok','bad'); }
      });
    });

    const expected = { t:'5', c:'2', a:'3' };
    r.querySelector('#check').addEventListener('click',()=>{
      if(!bundled){
        showModal('잠깐만요', `<div style="text-align:center;font-size:22px">먼저 <b>큰 묶음으로 묶기</b> 버튼을 눌러 두 묶음을 만들어 주세요!</div>`, [{ label:'알겠어요', cls:'btn-primary' }]);
        return;
      }
      let allOk = true;
      Object.entries(expected).forEach(([id, val])=>{
        const inp = r.querySelector(`[data-id="${id}"]`);
        inp.classList.remove('ok','bad');
        const ok = inp.value.trim() === val;
        inp.classList.add(ok ? 'ok' : 'bad');
        if(!ok) allOk = false;
      });
      if(allOk){
        r.querySelector('#check').disabled = true;
        nextStep();
        return;
      }
      showModal(
        '힌트',
        `<div style="text-align:center;line-height:1.8;font-size:22px">
           한 묶음의 개수: <b style="color:#a3215f">어린이 2</b> + <b style="color:#3f7820">어른 3</b> = <b>5</b> 개예요.<br>
           그래서 비율은 <b>2 : 3</b> 이에요.
         </div>`,
        [{ label:'다시 풀어볼게요', cls:'btn-primary' }]
      );
    });
    return r;
  },
  // ③ 개념 학습 — 분홍-초록-분홍-초록 → 드래그로 같은 색끼리 모아봐요
  ()=>{
    const r = el(`<div>
      ${speech('마우스를 드래그해서 <b>같은 색</b>끼리 모아봐요.')}
      <div class="bg-blue-50 rounded-2xl text-center" style="padding:14px 22px;margin:8px 0">
        <!-- 묶음 4개 — 초기 순서: 분홍-초록-분홍-초록, 드래그로 재정렬 -->
        <div id="groups-row" style="display:flex;justify-content:center;flex-wrap:wrap;gap:16px;margin:10px 0;font-size:42px;min-height:90px">
          <div class="cookie-bunch" data-color="pink"  style="background:#fbd6e4;padding:12px 20px;border-radius:16px;border:4px solid #ec6da4;cursor:grab;touch-action:none;user-select:none;transition:transform .2s, box-shadow .2s">🍪🍪</div>
          <div class="cookie-bunch" data-color="green" style="background:#d8f1c6;padding:12px 20px;border-radius:16px;border:4px solid #84d05c;cursor:grab;touch-action:none;user-select:none;transition:transform .2s, box-shadow .2s">🍪🍪🍪</div>
          <div class="cookie-bunch" data-color="pink"  style="background:#fbd6e4;padding:12px 20px;border-radius:16px;border:4px solid #ec6da4;cursor:grab;touch-action:none;user-select:none;transition:transform .2s, box-shadow .2s">🍪🍪</div>
          <div class="cookie-bunch" data-color="green" style="background:#d8f1c6;padding:12px 20px;border-radius:16px;border:4px solid #84d05c;cursor:grab;touch-action:none;user-select:none;transition:transform .2s, box-shadow .2s">🍪🍪🍪</div>
        </div>
        <!-- 답 입력 — 정답일 때 옆에 곱셈식 자동 표시 -->
        <div style="font-size:26px;margin-top:14px;line-height:1.5;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
          <span><b style="color:#a3215f">어린이 손님</b> · 분홍 2개씩 2묶음 → 모두 <input class="ans" data-id="h" style="font-size:24px;width:70px;height:44px" /> 개</span>
          <span id="formula-h" style="color:#a3215f;font-weight:800;display:none;font-size:24px">(2 × 2 = 4)</span>
        </div>
        <div style="font-size:26px;margin-top:8px;line-height:1.5;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
          <span><b style="color:#3f7820">어른 손님</b> · 초록 3개씩 2묶음 → 모두 <input class="ans" data-id="n" style="font-size:24px;width:70px;height:44px" /> 개</span>
          <span id="formula-n" style="color:#3f7820;font-weight:800;display:none;font-size:24px">(3 × 2 = 6)</span>
        </div>
      </div>
      <div class="step-actions">
        <button id="check" class="btn btn-pink">다음 →</button>
      </div>
    </div>`);

    // 드래그 앤 드롭 (Pointer Events — 마우스·터치·펜 모두 지원)
    let dragSrc = null;
    let dragHover = null;
    const bunches = r.querySelectorAll('.cookie-bunch');

    function clearHover(){
      if(dragHover){ dragHover.style.boxShadow = ''; dragHover = null; }
    }
    function setHover(el){
      if(dragHover !== el){
        clearHover();
        if(el && el !== dragSrc && el.classList && el.classList.contains('cookie-bunch')){
          el.style.boxShadow = '0 0 0 4px #888, 0 0 0 8px rgba(0,0,0,.1)';
          dragHover = el;
        }
      }
    }
    function findBunch(node){
      while(node && (!node.classList || !node.classList.contains('cookie-bunch'))) node = node.parentElement;
      return node;
    }
    bunches.forEach(b => {
      b.addEventListener('pointerdown', e => {
        e.preventDefault();
        dragSrc = b;
        b.style.opacity = '0.55';
        b.style.cursor = 'grabbing';
        b.style.transform = 'scale(1.06)';
      });
    });
    function onMove(e){
      if(!dragSrc) return;
      const target = document.elementFromPoint(e.clientX, e.clientY);
      setHover(findBunch(target));
    }
    function onUp(e){
      if(!dragSrc) return;
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const dst = findBunch(target);
      if(dst && dst !== dragSrc && dst.parentNode === dragSrc.parentNode){
        const parent = dragSrc.parentNode;
        const srcNext = dragSrc.nextElementSibling;
        const dstNext = dst.nextElementSibling;
        if(srcNext === dst){ parent.insertBefore(dst, dragSrc); }
        else if(dstNext === dragSrc){ parent.insertBefore(dragSrc, dst); }
        else { parent.insertBefore(dragSrc, dstNext); parent.insertBefore(dst, srcNext); }
      }
      dragSrc.style.opacity = '';
      dragSrc.style.cursor = 'grab';
      dragSrc.style.transform = '';
      clearHover();
      dragSrc = null;
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);

    // 답 입력 시 옆에 곱셈식 자동 표시 (정답일 때만)
    const hInp = r.querySelector('[data-id="h"]');
    const nInp = r.querySelector('[data-id="n"]');
    const fH = r.querySelector('#formula-h');
    const fN = r.querySelector('#formula-n');
    hInp.addEventListener('input', ()=>{ hInp.classList.remove('ok','bad'); fH.style.display = (hInp.value.trim()==='4') ? '' : 'none'; });
    nInp.addEventListener('input', ()=>{ nInp.classList.remove('ok','bad'); fN.style.display = (nInp.value.trim()==='6') ? '' : 'none'; });

    r.querySelector('#check').addEventListener('click',()=>{
      const okH = hInp.value.trim() === '4';
      const okN = nInp.value.trim() === '6';
      hInp.classList.remove('ok','bad'); nInp.classList.remove('ok','bad');
      hInp.classList.add(okH?'ok':'bad'); nInp.classList.add(okN?'ok':'bad');
      if(okH && okN){
        r.querySelector('#check').disabled = true;
        nextStep();
        return;
      }
      showModal(
        '힌트',
        `<div style="text-align:center;line-height:1.8;font-size:22px">
           <div><b style="color:#a3215f">어린이 손님</b> · 2개씩 2묶음 → 2 × 2 = <span style="display:inline-block;min-width:50px;border-bottom:3px solid #a3215f;margin:0 4px"></span></div>
           <div style="margin-top:8px"><b style="color:#3f7820">어른 손님</b> · 3개씩 2묶음 → 3 × 2 = <span style="display:inline-block;min-width:50px;border-bottom:3px solid #3f7820;margin:0 4px"></span></div>
         </div>`,
        [{ label:'다시 풀어볼게요', cls:'btn-primary' }]
      );
    });
    return r;
  },
  // ④ 핵심 정리 — 수직선으로 비교 + 공식 (팝업)
  ()=>{
    const r = el(`<div>
      ${speech('쿠키 10개를 2 : 3으로 나누면, <b style="color:#a3215f">어린이 손님</b>은 4개, <b style="color:#3f7820">어른 손님</b>은 6개를 받아요. 수직선 위에 두 양을 나란히 그려서 한눈에 비교해 봐요.')}

      <!-- 수직선 하나 — 위쪽 눈금 0~10(실제 쿠키), 아래쪽 눈금 0~5(비율 칸수) -->
      <div class="bg-purple-50 rounded-2xl" style="padding:14px 18px;margin:6px 0">
        <div style="text-align:center;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px">📐 수직선으로 한눈에 비교해 봐요</div>
        <svg viewBox="0 0 600 200" style="width:100%;max-width:600px;display:block;margin:0 auto" preserveAspectRatio="xMidYMid meet">

  // ④ 실생활 퀴즈 — 식을 주고 빈칸 채워 비례식 만들기
  ()=>{
    const probs = [
      { label:'갓 구운 쿠키 12개를 두 손님 그룹에 1 : 3 으로 나누어요. 두 그룹의 쿠키 개수로 비례식을 완성해 보세요.', labelFontSize:33,

        q:'__ANS__ : __ANS__ = 2 : 3', answers:['8','12'] },
      { label:'딸기 15개를 케이크 두 개에 2 : 1 로 나누어요. 두 케이크에 들어가는 딸기 개수로 비례식을 완성해 보세요.', labelFontSize:33,
        q:'__ANS__ : __ANS__ = 2 : 1', answers:['10','5'] },
      { label:'도넛 24개를 두 손님 가족에 3 : 5 로 나누어요. 두 가족이 받는 도넛 개수로 비례식을 완성해 보세요.', labelFontSize:33,
        q:'__ANS__ : __ANS__ = 3 : 5', answers:['9','15'] },
    ];
    return makeProblems(probs, nextStep);

  // ⑤ 연습하기 — 비례배분 타이머 게임 (3 모드 / 50문제 풀에서 랜덤)
  ()=>{
    const r = el(`<div class="game-root" style="height:100%;display:flex;flex-direction:column"></div>`);
    const G = {
      mode:null, problems:[], idx:0, score:0,
      timeLeft:60, expired:false, timerId:null, startTime:0
    };

    function clearTimer(){ if(G.timerId){ clearInterval(G.timerId); G.timerId = null; } }

    function showSelect(){
      clearTimer();
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:22px;height:100%;padding:10px">
          <div style="font-size:42px;font-weight:800;color:var(--primary-deep)">⏱️ 비례배분 도전 게임</div>
          <div style="font-size:24px;color:var(--ink);text-align:center;line-height:1.5">
            제시되는 양을 <b style="color:#ec6da4">비에 맞춰 두 부분으로</b> 나눠 봐요!<br>
            예) 쿠키 10개를 2 : 3 으로 → 4개 : 6개
          </div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:6px">
            ${[
              { sec:60, label:'도전 ①', desc:'1분에 10문제' },
              { sec:40, label:'도전 ②', desc:'40초에 10문제' },
              { sec:20, label:'도전 ③', desc:'20초에 10문제' },
            ].map(m => `
              <button class="game-mode-btn" data-sec="${m.sec}">
                <div style="font-size:32px;font-weight:800;color:var(--primary-deep)">${m.label}</div>
                <div style="font-size:22px;color:var(--ink-soft);margin-top:6px">${m.desc}</div>
              </button>
            `).join('')}
          </div>
          <div style="font-size:20px;color:var(--ink-soft)">💣 시간이 다 가도 끝까지 풀 수 있어요!</div>
        </div>
      `;
      r.querySelectorAll('.game-mode-btn').forEach(b=>{
        b.addEventListener('click', ()=> startGame(+b.dataset.sec));
      });
    }

    function startGame(sec){
      const labels = { 60:'도전 ① (1분 · 10문제)', 40:'도전 ② (40초 · 10문제)', 20:'도전 ③ (20초 · 10문제)' };
      G.mode = { sec, label: labels[sec], target: 10 };
      G.problems = shuffleArr(BIPAEBUN_PROBLEMS).slice(0, 10);
      G.idx = 0; G.score = 0;
      G.timeLeft = sec; G.expired = false;
      G.startTime = Date.now();
      renderPlay();
      runTimer();
      showProblem();
    }

    function runTimer(){
      clearTimer();
      const TOTAL = G.timeLeft;
      const startMs = Date.now();
      updateTimerUI();
      G.timerId = setInterval(()=>{
        const elapsed = Math.floor((Date.now() - startMs) / 1000);
        const newLeft = Math.max(0, TOTAL - elapsed);
        if(newLeft !== G.timeLeft){
          G.timeLeft = newLeft;
          updateTimerUI();
        }
        if(G.timeLeft <= 0){
          G.expired = true;
          clearTimer();
          explodeBomb();
        }
      }, 250);
    }

    function updateTimerUI(){
      const t = r.querySelector('.timer-text');
      if(!t) return;
      if(G.timeLeft <= 0){ t.textContent = '시간 끝!'; t.style.color = '#dc2626'; return; }
      const m = Math.floor(G.timeLeft / 60);
      const s = G.timeLeft % 60;
      t.textContent = `${m}:${String(s).padStart(2,'0')}`;
      if(G.timeLeft <= 5) t.style.color = '#dc2626';
      const clock = r.querySelector('.clock-icon');
      if(clock && G.timeLeft <= 5 && G.timeLeft > 0) clock.classList.add('warning');
    }

    function explodeBomb(){
      const clock = r.querySelector('.clock-icon');
      if(clock){
        clock.classList.remove('warning');
        clock.classList.add('exploded');
        clock.textContent = '⏰';
      }
      const t = r.querySelector('.timer-text');
      if(t){ t.textContent = '시간 끝!'; t.style.color = '#dc2626'; }
    }

    function renderPlay(){
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;height:100%">
          <!-- 헤더 -->
          <div style="display:flex;justify-content:space-between;align-items:center;background:#fff7e0;border:2px solid var(--accent);border-radius:14px;padding:10px 22px;flex-shrink:0">
            <div style="font-size:24px;font-weight:800">${G.mode.label}</div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="clock-icon" style="font-size:38px">🕐</span>
              <span class="timer-text" style="font-size:32px;font-weight:800;font-family:'Pretendard Variable',sans-serif">0:00</span>
            </div>
            <div style="font-size:24px;font-weight:800">맞춤: <span class="score-text" style="color:var(--good)">0</span> / ${G.mode.target}</div>
          </div>
          <!-- 본문: 좌(문제) + 우(계산 노트 + OCR 답 패드) -->
          <div style="display:flex;gap:14px;flex:1;min-height:0">
            <!-- 왼쪽: 문제 박스 -->
            <div style="flex:0 0 520px;display:flex;flex-direction:column;background:#f5edff;border:3px solid var(--tab-3);border-radius:18px;padding:24px;justify-content:space-between;gap:14px">
              <div style="text-align:center;font-size:20px;color:var(--ink-soft)">아래 비례배분 식의 빈칸을 채우세요</div>
              <div class="problem-area" style="text-align:center;font-size:32px;font-weight:800;line-height:1.5"></div>
              <div class="game-feedback" style="text-align:center;font-size:22px;font-weight:800;min-height:30px;line-height:1.2"></div>
              <div style="display:flex;justify-content:center;gap:10px">
                <button class="btn btn-secondary" id="quit-game" style="font-size:20px">중단</button>
                <button class="btn btn-blue" id="check-game" style="font-size:24px;padding:12px 28px">정답 확인</button>
              </div>
            </div>
            <!-- 오른쪽: 계산 노트 + 손글씨 답 패드 -->
            <div class="scratch-pad-wrap" style="flex:1;position:relative;background:white;border:2px dashed #d4b487;border-radius:14px;overflow:hidden;display:flex;flex-direction:column">
              <canvas class="scratch-pad" style="display:block;flex:1;cursor:crosshair;touch-action:none;background:white"></canvas>
              <div style="position:absolute;top:8px;left:12px;font-size:18px;color:var(--ink-soft);font-weight:700;pointer-events:none;background:rgba(255,250,238,0.85);padding:3px 12px;border-radius:8px">📝 계산 노트</div>
              <button class="clear-scratch" style="position:absolute;top:8px;right:10px;font-size:14px;padding:6px 12px;background:white;border:2px solid #d4b487;border-radius:10px;cursor:pointer;font-family:'Jua',sans-serif;color:var(--ink);font-weight:700">🧹 지우기</button>
              <!-- 손글씨 답 패드 (정답 자동 인식) -->
              <div class="answer-pads-row">
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">답:</span>
                <canvas class="answer-pad" data-target="ga"></canvas>
                <span class="ocr-label" style="font-size:20px;font-weight:800;font-family:'Jua',sans-serif">:</span>
                <canvas class="answer-pad" data-target="gb"></canvas>
                <button class="clear-answer-pads" title="답 지우기">🧹</button>
              </div>
            </div>
          </div>
        </div>
      `;

      // 계산 노트 캔버스 — 자유 필기
      setupScratch();

      // 손글씨 답 패드 — 그리기 종료 시 OCR로 메인 입력칸 자동 채움
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      G.ocrTokenA = { n: 0 };
      G.ocrTokenB = { n: 0 };
      G.padA_h = setupAnswerPad(padA, {
        onChange: async () => {
          const tk = G.ocrTokenA; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padA);
          if(myN !== tk.n) return;
          const a = r.querySelector('[data-id="ga"]');
          if(a && rec){
            a.value = rec;
            a.style.color = ''; a.style.borderColor = ''; a.style.background = '';
          }
        }
      });
      G.padB_h = setupAnswerPad(padB, {
        onChange: async () => {
          const tk = G.ocrTokenB; const myN = ++tk.n;
          const rec = await recognizeDigitsFromCanvas(padB);
          if(myN !== tk.n) return;
          const b = r.querySelector('[data-id="gb"]');
          if(b && rec){
            b.value = rec;
            b.style.color = ''; b.style.borderColor = ''; b.style.background = '';
          }
        }
      });

      const clearAns = r.querySelector('.clear-answer-pads');
      if(clearAns) clearAns.addEventListener('click', ()=>{
        if(G.padA_h) G.padA_h.clear();
        if(G.padB_h) G.padB_h.clear();
        if(G.ocrTokenA) G.ocrTokenA.n++;
        if(G.ocrTokenB) G.ocrTokenB.n++;
        if(padA) padA.classList.remove('correct','wrong');
        if(padB) padB.classList.remove('correct','wrong');
      });

      r.querySelector('#check-game').addEventListener('click', checkAnswer);
      r.querySelector('#quit-game').addEventListener('click', ()=>{
        clearTimer();
        showResults();
      });
    }

    // 계산 노트(스크래치 패드) 초기화 — 비 줄이기 게임과 동일 패턴
    function setupScratch(){
      const canvas = r.querySelector('.scratch-pad');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      function fit(){
        const rect = canvas.getBoundingClientRect();
        if(rect.width > 10 && rect.height > 10 && (canvas.width !== Math.round(rect.width) || canvas.height !== Math.round(rect.height))){
          canvas.width  = Math.round(rect.width);
          canvas.height = Math.round(rect.height);
        }
        ctx.strokeStyle = '#4a3826';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }
      setTimeout(fit, 60);
      setTimeout(fit, 300);
      let drawing = false;
      function getP(e){
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
                 y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
      }
      canvas.addEventListener('mousedown', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); });
      canvas.addEventListener('mousemove', e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); });
      canvas.addEventListener('mouseup',    ()=>{ drawing=false; });
      canvas.addEventListener('mouseleave', ()=>{ drawing=false; });
      canvas.addEventListener('touchstart', e=>{ drawing=true; const p=getP(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }, {passive:false});
      canvas.addEventListener('touchmove',  e=>{ if(!drawing) return; const p=getP(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});
      canvas.addEventListener('touchend',   ()=>{ drawing=false; });
      const clearBtn = r.querySelector('.clear-scratch');
      if(clearBtn) clearBtn.addEventListener('click', ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); });
    }

    function showProblem(){
      if(G.idx >= G.mode.target){ showResults(); return; }
      const p = G.problems[G.idx];
      const area = r.querySelector('.problem-area');
      area.innerHTML = `
        <div style="font-size:24px;color:var(--ink);margin-bottom:8px">
          ${p.sub} <b style="color:var(--primary-deep)">${p.total}${p.unit}</b>을(를) <b>${p.ratio[0]} : ${p.ratio[1]}</b> 로 나누면?
        </div>
        <div style="font-size:38px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:nowrap">
          <span class="game-input-wrap"><input class="ans game-ans" data-id="ga" inputmode="numeric" /></span>
          <span style="color:var(--muted)">${p.unit} :</span>
          <span class="game-input-wrap"><input class="ans game-ans" data-id="gb" inputmode="numeric" /></span>
          <span style="color:var(--muted)">${p.unit}</span>
        </div>
      `;
      const a = area.querySelector('[data-id="ga"]');
      const b = area.querySelector('[data-id="gb"]');
      setTimeout(()=>{ if(a) a.focus(); }, 50);
      [a,b].forEach(inp=>{
        inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') checkAnswer(); });
      });
      const fb = r.querySelector('.game-feedback');
      if(fb){ fb.textContent = ''; fb.style.color = ''; }

      // 손글씨 답 패드 초기화 + 대기 중 OCR 무효화 (이전 문제 결과가 새 문제로 흘러오지 않도록)
      if(G.padA_h) G.padA_h.clear();
      if(G.padB_h) G.padB_h.clear();
      if(G.ocrTokenA) G.ocrTokenA.n++;
      if(G.ocrTokenB) G.ocrTokenB.n++;
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      if(padA) padA.classList.remove('correct','wrong');
      if(padB) padB.classList.remove('correct','wrong');
    }

    async function checkAnswer(){
      const p = G.problems[G.idx];
      if(!p) return;
      const a = r.querySelector('[data-id="ga"]');
      const b = r.querySelector('[data-id="gb"]');
      if(!a || !b) return;
      const checkBtn = r.querySelector('#check-game');
      if(checkBtn && checkBtn.disabled) return;
      // 손글씨 답 패드를 강제로 한 번 더 OCR 인식 → 메인 입력칸을 최신 값으로
      const padA = r.querySelector('.answer-pad[data-target="ga"]');
      const padB = r.querySelector('.answer-pad[data-target="gb"]');
      const origLabel = checkBtn ? checkBtn.textContent : '';
      if(checkBtn){ checkBtn.disabled = true; checkBtn.textContent = '인식 중…'; }
      try {
        const [recA, recB] = await Promise.all([
          recognizeDigitsFromCanvas(padA),
          recognizeDigitsFromCanvas(padB),
        ]);
        if(recA) a.value = recA;
        if(recB) b.value = recB;
      } catch(e){ /* OCR 실패 시 기존 입력값으로 검증 */ }
      if(checkBtn){ checkBtn.textContent = origLabel; }
      const av = parseInt((a.value||'').trim(), 10);
      const bv = parseInt((b.value||'').trim(), 10);
      const ok = (av === p.ans[0]) && (bv === p.ans[1]);
      a.disabled = true; b.disabled = true;
      [a,b].forEach(inp=>{
        inp.style.color = ok ? '#16a34a' : '#dc2626';
        inp.style.borderColor = ok ? '#16a34a' : '#dc2626';
        if(!ok) inp.style.background = '#ffe3e3';
      });
      // 손글씨 답 패드 색도 동기화
      [padA, padB].forEach(p2 => {
        if(p2){ p2.classList.remove('correct','wrong'); p2.classList.add(ok ? 'correct' : 'wrong'); }
      });
      const fb = r.querySelector('.game-feedback');
      if(fb){
        if(ok){
          fb.textContent = '맞았어요! 🎉';
          fb.style.color = '#16a34a';
        } else {
          fb.textContent = `틀렸어요 🤔  정답은 ${p.ans[0]} : ${p.ans[1]}`;
          fb.style.color = '#dc2626';
        }
      }
      if(ok){
        G.score++;
        const s = r.querySelector('.score-text');
        if(s) s.textContent = G.score;
      }
      setTimeout(()=>{
        G.idx++;
        if(checkBtn) checkBtn.disabled = false;
        showProblem();
      }, ok ? 900 : 1500);
    }

    function showResults(){
      clearTimer();
      const elapsed = Math.round((Date.now() - G.startTime) / 1000);
      const passed = G.score >= G.mode.target;
      logGameScore(G.mode.label, G.score, elapsed);
      r.innerHTML = `
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;height:100%;padding:14px">
          <div style="font-size:80px">${passed ? '🎉' : '💪'}</div>
          <div style="font-size:36px;font-weight:800">${G.mode.label} 결과</div>
          <div style="font-size:32px">맞춘 개수: <b style="color:var(--good)">${G.score}</b> / ${G.mode.target}</div>
          <div style="font-size:22px;color:var(--ink-soft)">소요 시간: ${elapsed}초${G.expired?' · 폭탄이 터졌어요 💥':''}</div>
          <div style="display:flex;gap:12px;margin-top:6px">
            <button class="btn btn-secondary" id="again-btn" style="font-size:22px">한 번 더 도전</button>
            <button class="btn btn-pink" id="finish-btn" style="font-size:22px">단원 마치기 →</button>
          </div>
        </div>
      `;
      r.querySelector('#again-btn').addEventListener('click', showSelect);
      r.querySelector('#finish-btn').addEventListener('click', ()=> finishStage(6, 3));
    }

    showSelect();
    return r;
  },
];

/* =====================================================
   STAGE 7 — 비례식 놀이터 (mixed quiz)

stageDefs[7] = [

  ()=>{

      ${speech('이제 진짜 졸업 시험! 모두 10문제예요. 맞힌 개수에 따라 별이 매겨진답니다. 차분히 풀어 봐요!')}
      <div class="bg-yellow-50 p-5 rounded-2xl text-center my-3" style="border:2px solid #fbbf24">

        <div style="font-size:20px;color:var(--ink-soft);margin-top:8px">⭐⭐⭐ 9~10개 · ⭐⭐ 7~8개 · ⭐ 5~6개</div>
      </div>

    bindNext(r); return r;
  },
  // ④ 실생활 퀴즈 — 종합 도전 (10문제)
  ()=>{
    const QUIZ = [
      { kind:'fill', q:'4 : 5 = __ANS__ : 15', ans:['12'] },
      { kind:'fill', q:'간단한 비: 0.6 : 0.9 → __ANS__ : __ANS__', ans:['2','3'] },

      { kind:'fill', q:'18을 1 : 2 로 나누기 → __ANS__ : __ANS__', ans:['6','12'] },
      { kind:'fill', q:`${F(1,3)} : ${F(1,4)} = __ANS__ : __ANS__`, ans:['4','3'] },
      { kind:'fill', q:'5 : 9 = 25 : __ANS__', ans:['45'] },
      { kind:'fill', q:'2시간에 80 km, 5시간에 __ANS__ km', ans:['200'] },
      { kind:'fill', q:'40개를 3 : 5 로 나누기 → __ANS__ : __ANS__', ans:['15','25'] },

    state.data.q = state.data.q ?? 0;
    state.data.score = state.data.score ?? 0;

    if(state.data.q >= QUIZ.length){
      // finished
      const s = state.data.score;

/* ============== 소단원 완료 처리 ============== */
/* 인자 id는 소단원(state.stage) 번호. 같은 단원(group) 내 마지막 소단원이면 단원 클리어 화면을 보여주고,
   아니면 자동으로 다음 소단원의 첫 단계로 넘어간다. */
function finishStage(id, stars){
  const g = GROUPS[groupOf(id)];
  const isLastSub = g.sections[g.sections.length - 1] === id;
  if(isLastSub){
    awardStars(g.id, stars);
    state.group = g.id;
    state.screen = 'clear';
    state.data = { stars };
    render();
  } else {
    const idx = g.sections.indexOf(id);
    state.stage = g.sections[idx + 1];
    state.step = 0;
    state.data = {};
    render();
  }
}
